<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enterprise Capability Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Premium Typography: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      /* Enterprise Color System */
      --primary: #3c92a6;
      --primary-dark: #2d6e7e;
      --primary-light: #eef7f9;
      --bg: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius-lg: 14px;
      --radius-md: 10px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --success: #22c55e; /* Green color for permitted levels */
      --inactive: #e5e7eb; /* Grey for non-permitted */
    }

    * { 
      box-sizing: border-box; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- LOADER STYLES --- */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      gap: 15px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--primary-light);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* --- Header Section --- */
    header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 4px 0;
      color: var(--text-main);
    }

    #dataStatus {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* --- Search & Controls --- */
    .controls-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .search-container {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .search-input-box {
      position: relative;
      flex: 1;
      display: flex;
    }
    
    .search-input-box input {
      width: 100%;
      padding: 16px 20px 16px 48px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      font-size: 16px;
      outline: none;
      transition: var(--transition);
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
    }
    
    .search-input-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(60, 146, 166, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      z-index: 2;
      pointer-events: none;
    }

    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    #filterRow {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-field label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .filter-field input {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
    }

    /* --- Card Data Grid --- */
    #tableBody {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .data-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      border: 1px solid var(--border);
      transition: var(--transition);
      display: grid;
      grid-template-columns: 1.6fr 3fr; /* Slightly wider main column to fit horizontal steps */
      gap: 24px;
      position: relative;
    }

    .data-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .card-main {
      border-right: 1px solid var(--border);
      padding-right: 24px;
    }

    .data-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 2px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    .selection-area {
      position: absolute;
      top: 24px;
      right: 24px;
    }

    /* --- BUTTONS & MISC --- */
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      color: var(--text-main);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .agency- {
      height: 22px;
      width: auto;
      display: block;
    }

    .card-header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .no-badge {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
    }
    
    .vertical-divider {
      width: 1px;
      height: 20px;
      background-color: var(--border);
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-avail { background: #dcfce7; color: #166534; }
    .status-limited { background: #fef9c3; color: #854d0e; }
    .status-default { background: #f3f4f6; color: #374151; }

    /* --- REFINED HORIZONTAL CAPABILITY STEPPER --- */
    .capability-container {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .authority-tag {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 15px;
    }

    .stepper-wrapper {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 4px;
    }

    .step-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 50px;
    }

    .step-label-top {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .step-light {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background-color: var(--inactive);
      transition: all 0.3s ease;
      margin-bottom: 6px;
    }

    .step-item.active .step-light {
      background-color: var(--success) !important;
      box-shadow: 0 1px 4px rgba(34, 197, 94, 0.3);
    }

    .step-desc {
      font-size: 9px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--text-light);
      display: block;
      height: 24px; /* Space for 2 lines */
    }

    .step-item.active .step-desc {
      color: #15803d;
    }
    
    .step-item.active .step-label-top {
      color: var(--text-main);
    }

    /* Sidebar Styles */
    .sidebar {
      position: fixed;
      top: 0; right: -300px; /* Sembunyi di kanan */
      width: 300px; height: 100%;
      background: var(--card-bg);
      box-shadow: -4px 0 15px rgba(0,0,0,0.1);
      z-index: 10000;
      transition: var(--transition);
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sidebar.active { right: 0; } /* Muncul ke arah kiri */

    .sidebar-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(2px);
      display: none; z-index: 9999;
    }
    .sidebar-overlay.active { display: block; }
    
    .burger-btn {
      background: var(--primary-light); 
      border: none; cursor: pointer;
      padding: 10px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      transition: var(--transition);
    }
    .burger-btn:hover { background: var(--primary); color: white; }
    
    .menu-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: 12px;
      text-decoration: none; color: var(--text-main);
      font-weight: 600; font-size: 14px;
      transition: var(--transition); border: none; background: none; width: 100%; text-align: left;
      cursor: pointer;
    }
    .menu-item:hover { background: var(--primary-light); color: var(--primary); }
    .menu-item svg { opacity: 0.7; }

    /* --- MODAL UPDATE SOURCE SPECIFIC --- */
    .source-card { 
      border: 1px solid var(--border); 
      border-radius: 14px; padding: 20px; 
      background: #fff; transition: var(--transition);
    }
    .source-card:hover { border-color: var(--primary); }
    .source-card h4 { margin: 0 0 15px 0; display: flex; align-items: center; gap: 10px; font-size: 16px;}
    .source-meta { font-size: 11px; color: var(--text-muted); line-height: 1.6; margin-bottom: 15px; }
    .btn-proc-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .btn-proc { 
      padding: 8px; font-size: 11px; font-weight: 700; border-radius: 8px; 
      cursor: pointer; border: 1px solid var(--border); background: white;
    }
    .btn-proc.primary { background: var(--primary); color: white; border: none; }

    @media (max-width: 768px) {
      .data-card { grid-template-columns: 1fr; }
      .card-main { border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
      .data-details { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR NAVIGATION & OVERLAY -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
<nav id="sidebar" class="sidebar">
  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 30px;">
    <h2 style="font-size: 18px; margin:0;">Control Panel</h2>
    <button onclick="toggleSidebar()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
  </div>
  
  <a href="./application/dashboard/index.html" class="menu-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
    Dashboard Pengajuan
  </a>

  <button onclick="toggleFilters(); toggleSidebar();" class="menu-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
    Advanced Filters
  </button>

  <button onclick="openUpdateSourceModal(); toggleSidebar();" class="menu-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
    Update Source Data
  </button>
</nav>

<div class="container">
  <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
    <div>
      <h1>Enterprise Capability Web</h1>
      <div id="dataStatus">Connecting to secure data source...</div>
    </div>
    
    <button class="burger-btn" onclick="toggleSidebar()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </header>
  
  <div id="dashboard">
    <div class="controls-wrapper">
      <!-- Premium Search Bar -->
      <div class="search-container">
        <div class="search-input-box">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="globalSearch" type="text" placeholder="Search components, part numbers, or descriptions..." />
        </div>
        <button id="searchBtn" class="btn btn-primary">Search Data</button>
      </div>

      <div class="meta-bar">
        <div class="pagination-wrap">
          <select id="rowsPerPage" class="btn">
            <option value="10">10 per page</option>
            <option value="50">50 per page</option>
            <option value="100">100 per page</option>
            <option value="all">Show All</option>
          </select>
          <div class="pagination-wrap">
            <button id="prevPage" class="btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
            <span id="pageInfo">1 of 1</span>
            <button id="nextPage" class="btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
          </div>
        </div>

        <div style="display:flex; gap: 10px;">
          <!-- Button Advanced Filters sudah dipindah ke Sidebar (NNA) -->
          <div class="btn" style="padding: 0 12px; gap: 4px;">
            <span style="font-size: 12px; color: var(--text-muted)">Go:</span>
            <input id="gotoPage" type="number" style="width: 40px; border: none; outline: none; background: transparent; font-weight: 600;">
          </div>
        </div>
      </div>
    </div>

    <!-- Filter Panel (Populated by JS) -->
    <div id="filterRow" style="display:none;"></div>

    <!-- Data Container (Cards rendered here) -->
    <div id="tableBody"></div>

    <!-- Footer Action Bar -->
    <div style="display:flex; justify-content:flex-end; align-items:center; margin-top: 40px; gap:12px;">
      <button id="actionBtn" class="btn">Toggle Selection</button>
      <button id="exportBtn" class="btn btn-primary" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Export Selection
      </button>
    </div>
  </div>
</div>

<!-- Placeholder for JS Compatibility -->
<table id="dataTable" style="display:none;"><thead id="headerRow"></thead></table>
<div id="actionHeader" style="display:none;"></div>

<!-- LOADER -->
<div id="loader" class="loader-overlay">
  <div class="spinner"></div>
  <div style="font-size:15px; color: var(--text-main); font-weight: 600;">Processing Capability List...</div>
</div>
  
<script src="../auth/script.js"></script>
  <script>
    /** 
     * ENTERPRISE CAPABILITY LOGIC - FIXED FOR MULTILINE SUMMARY & GREEN INDICATORS
     */
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbycaGtEDv-GXxAIlfGv26tYUc1IAUY2MRIgJq1IUbBdP_VrJnvA_B-6-GdRbW2RKKtJ/exec";
    
    // Mapping: 0:NO, 1:AUTH, 2:RATING, 3:ATA, 4:SHOP, 5:PN, 6:NAME, 7:MANUF, 8:REF, 14:A/C TYPE, 15:SUMMARY, 16:STATUS
    const DISPLAY_COLS = [0, 1, 2, 3, 4, 5, 6, 7, 8, 14, 15, 16];
    
    let rawData = [];
    let viewData = [];
    let colNames = [];
    let currentPage = 1;
    let rowsPerPage = 10;
    let filtersVisible = false;
    let globalKeyword = "";
    let columnFilters = {};
    let actionMode = false;
    
    // 1. Format Logo
    function formatLogoValue(val) {
      if (!val) return '—';
      const cleanVal = String(val).trim().toUpperCase();
      const logos = {
        'DGCA': '../pricing/assets/DGCA_Logo.png',
        'EASA': '../pricing/assets/EASA_Logo.png',
        'FAA': '../pricing/assets/FAA_Logo.png'
      };
      if (logos[cleanVal]) {
        return `<img src="${logos[cleanVal]}" alt="${cleanVal}" class="agency-" title="${cleanVal}">`;
      }
      return val; 
    }
    
    // 2. Stepper Logic: Searches for "Level X" in the multiline string
    function renderCapabilityStepper(authName, summaryText) {
      const cleanAuth = String(authName || "").trim().toUpperCase();
      const textContent = String(summaryText || "");
      
      const AUTHORITY_CONFIG = {
        'EASA': ["Tested", "Repaired", "Modified", "Overhauled"],
        'FAA': ["Inspection", "Testing", "Repair", "Modification", "Overhaul"],
        'DGCA': ["Inspection", "Testing", "Repair", "Modification", "Overhaul"]
      };

      const levels = AUTHORITY_CONFIG[cleanAuth] || AUTHORITY_CONFIG['FAA'];

      let html = `
        <div class="capability-container">
          <div class="authority-tag">MAINTENANCE LEVEL (${cleanAuth})</div>
          <div class="stepper-wrapper">
      `;

      levels.forEach((label, index) => {
        const stepIdx = index + 1;
        // Parsing: Checks if "Level X" exists anywhere in the multiline cell
        const isActive = textContent.includes(`Level ${stepIdx}`); 
        
        html += `
          <div class="step-item ${isActive ? 'active' : ''}">
            <span class="step-label-top">Level ${stepIdx}</span>
            <div class="step-light"></div>
            <span class="step-desc">${label}</span>
          </div>
        `;
      });

      return html + `</div></div>`;
    }
    
    // 3. Loader & General UI
    function showLoader() { document.getElementById("loader").style.display = "flex"; }
    function hideLoader() { document.getElementById("loader").style.display = "none"; }
    function toggleFilters() {
      filtersVisible = !filtersVisible;
      document.getElementById("filterRow").style.display = filtersVisible ? "grid" : "none";
    }
    
    // 4. Fetch Data
    showLoader();
    fetch(`${GAS_API_URL}?action=getCapabilityList`)
      .then(res => res.json())
      .then(rows => {
        colNames = DISPLAY_COLS.map(i => `${rows[0][i] || ""} ${rows[1][i] || ""}`.trim());
        buildFilterInputs(colNames);
        rawData = rows.slice(3).map(r => DISPLAY_COLS.map(i => r[i] ?? ""));
        viewData = rawData;
        
        renderCards(viewData);
        updateDataStatus();
    
        // Use a slight timeout to ensure DOM rendering is complete before hiding
        setTimeout(() => {
          hideLoader();
        }, 100); 
      })
      .catch(err => { 
        console.error(err); 
        document.getElementById("dataStatus").textContent = "Error loading data.";
        hideLoader(); 
      });
    
    // 5. Render Card Display
    function renderCards(data) {
      const container = document.getElementById("tableBody");
      container.innerHTML = "";
      
      if (data.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding: 60px; color: var(--text-light);"><p>No matching records found.</p></div>`;
        return;
      }
    
      let start = 0, end = data.length;
      if (rowsPerPage !== "all") {
        start = (currentPage - 1) * rowsPerPage;
        end = start + rowsPerPage;
      }
    
      data.slice(start, end).forEach((row, rIdx) => {
        const card = document.createElement("div");
        card.className = "data-card";
        const authName = row[1];
        const summaryText = row[10]; // Multi-line text block
    
        const checkHtml = actionMode ? `<div class="selection-area"><input type="checkbox" class="rowCheck" data-index="${start + rIdx}"></div>` : '';
    
        let detailsHtml = "";
        row.forEach((cell, idx) => {
          // Map columns: Rating(2), ATA(3), Shop(4), Part Name(6), Manufacturer(7), AC Type(9), Status(11)
          if ([2,3,4,6,7,9,11].includes(idx)) { 
            const displayValue = (idx === 11) ? formatStatus(cell) : cell;
            detailsHtml += `
              <div class="detail-item">
                <span class="detail-label">${colNames[idx]}</span>
                <span class="detail-value">${displayValue || '—'}</span>
              </div>`;
          }
        });
    
        card.innerHTML = `
          ${checkHtml}
          <div class="card-main">
            <div class="card-header-row">
                <span class="no-badge">${row[0]}</span>
                <div class="vertical-divider"></div>
                ${formatLogoValue(row[1])}
            </div>
            
            <div class="detail-item" style="margin-top: 10px;">
                <span class="detail-label">PART NUMBER</span>
                <div class="detail-value" style="font-size: 18px; font-weight: 700; color: var(--primary);">
                    ${row[5]}
                </div>
            </div>
    
            ${renderCapabilityStepper(authName, summaryText)}
          </div>
    
          <div class="data-details">
            ${detailsHtml}
          </div>
        `;
        container.appendChild(card);
      });
      updatePaginationInfo(data.length);
    }
    
    // 6. Logic Helpers
    function applyAllFilters() {
      showLoader(); // Show loader during filtering
      
      // Wrap in setTimeout to allow the loader to appear before the CPU gets busy
      setTimeout(() => {
        currentPage = 1;
        viewData = rawData.filter(row => {
          const matchesCol = Object.keys(columnFilters).every(idx => String(row[idx]).toLowerCase().includes(columnFilters[idx]));
          const matchesGlobal = !globalKeyword || row.some(cell => String(cell).toLowerCase().includes(globalKeyword));
          return matchesCol && matchesGlobal;
        });
        
        renderCards(viewData);
        updateDataStatus();
        hideLoader();
      }, 50);
    }
    
    function buildFilterInputs(headers) {
      const fRow = document.getElementById("filterRow");
      fRow.innerHTML = "";
      headers.forEach((h, idx) => {
        const field = document.createElement("div");
        field.className = "filter-field";
        field.innerHTML = `<label>${h}</label><input type="text" placeholder="Filter..." data-index="${idx}">`;
        field.querySelector('input').oninput = (e) => {
          columnFilters[idx] = e.target.value.toLowerCase();
          applyAllFilters();
        };
        fRow.appendChild(field);
      });
    }
    
    function updatePaginationInfo(total) {
      const totalPages = rowsPerPage === "all" ? 1 : Math.ceil(total / rowsPerPage) || 1;
      document.getElementById("pageInfo").textContent = `${currentPage} of ${totalPages}`;
      document.getElementById("prevPage").disabled = currentPage <= 1;
      document.getElementById("nextPage").disabled = currentPage >= totalPages;
    }
    
    function updateDataStatus() {
      document.getElementById("dataStatus").textContent = `Displaying ${viewData.length.toLocaleString()} records`;
    }
    
    function formatStatus(val) {
      if (!val) return '';
      const status = String(val).trim().toUpperCase();
      let className = 'status-default';
      if (status === 'AVAIL') className = 'status-avail';
      if (status === 'LIMITED') className = 'status-limited';
      return `<span class="status-badge ${className}">${status}</span>`;
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    // 1. Fungsi Fetch Modal (Sangat Ketat terhadap Case-Sensitive)
    async function loadExternalModal() {
      const container = document.getElementById("modalUpdateSourceContainer");
      
      // Pastikan PATH ini sama persis dengan yang ada di GitHub (Perhatikan Huruf Kapitalnya!)
      // Sesuai screenshot: UpdateSource (U besar, S besar)
      const targetPath = "application/dashboard/modal/UpdateSource/index.html";
      
      try {
        console.log("Mencoba memuat modal dari path:", targetPath);
        const response = await fetch(targetPath);
        
        if (!response.ok) {
          throw new Error(`Gagal memuat file (Status: ${response.status}). Pastikan path benar!`);
        }
        
        const html = await response.text();
        container.innerHTML = html;
        
        // Injeksi Script agar fungsi di dalam modal bisa terbaca oleh Browser
        const scripts = container.querySelectorAll("script");
        scripts.forEach(oldScript => {
          const newScript = document.createElement("script");
          Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
          newScript.appendChild(document.createTextNode(oldScript.innerHTML));
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });
        
        console.log("Modal Berhasil Dimuat.");
        return true;
      } catch (err) {
        console.error("Fetch Error:", err);
        return false;
      }
    }
    
    function openUpdateSourceModal() {
      // 1. Cek apakah modal sudah ada di halaman
      let modal = document.getElementById("sourceModal");
      
      if (modal) {
        modal.style.display = "flex";
        if (typeof loadSourceCards === "function") loadSourceCards(); 
      } else {
        // 2. Jika belum ada, ambil file HTML-nya
        loadExternalModal().then((success) => {
          if (success) {
            // Beri jeda 100ms agar browser selesai merender HTML baru
            setTimeout(() => {
              const newModal = document.getElementById("sourceModal");
              if (newModal) {
                newModal.style.display = "flex";
                if (typeof loadSourceCards === "function") loadSourceCards();
              } else {
                alert("Error: File ditemukan, tapi ID 'sourceModal' tidak ada di dalamnya.");
              }
            }, 100);
          } else {
            alert("Gagal memuat modal. Pastikan folder 'UpdateSource' ada di GitHub dan path benar.");
          }
        });
      }
    }
    
    // 3. Fungsi untuk menutup modal (Tambahkan ini agar tombol Close di modal berfungsi)
    function closeUpdateSourceModal() {
      const modal = document.getElementById("sourceModal");
      if (modal) modal.style.display = "none";
    }
    
    // Opsional: Muat modal di awal (Background load) agar saat klik tombol terasa instan
    window.addEventListener('DOMContentLoaded', loadExternalModal);
    
    // 7. Events
    document.getElementById("searchBtn").onclick = () => {
      globalKeyword = document.getElementById("globalSearch").value.trim().toLowerCase();
      applyAllFilters();
    };
    
    document.getElementById("globalSearch").onkeyup = (e) => { if (e.key === "Enter") document.getElementById("searchBtn").click(); };
    document.getElementById("rowsPerPage").onchange = (e) => {
      rowsPerPage = e.target.value === "all" ? "all" : Number(e.target.value);
      currentPage = 1;
      renderCards(viewData);
    };
    document.getElementById("prevPage").onclick = () => { if (currentPage > 1) { currentPage--; renderCards(viewData); } };
    document.getElementById("nextPage").onclick = () => { 
      const totalPages = rowsPerPage === "all" ? 1 : Math.ceil(viewData.length / rowsPerPage);
      if (currentPage < totalPages) { currentPage++; renderCards(viewData); } 
    };
    document.getElementById("actionBtn").onclick = () => {
      actionMode = !actionMode;
      document.getElementById("exportBtn").style.display = actionMode ? "inline-flex" : "none";
      renderCards(viewData);
    };
  </script>
</body>
</html>
