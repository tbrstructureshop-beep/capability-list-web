<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AeroCore | Component Capability Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Typography: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      /* Enterprise Color System */
      --primary: #3c92a6;
      --primary-dark: #2d6f7f;
      --primary-light: #eef6f7;
      --bg: #f3f7f8;
      --card-bg: #ffffff;
      --text-main: #1a202c;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --success: #10b981;
      
      /* Elevation & Spacing */
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.04);
      --radius-lg: 14px;
      --radius-md: 10px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { 
      box-sizing: border-box; 
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* --- Header Section --- */
    header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .header-left h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-main);
      margin: 0 0 8px 0;
    }

    #dataStatus {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #dataStatus::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
    }

    /* --- Search & Controls --- */
    .controls-wrapper {
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .search-container {
      position: relative;
      display: flex;
      gap: 12px;
    }

    #globalSearch {
      width: 100%;
      padding: 16px 20px 16px 52px;
      font-size: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      outline: none;
    }

    #globalSearch:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    /* --- Modern Data View (Replacing Table) --- */
    #dataTable {
      display: block; /* Break table structure */
      width: 100%;
    }

    /* Hide the original header row but keep filter row as a panel */
    #headerRow { display: none; }
    
    #filterRow {
      display: none; /* Controlled by JS */
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      padding: 20px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    #filterRow th {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
      text-align: left;
    }

    #filterRow input {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }

    /* --- The Data "Card" --- */
    #tableBody {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #tableBody tr {
      display: block;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      border: 1px solid var(--border);
      transition: var(--transition);
      position: relative;
      box-shadow: var(--shadow-sm);
    }

    #tableBody tr:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    /* Styling internal "cells" as a grid */
    #tableBody td {
      display: inline-block;
      padding: 0;
      border: none;
      vertical-align: top;
    }

    /* Grid Layout for Desktop Card Content */
    .card-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 24px;
      width: 100%;
    }

    .data-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .data-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    .data-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
    }

    .data-value.highlight {
      font-weight: 700;
      color: var(--primary);
      font-size: 18px;
    }

    /* --- Buttons & Inputs --- */
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-main);
    }

    .btn:hover {
      background: #f8fafc;
      border-color: var(--text-light);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      box-shadow: 0 4px 12px rgba(60, 146, 166, 0.3);
    }

    /* --- Selection Mode --- */
    .row-selector {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    /* --- Pagination --- */
    .pagination {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
    }

    .page-info {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* --- Loader --- */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--primary-light);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Responsive --- */
    @media (max-width: 1024px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .search-container { flex-direction: column; }
      .card-grid { grid-template-columns: 1fr; gap: 16px; }
      .toolbar { width: 100%; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-left">
      <h1>AeroCore Dashboard</h1>
      <div id="dataStatus">Syncing active inventory...</div>
    </div>
    <div class="header-right">
      <button id="actionBtn" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Selection Mode
      </button>
    </div>
  </header>

  <div class="controls-wrapper">
    <div class="search-container">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="globalSearch" type="text" placeholder="Search by Part Number, Model, or Component description..." />
      <button id="searchBtn" class="btn btn-primary">Run Search</button>
    </div>

    <div class="toolbar">
      <div style="display: flex; gap: 12px; align-items: center;">
        <button onclick="toggleFilters()" class="btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
          Advanced Filters
        </button>
        <select id="rowsPerPage" class="btn" style="min-width: 130px;">
          <option value="10">Show 10 Rows</option>
          <option value="50">Show 50 Rows</option>
          <option value="100">Show 100 Rows</option>
          <option value="all">Display All</option>
        </select>
      </div>

      <div style="display: flex; gap: 8px; align-items: center;">
        <span class="page-info">Jump to:</span>
        <input id="gotoPage" type="number" class="btn" style="width: 70px; padding: 10px;">
      </div>
    </div>
  </div>

  <!-- MAIN DATA VIEW -->
  <div id="dashboard">
    <div class="table-card">
      <table id="dataTable">
        <thead>
          <tr id="headerRow"></tr> <!-- Hidden via CSS but needed for JS -->
          <tr id="filterRow"></tr> <!-- Styled as a panel via CSS -->
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="pagination">
      <button id="prevPage" class="btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Previous
      </button>
      <span id="pageInfo" class="page-info">Page 1 of 1</span>
      <button id="nextPage" class="btn">
        Next
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- FOOTER ACTIONS -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border);">
      <div style="font-size: 13px; color: var(--text-light); font-weight: 500;">
        AeroCore Enterprise v2.4 • System Reference: 10 JAN 2026
      </div>
      <button id="exportBtn" class="btn btn-primary" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Selected Data (.xlsx)
      </button>
    </div>
  </div>
</div>

<!-- LOADER -->
<div id="loader" class="loader-overlay">
  <div class="spinner"></div>
  <div style="font-size:16px; color: var(--text-main); font-weight: 600; letter-spacing: -0.01em;">Processing Data Stream...</div>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbycaGtEDv-GXxAIlfGv26tYUc1IAUY2MRIgJq1IUbBdP_VrJnvA_B-6-GdRbW2RKKtJ/exec";
const DISPLAY_COLS = [0,1,2,3,4,5,6,7,8,14,15];

let rawData = [];
let viewData = [];
let headerNames = []; // Store header strings for card labels
let currentPage = 1;
let rowsPerPage = 10;
let filtersVisible = false;
let globalKeyword = "";
let columnFilters = {};
let actionMode = false;

function showLoader() { document.getElementById("loader").style.display = "flex"; }
function hideLoader() { document.getElementById("loader").style.display = "none"; }

function toggleFilters() {
  const row = document.getElementById("filterRow");
  filtersVisible = !filtersVisible;
  row.style.display = filtersVisible ? "grid" : "none";
}

// FETCH DATA ON LOAD
showLoader();
fetch(`${GAS_API_URL}?action=getCapabilityList`)
  .then(res => res.json())
  .then(rows => {
    headerNames = DISPLAY_COLS.map(i => `${rows[0][i] || ""} ${rows[1][i] || ""}`.trim());
    buildHeader(headerNames);
    rawData = rows.slice(3).map(r => DISPLAY_COLS.map(i => r[i] ?? ""));
    viewData = rawData;
    renderTable(viewData);
    updateDataStatus();
    hideLoader();
  })
  .catch(err => { console.error(err); hideLoader(); });

function buildHeader(headers) {
  const hRow = document.getElementById("headerRow");
  const fRow = document.getElementById("filterRow");
  hRow.innerHTML = ""; fRow.innerHTML = "";

  // Hidden Action Header
  const actionTh = document.createElement("th");
  actionTh.style.display = "none";
  actionTh.id = "actionHeader";
  actionTh.innerHTML = `<input type="checkbox" id="selectAll">`;
  hRow.appendChild(actionTh);

  headers.forEach((h, idx) => {
    const th = document.createElement("th");
    th.textContent = h;
    hRow.appendChild(th);

    // Filter panel items
    const filterTh = document.createElement("th");
    filterTh.innerHTML = `<label>${h}</label>`;
    const input = document.createElement("input");
    input.placeholder = `Filter...`;
    input.dataset.index = idx;
    input.oninput = (e) => {
      columnFilters[idx] = e.target.value.toLowerCase();
      applyAllFilters();
    };
    filterTh.appendChild(input);
    fRow.appendChild(filterTh);
  });
}

function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  
  if (data.length === 0) {
    tbody.innerHTML = `<div style="text-align:center; padding: 60px; color: var(--text-light); background: white; border-radius: 14px; border: 1px dashed var(--border);">No matching components found in registry.</div>`;
    return;
  }

  let start = 0, end = data.length;
  if (rowsPerPage !== "all") {
    start = (currentPage - 1) * rowsPerPage;
    end = start + rowsPerPage;
  }

  data.slice(start, end).forEach((row, rIdx) => {
    const tr = document.createElement("tr");
    
    // Selection checkbox
    const selectionHtml = actionMode 
      ? `<input type="checkbox" class="row-selector rowCheck" data-index="${start + rIdx}">` 
      : "";

    // Build Internal Card Grid
    let cardContent = `<div class="card-grid">`;
    row.forEach((cell, cIdx) => {
      const isPrimary = cIdx === 0 || cIdx === 1; // Highlight PN and Description
      cardContent += `
        <div class="data-item">
          <span class="data-label">${headerNames[cIdx]}</span>
          <span class="data-value ${isPrimary ? 'highlight' : ''}">${cell || '—'}</span>
        </div>`;
    });
    cardContent += `</div>`;
    
    tr.innerHTML = selectionHtml + cardContent;
    tbody.appendChild(tr);
  });
  updatePaginationInfo(data.length);
}

function applyAllFilters() {
  currentPage = 1;
  let filtered = rawData.filter(row => {
    const matchesCol = Object.keys(columnFilters).every(idx => String(row[idx]).toLowerCase().includes(columnFilters[idx]));
    const matchesGlobal = !globalKeyword || row.some(cell => String(cell).toLowerCase().includes(globalKeyword));
    return matchesCol && matchesGlobal;
  });
  viewData = filtered;
  renderTable(viewData);
  updateDataStatus();
}

function updatePaginationInfo(total) {
  const totalPages = rowsPerPage === "all" ? 1 : Math.ceil(total / rowsPerPage) || 1;
  document.getElementById("pageInfo").textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById("prevPage").disabled = currentPage <= 1;
  document.getElementById("nextPage").disabled = currentPage >= totalPages;
}

function updateDataStatus() {
  const filtered = viewData.length;
  document.getElementById("dataStatus").textContent = `${filtered.toLocaleString()} results found`;
}

// EVENTS
document.getElementById("searchBtn").onclick = () => {
  globalKeyword = document.getElementById("globalSearch").value.trim().toLowerCase();
  applyAllFilters();
};

document.getElementById("globalSearch").onkeyup = (e) => {
  if (e.key === "Enter") {
    globalKeyword = e.target.value.trim().toLowerCase();
    applyAllFilters();
  }
};

document.getElementById("rowsPerPage").onchange = (e) => {
  rowsPerPage = e.target.value === "all" ? "all" : Number(e.target.value);
  currentPage = 1;
  renderTable(viewData);
};

document.getElementById("prevPage").onclick = () => { if (currentPage > 1) { currentPage--; renderTable(viewData); } };
document.getElementById("nextPage").onclick = () => { 
  const totalPages = rowsPerPage === "all" ? 1 : Math.ceil(viewData.length / rowsPerPage) || 1;
  if (currentPage < totalPages) { currentPage++; renderTable(viewData); } 
};

document.getElementById("gotoPage").onchange = (e) => {
  const val = parseInt(e.target.value);
  const totalPages = rowsPerPage === "all" ? 1 : Math.ceil(viewData.length / rowsPerPage) || 1;
  if (val > 0 && val <= totalPages) {
    currentPage = val;
    renderTable(viewData);
  }
};

document.getElementById("actionBtn").onclick = () => {
  actionMode = !actionMode;
  document.getElementById("exportBtn").style.display = actionMode ? "inline-flex" : "none";
  document.getElementById("actionBtn").innerHTML = actionMode 
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg> Cancel Selection` 
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg> Selection Mode`;
  renderTable(viewData);
};

document.getElementById("exportBtn").onclick = () => {
  const selected = [...document.querySelectorAll(".rowCheck:checked")].map(cb => viewData[cb.dataset.index]);
  if (!selected.length) return alert("Select at least one card to export.");
  
  const ws = XLSX.utils.aoa_to_sheet([headerNames, ...selected]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Capabilities");
  XLSX.writeFile(wb, "AeroCore_Capabilities_Export.xlsx");
};
</script>
</body>
</html>
