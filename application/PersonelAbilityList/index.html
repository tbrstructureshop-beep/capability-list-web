<script>
/**
 * PERSONNEL ABILITY LIST MODULE
 */
let allPersonnel = [];

async function loadPersonnelDashboard() {
  showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getPersonnelPAL&_=${Date.now()}`);
    allPersonnel = await res.json();
    renderPersonnelCards(allPersonnel);
  } catch (e) {
    console.error("PAL Load Error:", e);
  } finally {
    hideLoader();
  }
}

function renderPersonnelCards(data) {
  const container = document.getElementById("tableBody");
  container.innerHTML = "";
  
  data.forEach(person => {
    const card = document.createElement("div");
    card.className = "data-card";
    card.style.gridTemplateColumns = "1fr 2fr";

    card.innerHTML = `
      <div class="card-main">
        <div style="display:flex; align-items:center; gap:15px;">
           <div style="width:60px; height:60px; background:var(--primary-light); color:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px;">
             ${person.name.charAt(0)}
           </div>
           <div>
             <div style="font-size:11px; font-weight:800; color:var(--text-light); text-transform:uppercase;">Employee ID</div>
             <div style="font-size:18px; font-weight:800; color:var(--text-main);">${person.empId}</div>
           </div>
        </div>
        <div style="margin-top:20px;">
           <div style="font-size:11px; font-weight:800; color:var(--text-light); text-transform:uppercase;">Authorized Scope</div>
           <div style="font-size:28px; font-weight:800; color:var(--primary);">${person.pnCount} <small style="font-size:12px; color:var(--text-muted);">Parts</small></div>
        </div>
      </div>

      <div class="data-details" style="position:relative;">
        <button class="card-menu-btn" title="View Personal Ability List" onclick="openPALDocument('${person.empId}', '${person.name.replace(/'/g, "\\'")}', '${person.jobTitle.replace(/'/g, "\\'")}')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </button>

        <div class="detail-item"><span class="detail-label">Full Name</span><span class="detail-value">${person.name}</span></div>
        <div class="detail-item"><span class="detail-label">Unit</span><span class="detail-value">${person.unit}</span></div>
        <div class="detail-item"><span class="detail-label">Job Title</span><span class="detail-value">${person.jobTitle || '—'}</span></div>
        <div class="detail-item"><span class="detail-label">Stamp No</span><span class="detail-value"><code>${person.stampNo || '—'}</code></span></div>
      </div>
    `;
    container.appendChild(card);
  });
  
  document.getElementById("dataStatus").textContent = `Total Personnel: ${data.length}`;
}
</script>
