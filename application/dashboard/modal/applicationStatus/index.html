<div class="modal-card" style="max-width: 550px; border-radius: 20px; position: relative;">
  <div class="modal-header" style="background: var(--primary-light); border-bottom: 1px solid rgba(60,146,166,0.1);">
    <div>
       <h3 style="margin:0; font-size:16px; color:var(--primary-dark);">Submission Timeline</h3>
       <span id="timelineIdSub" style="font-size:12px; color:var(--text-muted); font-weight:700;"></span>
    </div>
    <!-- REPAIR: Specific Close Function -->
    <button class="close-x" onclick="closeTimelineModal()">&times;</button>
  </div>
  
  <div class="modal-body" style="padding: 24px; min-height: 200px;">
    <!-- INTERNAL LOADER -->
    <div id="timelineLoader" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 40px 0;">
       <div class="spinner" style="width:30px; height:30px; border-width:3px;"></div>
       <p style="font-size:12px; color:var(--text-muted); margin-top:10px;">Generating journey...</p>
    </div>

    <!-- TIMELINE CONTAINER -->
    <div id="timelineContainer" style="display:none; position:relative; padding-left:30px; border-left:2px solid var(--border); margin-left:10px;">
      <!-- Timeline Items Injected -->
    </div>
  </div>
</div>

<style>
  .t-item { position: relative; margin-bottom: 24px; animation: modalSlideUp 0.3s ease forwards; }
  .t-dot { position: absolute; left: -41px; top: 0; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; }
  .t-date { font-size: 10px; font-weight: 800; color: var(--text-light); text-transform: uppercase; }
  .t-user { font-size: 11px; font-weight: 700; color: var(--primary); }
  .t-action { font-size: 14px; font-weight: 700; margin: 5px 0; color: var(--text-main); }
  .t-reason { font-size: 13px; color: var(--text-muted); background: #f9fafb; padding: 10px; border-radius: 8px; border: 1px solid #eee; font-style: italic; }
  .t-status { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 10px; }
</style>

<script>
/**
 * REPAIR: Function with Attachment Injection inside Timeline
 */
function initTimeline(data) {
  const container = document.getElementById('timelineContainer');
  const titleEl = document.getElementById('timelineIdSub');
  if (titleEl) titleEl.textContent = `${data.id} | PN: ${data.partNumber}`;
  
  setTimeout(() => {
    if (!data.history || data.history.length === 0) {
      container.innerHTML = `<p style="text-align:center;">No journey logs.</p>`;
    } else {
      // Balik urutan: Terbaru di atas
      const history = [...data.history].reverse();
      
      container.innerHTML = history.map((h, i) => {
        // Tampilkan file jika ada di record history ini, 
        // atau tampilkan di awal jika ini baris submission asli
        const isOriginalSubmission = (i === history.length - 1);
        const historyFiles = h.files ? JSON.stringify(h.files) : null;

        return `
          <div class="t-item">
            <div class="t-dot" style="border-color: ${i===0 ? 'var(--primary)' : '#cbd5e1'}"></div>
            <div style="display:flex; justify-content:space-between;">
              <span class="t-date">${h.date}</span>
              <span class="t-status" style="background:#eef7f9; color:var(--primary);">${h.status}</span>
            </div>
            <div class="t-user">${h.user}</div>
            <div class="t-action">${h.action}</div>
            
            ${historyFiles ? `
              <div style="margin-top:8px; padding:8px; background:#f0fdf4; border-radius:6px; border:1px solid #bbf7d0;">
                <span style="font-size:9px; font-weight:800; color:#15803d;">ATTACHMENT UPDATED:</span>
                <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px;">
                  ${renderFileList(historyFiles)}
                </div>
              </div>
            ` : ''}

            ${isOriginalSubmission && !h.files ? `
              <div style="margin-top:8px; padding:8px; background:#f9fafb; border-radius:6px; border:1px solid #eee;">
                <span style="font-size:9px; font-weight:800; color:var(--text-light);">ORIGINAL ATTACHMENTS:</span>
                <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px;">
                  ${renderFileList(data.fileUrl)}
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
    document.getElementById('timelineLoader').style.display = 'none';
    container.style.display = 'block';
  }, 400);
}

function closeTimelineModal() {
  const modal = document.getElementById("timelineModalOverlay");
  if (modal) modal.style.display = "none";
}
</script>
