<div class="modal-card" style="max-width: 550px;">
  <div class="modal-header" style="background:var(--primary-light)">
    <div>
       <h3 style="margin:0; font-size:16px;">Submission Timeline</h3>
       <span id="timelineIdSub" style="font-size:12px; color:var(--text-muted); font-weight:700;"></span>
    </div>
    <button class="close-x" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <div id="timelineContainer" style="position:relative; padding-left:30px; border-left:2px solid var(--border); margin-left:10px;">
      <!-- Timeline Items Injected -->
    </div>
  </div>
</div>

<style>
  .t-item { position: relative; margin-bottom: 24px; }
  .t-dot { position: absolute; left: -41px; top: 0; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; }
  .t-date { font-size: 10px; font-weight: 800; color: var(--text-light); text-transform: uppercase; }
  .t-user { font-size: 11px; font-weight: 700; color: var(--primary); }
  .t-action { font-size: 14px; font-weight: 700; margin: 5px 0; color: var(--text-main); }
  .t-reason { font-size: 13px; color: var(--text-muted); background: #f9fafb; padding: 10px; border-radius: 8px; border: 1px solid #eee; font-style: italic; }
  .t-status { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
</style>

<script>
function initTimeline(data) {
  document.getElementById('timelineIdSub').textContent = data.id + " | " + data.partNumber;
  const container = document.getElementById('timelineContainer');
  
  // Sort history: Newest (Last) to Oldest
  const history = [...data.history].reverse();
  
  container.innerHTML = history.map((h, i) => `
    <div class="t-item">
      <div class="t-dot" style="border-color: ${i===0 ? 'var(--primary)' : '#cbd5e1'}">
        <div style="width:6px; height:6px; background:${i===0 ? 'var(--primary)' : '#cbd5e1'}; border-radius:50%;"></div>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span class="t-date">${h.date}</span>
        <span class="t-status" style="background:var(--primary-light); color:var(--primary)">${h.status}</span>
      </div>
      <div class="t-user">${h.user}</div>
      <div class="t-action">${h.action}</div>
      ${h.reason ? `<div class="t-reason">"${h.reason}"</div>` : ''}
    </div>
  `).join('');
}
</script>
