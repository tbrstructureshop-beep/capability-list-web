<script>
/**
 * INA LOGIC - FIXED MAPPING (No More Undefined)
 * Mengambil data dari memori 'rawData' di index.html
 */
const AUTH_LEVELS = {
  'EASA': ['Level 1 (Tested)', 'Level 2 (Repaired)', 'Level 3 (Modified)', 'Level 4 (Overhauled)'],
  'FAA': ['Level 1 (Inspection)', 'Level 2 (Testing)', 'Level 3 (Repair)', 'Level 4 (Modification)', 'Level 5 (Overhaul)'],
  'DGCA': ['Level 1 (Inspection)', 'Level 2 (Testing)', 'Level 3 (Repair)', 'Level 4 (Modification)', 'Level 5 (Overhaul)']
};

/**
 * MAPPING INDEX rawData (Berdasarkan DISPLAY_COLS di index.html)
 * 0:NO, 1:AUTH, 2:RATING, 3:ATA, 4:SHOP, 5:PN, 6:NAME, 7:MANUF, 8:REF, 9:A/C TYPE (orig 14), 11:CAT (orig 16)
 */
const LOCAL_IDX = {
  AUTH: 1, 
  SHOP: 4, 
  MANUF: 7, 
  ACTYPE: 9, 
  CAT: 11 
};

// 1. Fungsi Mengisi Datalist (Shop, Manuf, AC Type) secara lokal
function populateDatalists(selectedAuth) {
  const lists = {
    'manufacturer': LOCAL_IDX.MANUF,
    'shop': LOCAL_IDX.SHOP,
    'aircraftType': LOCAL_IDX.ACTYPE
  };

  for (const [id, colIdx] of Object.entries(lists)) {
    const datalist = document.getElementById(`list-${id}`);
    // Cek apakah rawData tersedia di window utama
    const sourceData = (typeof rawData !== 'undefined') ? rawData : [];
    
    if (!datalist || sourceData.length === 0) continue;

    const uniqueValues = [...new Set(sourceData
      .filter(row => !selectedAuth || String(row[LOCAL_IDX.AUTH]).trim().toUpperCase() === selectedAuth.toUpperCase())
      .map(row => String(row[colIdx]).trim())
      .filter(val => val && val !== "" && val !== "—")
    )].sort();

    datalist.innerHTML = uniqueValues.map(v => `<option value="${v}">`).join("");
  }
}

// 2. Fungsi Mengisi Kategori secara lokal
function updateCategoryDropdown(selectedAuth) {
  const catSelect = document.getElementById("caplistItem");
  const sourceData = (typeof rawData !== 'undefined') ? rawData : [];

  if (!selectedAuth || sourceData.length === 0) {
    catSelect.innerHTML = '<option value="">-- Select Authority First --</option>';
    return;
  }

  const categories = [...new Set(sourceData
    .filter(row => String(row[LOCAL_IDX.AUTH]).trim().toUpperCase() === selectedAuth.toUpperCase())
    .map(row => String(row[LOCAL_IDX.CAT]).trim())
    .filter(val => val !== "" && val !== "—" && val !== "undefined")
  )].sort();

  if (categories.length > 0) {
    catSelect.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join("");
  } else {
    catSelect.innerHTML = '<option value="GENERAL">GENERAL</option>';
  }
}

// 3. Handle Perubahan Authority (Ubah Label & List)
function handleAuthorityChange() {
  const auth = document.getElementById("authSelect").value;
  
  // Update Terminologi Label
  const labels = {
    'EASA': { name: "Designation", ref: "Reference of the CMM", model: "Type (Model)" },
    'FAA':  { name: "Part Name", ref: "ATA Chapter", model: "Model" },
    'DGCA': { name: "Part Name", ref: "ATA Chapter", model: "A/C Type" }
  };
  const config = labels[auth] || labels['FAA'];
  document.getElementById("labelPartName").textContent = config.name;
  document.getElementById("labelReference").textContent = config.ref;
  document.getElementById("labelAircraftType").textContent = config.model;

  // Update Maintenance Levels
  const container = document.getElementById("dynamicLevels");
  container.innerHTML = "";
  if(auth && AUTH_LEVELS[auth]) {
    AUTH_LEVELS[auth].forEach(lvl => {
      container.innerHTML += `<label class="level-chip"><input type="checkbox" name="authLevels" value="${lvl}"> ${lvl}</label>`;
    });
  } else {
    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; font-size:12px; color:var(--text-light);">Select authority to load levels</p>`;
  }

  // Sync Datalist & Category secara Lokal
  populateDatalists(auth);
  updateCategoryDropdown(auth);
}

/**
 * Inisialisasi Form (Saat Buka New atau Edit)
 */
function initFormScript(editData) {
  const form = document.getElementById("newCapForm");
  form.reset();
  document.getElementById("fileListPreview").innerHTML = "";
  
  // Set default date hari ini
  document.getElementById("submitDate").value = new Date().toISOString().split('T')[0];

  if (editData) {
    // MODE MANAGE/EDIT
    document.getElementById("formTitle").textContent = "Manage Submission: " + editData.id;
    document.getElementById("mgmtBox").style.display = "block";
    document.getElementById("editId").value = editData.id;
    
    // Requester Info (DIJAGA AGAR TIDAK HILANG)
    document.getElementById("username").value = editData.username || "";
    document.getElementById("unit").value = editData.unit || "";
    if(editData.date) document.getElementById("submitDate").value = editData.date;

    // Load Otoritas Terlebih Dahulu
    document.getElementById("authSelect").value = editData.authority || "";
    handleAuthorityChange(); 

    // Isi Technical Details
    document.getElementById("partNumber").value = editData.partNumber || "";
    document.getElementById("partName").value = editData.partName || "";
    document.getElementById("ataChapter").value = editData.ataChapter || "";
    
    // Isi Dropdown & Datalist (Beri delay kecil agar DOM render selesai)
    setTimeout(() => {
      document.getElementById("caplistItem").value = editData.caplistItem || "";
      document.getElementById("manufacturer").value = editData.manufacturer || "";
      document.getElementById("shop").value = editData.shop || "";
      document.getElementById("aircraftType").value = editData.aircraftType || "";
    }, 200);

    // Management State
    document.getElementById("statusSelect").value = editData.status || "SUBMITTED";
    
    // Check Levels
    const currentLevels = (editData.levels || "").split(", ");
    document.querySelectorAll('input[name="authLevels"]').forEach(cb => {
      if(currentLevels.includes(cb.value)) cb.checked = true;
    });

  } else {
    // MODE NEW APPLICATION
    document.getElementById("formTitle").textContent = "New Capability Application";
    document.getElementById("mgmtBox").style.display = "none";
    document.getElementById("editId").value = "";
    handleAuthorityChange(); // Populate datalists dengan kondisi kosong
  }
}

let uploadedFiles = [];
function handleMultiFile(input) {
  const preview = document.getElementById("fileListPreview");
  preview.innerHTML = "";
  uploadedFiles = [];
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedFiles.push({ name: file.name, data: e.target.result.split(',')[1] });
      preview.innerHTML += `<div style="font-size:11px; color:var(--success); background:#f0fdf4; padding:5px 10px; border-radius:6px; border:1px solid #bbf7d0;">✅ ${file.name}</div>`;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById("fileCountLabel").textContent = input.files.length + " files selected";
}

function submitForm() {
  // Logika submitForm Anda tetap sama, pastikan mengambil nilai dari id-id yang benar
}
</script>
