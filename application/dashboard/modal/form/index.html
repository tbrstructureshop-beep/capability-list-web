<style>
  /* Premium Modal Styling */
  .modal-card { background: #fff; width: 100%; max-width: 850px; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-md); position: relative; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; max-height: 80vh; }
  
  .section-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin: 20px 0 12px 0; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .section-divider { border-top: 1px solid var(--border); margin: 20px 0; padding-top: 15px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; position: relative; } /* Added Relative for Advice */
  .form-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; width: 100%; box-sizing: border-box; }
  
  /* GOOGLE SEARCH STYLE ADVICE (Custom Dropdown) */
  .advice-container {
    position: absolute; top: 100%; left: 0; width: 100%; background: #fff;
    border: 1px solid var(--border); border-radius: 0 0 12px 12px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 9999;
    max-height: 200px; overflow-y: auto; display: none; margin-top: -2px;
  }
  .advice-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f9fafb; }
  .advice-item:hover { background: var(--primary-light); color: var(--primary); }
  .advice-item:last-child { border-bottom: none; }

  .level-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; padding: 15px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
  .level-chip { display: flex; align-items: center; gap: 10px; background: #fff; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; }
  .mgmt-section { background: #fff7ed; border: 1px solid #fed7aa; padding: 20px; border-radius: 14px; margin-bottom: 24px; }
  .file-dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; background: var(--primary-light); cursor: pointer; transition: 0.2s; }
</style>

<div class="modal-card">
  <div class="modal-header">
    <h3 class="modal-title" id="formTitle">New Capability Application</h3>
    <button class="close-x" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <form id="newCapForm" autocomplete="off">
      <input type="hidden" id="editId">

      <div id="mgmtBox" class="mgmt-section" style="display:none;">
        <div class="section-title" style="color:#c2410c; margin-top:0;">Management Control</div>
        <div class="form-row">
           <div class="form-group">
             <label>Status</label>
             <select id="statusSelect">
                <option value="SUBMITTED">OPEN: SUBMITTED</option>
                <option value="UNDER REVIEW">PROGRESS: UNDER REVIEW</option>
                <option value="APPROVED">CLOSED: APPROVED</option>
                <option value="REJECTED">CLOSED: REJECTED</option>
             </select>
           </div>
           <div class="form-group"><label>Reviewer Name</label><input type="text" id="reviewerName"></div>
        </div>
        <div class="form-group" style="margin-top:10px;"><label>Remarks</label><textarea id="statusReason" rows="2"></textarea></div>
      </div>

      <div class="section-title">Requester Info</div>
      <div class="form-row">
        <div class="form-group"><label>Nama Pengaju</label><input type="text" id="username" required></div>
        <div class="form-group"><label>Unit Pengaju</label><input type="text" id="unit" required></div>
      </div>
      <div class="form-group"><label>Tanggal Pengajuan</label><input type="date" id="submitDate" required></div>

      <div class="section-title">Certification & Authority</div>
      <div class="form-row">
        <div class="form-group">
          <label>Select Authority</label>
          <select id="authSelect" required onchange="handleAuthorityChange()" style="border:1.5px solid var(--primary);">
            <option value="">-- Choose --</option>
            <option value="DGCA">DGCA</option>
            <option value="EASA">EASA</option>
            <option value="FAA">FAA</option>
          </select>
        </div>
        <div class="form-group">
          <label>Capability Category</label>
          <select id="caplistItem" required><option value="">-- Select Authority First --</option></select>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="section-title">Technical Detail Component</div>
      <div class="form-row">
        <div class="form-group"><label>Part Number</label><input type="text" id="partNumber" required placeholder="N/A"></div>
        <div class="form-group"><label id="labelPartName">Part Name</label><input type="text" id="partName" required placeholder="N/A"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Manufacturer</label>
          <input type="text" id="manufacturer" oninput="showAdvice(this, 'MANUF')" placeholder="Search or type...">
          <div id="advice-MANUF" class="advice-container"></div>
        </div>
        <div class="form-group"><label id="labelReference">ATA Chapter</label><input type="text" id="ataChapter" required placeholder="N/A"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Shop / Work Center</label>
          <input type="text" id="shop" oninput="showAdvice(this, 'SHOP')" placeholder="Search or type...">
          <div id="advice-SHOP" class="advice-container"></div>
        </div>
        <div class="form-group">
          <label id="labelAircraftType">A/C Type (Model)</label>
          <input type="text" id="aircraftType" oninput="showAdvice(this, 'ACTYPE')" placeholder="Search or type...">
          <div id="advice-ACTYPE" class="advice-container"></div>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="section-title">Requested Levels</div>
      <div id="dynamicLevels" class="level-options"></div>
      <div class="section-title">Attachments</div>
      <div class="file-dropzone" onclick="document.getElementById('fileInput').click()"><div id="fileCountLabel">Click to upload PDF</div><input type="file" id="fileInput" multiple accept=".pdf" style="display:none;" onchange="handleMultiFile(this)" /></div>
      <div id="fileListPreview" style="margin-top:15px; display:flex; flex-wrap:wrap; gap:10px;"></div>
    </form>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button id="btnSubmitForm" class="btn btn-primary" onclick="submitForm()">Save & Submit</button>
  </div>
</div>

<script>
/** 
 * INA LOGIC - Mapping rawData (Index Sync)
 */
const MODAL_MAP = { AUTH: 1, SHOP: 4, NAME: 6, MANUF: 7, REF: 8, ACTYPE: 9, CAT: 11 };

// 1. GENERATOR ADVICE (Google Search Style)
function showAdvice(el, type) {
  const container = document.getElementById(`advice-${type}`);
  const val = el.value.trim().toUpperCase();
  const auth = document.getElementById("authSelect").value;
  
  if (!val || typeof rawData === 'undefined') { container.style.display = 'none'; return; }

  const colIdx = MODAL_MAP[type];
  const suggestions = [...new Set(rawData
    .filter(row => (!auth || String(row[MODAL_MAP.AUTH]).toUpperCase() === auth.toUpperCase()) && String(row[colIdx]).toUpperCase().includes(val))
    .map(row => String(row[colIdx]).trim())
    .filter(v => v && v !== "—")
  )].sort().slice(0, 8); // Max 8 Advice

  if (suggestions.length > 0) {
    container.innerHTML = suggestions.map(s => `<div class="advice-item" onclick="selectAdvice('${el.id}', '${s.replace(/'/g, "\\'")}')">${s}</div>`).join("");
    container.style.display = 'block';
  } else {
    container.style.display = 'none';
  }
}

function selectAdvice(id, val) {
  document.getElementById(id).value = val;
  document.querySelectorAll('.advice-container').forEach(c => c.style.display = 'none');
}

// Tutup advice jika klik di luar
document.addEventListener('click', (e) => {
  if (!e.target.closest('.form-group')) document.querySelectorAll('.advice-container').forEach(c => c.style.display = 'none');
});

function initFormScript(editData) {
  const form = document.getElementById("newCapForm");
  form.reset();
  document.getElementById("fileListPreview").innerHTML = "";

  if (editData) {
    // FIX UNDEFINED: Gunakan Operator OR (||) untuk fallback ke string kosong
    document.getElementById("formTitle").textContent = "Manage: " + (editData.id || "N/A");
    document.getElementById("mgmtBox").style.display = "block";
    document.getElementById("editId").value = editData.id || "";
    document.getElementById("username").value = editData.username || "";
    document.getElementById("unit").value = editData.unit || "";
    document.getElementById("submitDate").value = editData.date || "";
    document.getElementById("authSelect").value = editData.authority || "";
    
    handleAuthorityChange();
    
    setTimeout(() => {
      document.getElementById("caplistItem").value = editData.caplistItem || "";
      document.getElementById("manufacturer").value = editData.manufacturer || "N/A";
      document.getElementById("shop").value = editData.shop || "N/A";
      document.getElementById("aircraftType").value = editData.aircraftType || "N/A";
    }, 200);

    document.getElementById("partNumber").value = editData.partNumber || "N/A";
    document.getElementById("partName").value = editData.partName || "N/A";
    document.getElementById("ataChapter").value = editData.ataChapter || "N/A";
    document.getElementById("statusSelect").value = editData.status || "SUBMITTED";
  } else {
    // PENGJUAN BARU: Auto Generate ID Sementara
    const tempId = "CAP-" + Math.floor(100000 + Math.random() * 900000);
    document.getElementById("formTitle").textContent = "New App: " + tempId;
    document.getElementById("mgmtBox").style.display = "none";
    document.getElementById("submitDate").value = new Date().toISOString().split('T')[0];
  }
}

// Fungsi handleAuthorityChange & updateCategoryDropdown (Tetap Sama Seperti Sebelumnya)
// ... (Sesuai Logic sebelumnya agar tidak Ruin)
</script>
