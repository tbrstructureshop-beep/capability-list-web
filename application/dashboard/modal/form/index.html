<style>
  /* Premium Modal Styling */
  .modal-card { background: #fff; width: 100%; max-width: 850px; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-md); position: relative; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; max-height: 80vh; }
  
  .section-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin: 20px 0 12px 0; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .section-divider { border-top: 1px solid var(--border); margin: 20px 0; padding-top: 15px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; position: relative; } /* position relative untuk search advice */
  .form-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; width: 100%; box-sizing: border-box; }
  
  /* --- GOOGLE SEARCH ADVICE STYLE (INA) --- */
  .search-advice-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: var(--shadow-md);
    z-index: 9999; max-height: 200px; overflow-y: auto;
    margin-top: 4px; display: none;
  }
  .advice-item { padding: 10px 14px; font-size: 13px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f9fafb; }
  .advice-item:last-child { border-bottom: none; }
  .advice-item:hover { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }

  .level-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; padding: 15px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
  .level-chip { display: flex; align-items: center; gap: 10px; background: #fff; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: 0.2s; }
  .level-chip:hover { border-color: var(--primary); background: var(--primary-light); }

  .mgmt-section { background: #fff7ed; border: 1px solid #fed7aa; padding: 20px; border-radius: 14px; margin-bottom: 24px; }
  .file-dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; background: var(--primary-light); cursor: pointer; transition: 0.2s; }
</style>

<div class="modal-card">
  <div class="modal-header">
    <h3 class="modal-title" id="formTitle">New Capability Application</h3>
    <button class="close-x" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <form id="newCapForm" autocomplete="off">
      <input type="hidden" id="editId">

      <!-- STEP 0: MANAGEMENT CONTROL -->
      <div id="mgmtBox" class="mgmt-section" style="display:none;">
        <div class="section-title" style="color:#c2410c; margin-top:0;">Management Control</div>
        <div class="form-row">
           <div class="form-group">
             <label>Status</label>
             <select id="statusSelect">
                <option value="SUBMITTED">OPEN: SUBMITTED</option>
                <option value="UNDER REVIEW">PROGRESS: UNDER REVIEW</option>
                <option value="APPROVED">CLOSED: APPROVED</option>
                <option value="REJECTED">CLOSED: REJECTED</option>
             </select>
           </div>
           <div class="form-group">
             <label>Reviewer Name</label>
             <input type="text" id="reviewerName">
           </div>
        </div>
        <div class="form-group" style="margin-top:10px;">
          <label>Remarks / Reason</label>
          <textarea id="statusReason" rows="2"></textarea>
        </div>
      </div>

      <!-- STEP 1: REQUESTER INFO -->
      <div class="section-title">Requester Info</div>
      <div class="form-row">
        <div class="form-group"><label>Nama Pengaju</label><input type="text" id="username" required></div>
        <div class="form-group"><label>Unit Pengaju</label><input type="text" id="unit" required></div>
      </div>
      <div class="form-group">
        <label>Tanggal Pengajuan</label>
        <input type="date" id="submitDate" required>
      </div>

      <!-- STEP 2: AUTHORITY & CATEGORY (REPAIRED) -->
      <div class="section-title">Certification & Authority</div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Select Authority</label>
          <select id="authSelect" required onchange="handleAuthorityChange()" style="border:1.5px solid var(--primary);">
            <option value="">-- Choose Authority --</option>
            <option value="DGCA">DGCA (Indonesia)</option>
            <option value="EASA">EASA (Europe)</option>
            <option value="FAA">FAA (USA)</option>
          </select>
        </div>

        <!-- NEW: Rating Field with Autocomplete (Paired with Authority) -->
        <div class="form-group" id="ratingGroup" style="display:none;">
          <label>Rating</label>
          <input type="text" id="rating" oninput="showAdvice(this, 2)" placeholder="Search or type Rating (e.g. C1)..." autocomplete="off">
          <div class="search-advice-list" id="advice-rating"></div>
        </div>
      </div>

      <div class="form-row" style="margin-top: 12px;">
        <div class="form-group">
          <label>Capability Category</label>
          <select id="caplistItem" required>
            <option value="">-- Select Authority First --</option>
          </select>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- STEP 3: TECHNICAL DETAILS (With Custom Autocomplete) -->
      <div class="section-title">Technical Detail Component</div>
      <div class="form-row">
        <div class="form-group"><label>Part Number</label><input type="text" id="partNumber" required placeholder="PN..."></div>
        <div class="form-group"><label id="labelPartName">Part Name</label><input type="text" id="partName" required placeholder="Description..."></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Manufacturer</label>
          <input type="text" id="manufacturer" oninput="showAdvice(this, 7)" placeholder="Search or type new...">
          <div class="search-advice-list" id="advice-manufacturer"></div>
        </div>
        <div class="form-group">
          <label id="labelReference">ATA Chapter</label>
          <input type="text" id="ataChapter" required placeholder="ATA...">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Shop / Work Center</label>
          <input type="text" id="shop" oninput="showAdvice(this, 4)" placeholder="Search or type new...">
          <div class="search-advice-list" id="advice-shop"></div>
        </div>
        <div class="form-group">
          <label id="labelAircraftType">A/C Type (Model)</label>
          <input type="text" id="aircraftType" oninput="showAdvice(this, 9)" placeholder="Search or type new...">
          <div class="search-advice-list" id="advice-aircraftType"></div>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- STEP 4: LEVELS -->
      <div class="section-title">Requested Levels</div>
      <div id="dynamicLevels" class="level-options"></div>

      <div class="section-title">Attachments</div>
      <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
        <div id="fileCountLabel" style="font-weight:600;">Click to upload PDF</div>
        <input type="file" id="fileInput" multiple accept=".pdf" style="display:none;" onchange="handleMultiFile(this)" />
      </div>
      <div id="fileListPreview" style="margin-top:15px; display:flex; flex-wrap:wrap; gap:10px;"></div>
    </form>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button id="btnSubmitForm" class="btn btn-primary" onclick="submitForm()">Save & Submit</button>
  </div>
</div>

<script>
/**
 * INA LOGIC: Premium Autocomplete & Data Cleaning
 */
const MODAL_COL_MAP = { AUTH: 1, SHOP: 4, NAME: 6, MANUF: 7, REF: 8, ACTYPE: 9, CAT: 11 };

let uploadedFiles = []; // Array untuk menyimpan blob data sebelum dikirim

/**
 * Penanganan Multi-File (INA - Logic)
 */
function handleMultiFile(input) {
  const preview = document.getElementById("fileListPreview");
  const label = document.getElementById("fileCountLabel");
  preview.innerHTML = "";
  uploadedFiles = [];

  if (input.files.length === 0) {
    label.textContent = "Click to upload PDF";
    return;
  }

  label.textContent = input.files.length + " files ready to upload";

  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      // Masukkan ke array global
      uploadedFiles.push({
        name: file.name,
        data: e.target.result.split(',')[1] // Pure Base64
      });
      
      // Tampilkan preview kecil
      preview.innerHTML += `
        <div style="font-size:11px; color:#15803d; background:#f0fdf4; padding:5px 10px; border-radius:6px; border:1px solid #bbf7d0; display:flex; align-items:center; gap:5px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
          ${file.name}
        </div>`;
    };
    reader.readAsDataURL(file);
  });
}

/**
 * SINKRONISASI PROSES SUBMISSION (INA - Process)
 */
async function submitForm() {
  const form = document.getElementById("newCapForm");
  
  // 1. Validasi Input
  if (!form.reportValidity()) return;

  // 2. Tampilkan Loading Spinner Blocking (SweetAlert2)
  Swal.fire({
    title: 'Processing Submission',
    html: 'Uploading documents and writing metadata...<br><b>Please do not close this window.</b>',
    allowOutsideClick: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });

  const isEdit = document.getElementById("editId").value !== "";
  const selectedLevels = Array.from(document.querySelectorAll('input[name="authLevels"]:checked')).map(c => c.value).join(", ");

  // 3. Construct Payload
  const payload = {
    action: isEdit ? "updateSubmission" : "newSubmission",
    id: document.getElementById("editId").value,
    date: document.getElementById("submitDate").value,
    username: document.getElementById("username").value,
    unit: document.getElementById("unit").value,
    authority: document.getElementById("authSelect").value,
    caplistItem: document.getElementById("caplistItem").value,
    partNumber: document.getElementById("partNumber").value,
    partName: document.getElementById("partName").value,
    manufacturer: document.getElementById("manufacturer").value,
    ataChapter: document.getElementById("ataChapter").value,
    shop: document.getElementById("shop").value,
    aircraftType: document.getElementById("aircraftType").value,
    levels: selectedLevels,
    status: isEdit ? document.getElementById("statusSelect").value : "SUBMITTED",
    reviewer: document.getElementById("reviewerName").value,
    reason: document.getElementById("statusReason").value,
    files: uploadedFiles // Kirim array file blob
  };

  try {
    const response = await fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    
    const result = await response.json();

    if (result.success) {
      // 4. Sukses: Tutup Loading & Tampilkan Notifikasi Sukses
      Swal.fire({
        icon: 'success',
        title: isEdit ? 'Updated!' : 'Submitted!',
        text: `Submission ${result.id || payload.id} has been processed successfully.`,
        timer: 2000,
        showConfirmButton: false
      });

      closeModal(); // Tutup Modal Form
      
      // Refresh list di dashboard jika fungsi tersedia
      if (typeof loadSubmissions === "function") loadSubmissions();
      
    } else {
      throw new Error(result.error || "Server responded with failure");
    }
  } catch (err) {
    console.error("Submission Error:", err);
    Swal.fire({
      icon: 'error',
      title: 'Submission Failed',
      text: 'Check connection or logs: ' + err.message
    });
  }
}

/**
 * REPAIRED: showAdvice (Autocomplete Logic)
 * Mendukung pencarian cerdas untuk Rating (Code + Deskripsi) 
 * dan pencarian standar untuk Manufacturer, Shop, dan AC Type.
 */
function showAdvice(input, colIdx) {
  const list = input.nextElementSibling;
  const val = input.value.trim().toUpperCase();
  const auth = document.getElementById("authSelect").value;
  
  if (!val || typeof rawData === 'undefined') { 
    if (list) list.style.display = "none"; 
    return; 
  }

  let matches = [];
  
  // LOGIKA KHUSUS RATING (Index 2)
  if (colIdx === 2) {
    // Cari data yang sesuai otoritas & mengandung kata kunci di Rating (idx 2) atau Category (idx 11)
    matches = [...new Set(rawData
      .filter(row => 
        String(row[MODAL_COL_MAP.AUTH]).toUpperCase() === auth.toUpperCase() && 
        (String(row[2]).toUpperCase().includes(val) || String(row[11]).toUpperCase().includes(val))
      )
      .map(row => `${String(row[2]).trim()} - ${String(row[11]).trim()}`) // Format: "C1 - Air Cond"
      .filter(v => v && !v.startsWith("—")) // Buang baris kosong/strip
    )].sort().slice(0, 10);
  } else {
    // LOGIKA DEFAULT UNTUK LAINNYA (Manuf, Shop, AC Type)
    matches = [...new Set(rawData
      .filter(row => 
        (!auth || String(row[MODAL_COL_MAP.AUTH]).toUpperCase() === auth.toUpperCase()) && 
        String(row[colIdx]).toUpperCase().includes(val)
      )
      .map(row => String(row[colIdx]).trim())
      .filter(v => v && v !== "" && v !== "—")
    )].sort().slice(0, 10);
  }

  // Render List Saran
  if (matches.length > 0) {
    list.innerHTML = matches.map(m => `
      <div class="advice-item" onclick="selectAdvice('${input.id}', '${m.replace(/'/g, "\\'")}')">
        ${m}
      </div>`).join("");
    list.style.display = "block";
  } else {
    list.style.display = "none";
  }
}

/**
 * REPAIRED: selectAdvice (Selection Logic)
 * Memasukkan data pilihan ke input dan menangani pemotongan string khusus Rating.
 */
function selectAdvice(inputId, value) {
  let finalValue = value;
  
  // Jika ini input rating dan mengandung pemisah " - ", ambil kodenya saja (C1)
  if (inputId === "rating" && value.includes(" - ")) {
    finalValue = value.split(" - ")[0].trim();
  }
  
  const targetInput = document.getElementById(inputId);
  if (targetInput) {
    targetInput.value = finalValue;
  }

  // Sembunyikan popover advice setelah dipilih
  const adviceList = document.getElementById(`advice-${inputId}`);
  if (adviceList) {
    adviceList.style.display = "none";
  }
}

// Tutup advice jika klik di luar
document.addEventListener("click", (e) => {
  if (!e.target.closest(".form-group")) {
    document.querySelectorAll(".search-advice-list").forEach(l => l.style.display = "none");
  }
});

function updateCategoryDropdown(selectedAuth) {
  const catSelect = document.getElementById("caplistItem");
  if (!selectedAuth || typeof rawData === 'undefined') {
    catSelect.innerHTML = '<option value="">-- Select Authority First --</option>';
    return;
  }
  const categories = [...new Set(rawData
    .filter(row => String(row[MODAL_COL_MAP.AUTH]).toUpperCase() === selectedAuth.toUpperCase())
    .map(row => String(row[MODAL_COL_MAP.CAT]).trim())
    .filter(val => val !== "" && val !== "—")
  )].sort();
  catSelect.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join("");
}

function handleAuthorityChange() {
  const auth = document.getElementById("authSelect").value;
  const ratingGroup = document.getElementById("ratingGroup");
  
  // Konfigurasi Label berdasarkan Otoritas (INA - Mapping)
  const config = {
    'EASA': { pn: "P/N", name: "Designation", mfr: "Manufacture", ref: "Reference of the CMM", shop: "Work Shop", model: "Type (Model)", showRating: true },
    'FAA': { pn: "Part Number", name: "Part Name", mfr: "Manufacturer", ref: "ATA Chapter", shop: "Shop", model: "Model", showRating: true }, // FAA sekarang diizinkan input rating jika perlu
    'DGCA': { pn: "Part Number", name: "Part Name", mfr: "Manufacturer", ref: "ATA", shop: "Shop", model: "A/C Type", showRating: true }
  }[auth] || { pn: "Part Number", name: "Part Name", mfr: "Manufacturer", ref: "ATA Chapter", shop: "Shop", model: "A/C Type", showRating: false };

  // Update Label secara dinamis
  const pnLabel = document.getElementById("partNumber").previousElementSibling;
  if (pnLabel) pnLabel.textContent = config.pn;
  
  document.getElementById("labelPartName").textContent = config.name;
  document.getElementById("manufacturer").previousElementSibling.textContent = config.mfr;
  document.getElementById("labelReference").textContent = config.ref;
  document.getElementById("shop").previousElementSibling.textContent = config.shop;
  document.getElementById("labelAircraftType").textContent = config.model;

  // Kontrol Visibility Rating (Hanya aktifkan jika otoritas dipilih)
  ratingGroup.style.display = auth ? "flex" : "none";

  // Update Dynamic Levels (INA - Chip Generation)
  const container = document.getElementById("dynamicLevels");
  container.innerHTML = "";
  if(auth) {
    const levels = (auth === 'EASA') ? 
      ['Level 1 (Tested)', 'Level 2 (Repaired)', 'Level 3 (Modified)', 'Level 4 (Overhauled)'] :
      ['Level 1 (Inspection)', 'Level 2 (Testing)', 'Level 3 (Repair)', 'Level 4 (Modification)', 'Level 5 (Overhaul)'];
    levels.forEach(lvl => {
      container.innerHTML += `<label class="level-chip"><input type="checkbox" name="authLevels" value="${lvl}"> ${lvl}</label>`;
    });
  }
  updateCategoryDropdown(auth);
}

/**
 * REPAIRED: initFormScript
 * Memastikan populasi data saat mode Manage/Edit berjalan sempurna.
 * Menangani sinkronisasi tanggal standar HTML5 (YYYY-MM-DD).
 */
function initFormScript(editData) {
  const form = document.getElementById("newCapForm");
  if (!form) return; // Guard clause
  
  form.reset();
  const filePreview = document.getElementById("fileListPreview");
  if (filePreview) filePreview.innerHTML = "";

  if (editData) {
    // 1. Judul Modal & Aktivasi Management Box
    document.getElementById("formTitle").textContent = "Manage Submission: " + editData.id;
    document.getElementById("mgmtBox").style.display = "block";
    document.getElementById("editId").value = editData.id;
    
    // 2. POPULASI TANGGAL (PENTING!)
    // Menggunakan data.date yang sudah diformat YYYY-MM-DD oleh GAS
    document.getElementById("submitDate").value = editData.date || "";

    // 3. Data Identitas & Otoritas
    document.getElementById("username").value = editData.username || "";
    document.getElementById("unit").value = editData.unit || "";
    document.getElementById("authSelect").value = editData.authority || "";
    
    // Trigger perubahan otoritas untuk merender Level & Label dinamis
    handleAuthorityChange();
    
    // 4. Populasi Elemen Dinamis (Gunakan Timeout agar DOM selesai render)
    setTimeout(() => {
      // Isi Category Dropdown
      const capItem = document.getElementById("caplistItem");
      if (capItem) capItem.value = editData.caplistItem || "";
      
      // Isi Field Autocomplete
      document.getElementById("manufacturer").value = editData.manufacturer || "";
      document.getElementById("shop").value = editData.shop || "";
      document.getElementById("aircraftType").value = editData.aircraftType || "";
      
      // Centang Level yang tersimpan
      const currentLevels = (editData.levels || "").split(", ");
      document.querySelectorAll('input[name="authLevels"]').forEach(cb => {
        cb.checked = currentLevels.includes(cb.value);
      });
    }, 250); // Jeda 250ms untuk memastikan transisi DOM stabil

    // 5. Technical Detail Lainnya
    document.getElementById("partNumber").value = editData.partNumber || "";
    document.getElementById("partName").value = editData.partName || "";
    document.getElementById("ataChapter").value = editData.ataChapter || "";
    
    // 6. Management Control (Status & Reviewer)
    const statusSel = document.getElementById("statusSelect");
    if (statusSel) statusSel.value = editData.status || "SUBMITTED";
    
  } else {
    // MODE: NEW APPLICATION
    const tempId = "REQ-" + new Date().getTime().toString().slice(-6);
    document.getElementById("formTitle").textContent = "New App (" + tempId + ")";
    document.getElementById("mgmtBox").style.display = "none";
    document.getElementById("editId").value = ""; // Pastikan ID kosong
    
    // Default tanggal hari ini untuk pengajuan baru
    document.getElementById("submitDate").value = new Date().toISOString().split('T')[0];
  }
}
</script>
