<div class="modal-card">
  <div class="modal-header">
    <h3 class="modal-title">New Capability Application</h3>
    <button class="close-x" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <form id="newCapForm">
      <div class="section-title">Step 1: Select Authority</div>
      <div class="form-group">
        <select id="authSelect" required onchange="updateLevelOptions()" style="border: 2px solid var(--primary);">
          <option value="">-- Choose Authority --</option>
          <option value="EASA">EASA (European Union Aviation Safety Agency)</option>
          <option value="FAA">FAA (Federal Aviation Administration)</option>
          <option value="DGCA">DGCA (Directorate General of Civil Aviation)</option>
        </select>
      </div>

      <div class="section-divider"></div>
      <div class="section-title">Step 2: Component Details</div>
      <!-- Row PN & Name -->
      <div class="form-row">
        <div class="form-group"><label>Part Number</label><input type="text" id="partNumber" required /></div>
        <div class="form-group"><label>Part Name</label><input type="text" id="partName" required /></div>
      </div>
      <!-- Tambahkan field Cat, Manuf, ATA, Shop, AC seperti form sebelumnya... -->

      <div class="section-divider"></div>
      <div class="section-title">Step 3: Certification Levels</div>
      <div id="dynamicLevels" class="level-options">
        <p style="font-size:12px; color:var(--text-muted);">Please select authority first.</p>
      </div>

      <div class="section-divider"></div>
      <div class="section-title">Step 4: Supporting Documents</div>
      <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
        <span id="fileCountLabel">Click to upload files (PDF only)</span>
        <input type="file" id="fileInput" multiple accept=".pdf" style="display:none;" onchange="handleMultiFile(this)" />
      </div>
      <div id="fileListPreview" style="margin-top:10px;"></div>
    </form>
  </div>
  <div class="modal-footer">
    <button class="btn btn-primary" onclick="submitForm()">Submit Application</button>
  </div>
</div>

<script>
const AUTH_LEVELS = {
  'EASA': ['Level 1 (Tested)', 'Level 2 (Repaired)', 'Level 3 (Modified)', 'Level 4 (Overhauled)'],
  'FAA': ['Level 1 (Inspection)', 'Level 2 (Testing)', 'Level 3 (Repair)', 'Level 4 (Modification)', 'Level 5 (Overhaul)'],
  'DGCA': ['Level 1 (Inspection)', 'Level 2 (Testing)', 'Level 3 (Repair)', 'Level 4 (Modification)', 'Level 5 (Overhaul)']
};

function updateLevelOptions() {
  const auth = document.getElementById("authSelect").value;
  const container = document.getElementById("dynamicLevels");
  container.innerHTML = "";
  
  if(!auth) return;

  AUTH_LEVELS[auth].forEach(lvl => {
    container.innerHTML += `
      <label class="level-chip">
        <input type="checkbox" name="authLevels" value="${lvl}"> ${lvl}
      </label>
    `;
  });
}

let uploadedFiles = [];
function handleMultiFile(input) {
  const preview = document.getElementById("fileListPreview");
  preview.innerHTML = "";
  uploadedFiles = [];

  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedFiles.push({ name: file.name, data: e.target.result.split(',')[1] });
      preview.innerHTML += `<div style="font-size:11px; color:var(--success);">✅ ${file.name}</div>`;
    };
    reader.readAsDataURL(file);
  });
}
</script>
