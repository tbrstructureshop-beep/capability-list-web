<style>
  .modal-card {
    background: var(--card-bg);
    width: 100%;
    max-width: 700px;
    max-height: 90vh;
    border-radius: var(--radius-lg);
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
  }

  .modal-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .close-x {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-light);
  }

  /* Form layouts */
  .form-group {
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="date"], select {
    width: 100%;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    font-size: 14px;
    box-sizing: border-box;
    transition: var(--transition);
  }

  input:focus, select:focus {
    border-color: var(--primary);
    outline: none;
  }

  /* Section Styles */
  .section-divider {
    border-top: 1px solid var(--border);
    margin: 20px 0;
    padding-top: 15px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }

  /* Authority Levels Matrix CSS */
  .auth-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .auth-row {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  .auth-header-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .level-options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding-left: 26px;
  }

  .level-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
  }

  .level-chip input {
    margin: 0;
  }

  .disabled-row {
    opacity: 0.5;
    pointer-events: none;
  }

  /* File upload feedback */
  .file-dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    text-align: center;
    background: var(--primary-light);
    cursor: pointer;
  }

  .loading-spinner-form {
    display: none;
    font-size: 14px;
    color: var(--primary-dark);
    font-weight: 600;
  }
</style>

<div class="modal-card">
  <div class="modal-header">
    <h3 class="modal-title">Request New Capability</h3>
    <button class="close-x" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <form id="newCapForm">
      
      <!-- Requester Information -->
      <div class="section-title">Requester Info</div>
      <div class="form-row">
        <div class="form-group">
          <label for="username">Username Pengaju</label>
          <input type="text" id="username" required placeholder="Employee ID / Name" />
        </div>
        <div class="form-group">
          <label for="unit">Unit Pengaju</label>
          <input type="text" id="unit" required placeholder="e.g. TE-12" />
        </div>
      </div>
      <div class="form-group">
        <label for="submitDate">Tanggal Pengajuan</label>
        <input type="date" id="submitDate" required />
      </div>

      <!-- Scope of Capability -->
      <div class="section-divider"></div>
      <div class="section-title">Capability Scope & Rating</div>
      <div class="form-row">
        <div class="form-group">
          <label for="caplistItem">Capability Category (List DQ-002)</label>
          <select id="caplistItem" required>
            <option value="">-- Select Category --</option>
            <option value="Accessories">Accessories</option>
            <option value="Emergency">Emergency</option>
            <option value="Engine & APU">Engine & APU</option>
            <option value="Instrument">Instrument</option>
            <option value="Limited Airframe">Limited Airframe</option>
            <option value="Radio">Radio</option>
            <option value="Landing Gear, Wheel, and Brake">Landing Gear, Wheel, and Brake</option>
          </select>
        </div>
        <div class="form-group">
          <label for="rating">Component Rating (List DQ-003)</label>
          <select id="rating" required>
            <option value="">-- Select Rating --</option>
            <option value="C1 - Air Cond. & Pressure">C1 - Air Cond. & Pressure</option>
            <option value="C3 - Comms. and Navigation">C3 - Comms. and Navigation</option>
            <option value="C5 - Electrical Power & Lights">C5 - Electrical Power & Lights</option>
            <option value="C6 - Emergency Equipment">C6 - Emergency Equipment</option>
            <option value="C7 - Engine - APU">C7 - Engine - APU</option>
            <option value="C8 - Flight Control">C8 - Flight Control</option>
            <option value="C12 - Hydraulic Power">C12 - Hydraulic Power</option>
            <option value="C13 - Indicating / Recording System">C13 - Indicating / Recording System</option>
            <option value="C14 - Landing Gear, Wheel & Brake">C14 - Landing Gear, Wheel & Brake</option>
            <option value="C15 - Oxygen">C15 - Oxygen</option>
            <option value="C17 - Pneumatic & Vacuum">C17 - Pneumatic & Vacuum</option>
            <option value="C18 - Protection ice/rain/fire">C18 - Protection ice/rain/fire</option>
            <option value="C19 - Windows">C19 - Windows</option>
          </select>
        </div>
      </div>

      <!-- Component Technical Detail -->
      <div class="section-divider"></div>
      <div class="section-title">Technical Detail Component</div>
      <div class="form-row">
        <div class="form-group">
          <label for="partNumber">Part Number (PN)</label>
          <input type="text" id="partNumber" required placeholder="e.g. 6252" />
        </div>
        <div class="form-group">
          <label for="partName">Part Name</label>
          <input type="text" id="partName" required placeholder="e.g. Hydraulic Fuse" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="manufacturer">Manufacturer</label>
          <input type="text" id="manufacturer" required placeholder="e.g. Honeywell" />
        </div>
        <div class="form-group">
          <label for="ataChapter">ATA Chapter</label>
          <input type="text" id="ataChapter" required placeholder="e.g. 29" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="shop">Shop / Work Center</label>
          <input type="text" id="shop" placeholder="e.g. Hydraulic Shop" />
        </div>
        <div class="form-group">
          <label for="aircraftType">Aircraft Type (A/C Type)</label>
          <input type="text" id="aircraftType" placeholder="e.g. B737-800" />
        </div>
      </div>

      <!-- Authorities Selection -->
      <div class="section-divider"></div>
      <div class="section-title">Authorities & Level Requirements</div>
      <div class="auth-grid">
        
        <!-- EASA -->
        <div class="auth-row">
          <div class="auth-header-line">
            <input type="checkbox" id="easaChecked" onchange="toggleAuthFields('easa')" />
            <label for="easaChecked" style="margin: 0; cursor:pointer;">EASA Certification</label>
          </div>
          <div id="easaLevelsGroup" class="level-options disabled-row">
            <label class="level-chip"><input type="checkbox" name="easaLevels" value="Level 1"> Lvl 1 (Tested)</label>
            <label class="level-chip"><input type="checkbox" name="easaLevels" value="Level 2"> Lvl 2 (Repaired)</label>
            <label class="level-chip"><input type="checkbox" name="easaLevels" value="Level 3"> Lvl 3 (Modified)</label>
            <label class="level-chip"><input type="checkbox" name="easaLevels" value="Level 4"> Lvl 4 (Overhauled)</label>
          </div>
        </div>

        <!-- FAA -->
        <div class="auth-row">
          <div class="auth-header-line">
            <input type="checkbox" id="faaChecked" onchange="toggleAuthFields('faa')" />
            <label for="faaChecked" style="margin: 0; cursor:pointer;">FAA Certification</label>
          </div>
          <div id="faaLevelsGroup" class="level-options disabled-row">
            <label class="level-chip"><input type="checkbox" name="faaLevels" value="Level 1"> Lvl 1 (Inspection)</label>
            <label class="level-chip"><input type="checkbox" name="faaLevels" value="Level 2"> Lvl 2 (Testing)</label>
            <label class="level-chip"><input type="checkbox" name="faaLevels" value="Level 3"> Lvl 3 (Repair)</label>
            <label class="level-chip"><input type="checkbox" name="faaLevels" value="Level 4"> Lvl 4 (Modification)</label>
            <label class="level-chip"><input type="checkbox" name="faaLevels" value="Level 5"> Lvl 5 (Overhaul)</label>
          </div>
        </div>

        <!-- DGCA -->
        <div class="auth-row">
          <div class="auth-header-line">
            <input type="checkbox" id="dgcaChecked" onchange="toggleAuthFields('dgca')" />
            <label for="dgcaChecked" style="margin: 0; cursor:pointer;">DGCA Certification</label>
          </div>
          <div id="dgcaLevelsGroup" class="level-options disabled-row">
            <label class="level-chip"><input type="checkbox" name="dgcaLevels" value="Level 1"> Lvl 1 (Inspection)</label>
            <label class="level-chip"><input type="checkbox" name="dgcaLevels" value="Level 2"> Lvl 2 (Testing)</label>
            <label class="level-chip"><input type="checkbox" name="dgcaLevels" value="Level 3"> Lvl 3 (Repair)</label>
            <label class="level-chip"><input type="checkbox" name="dgcaLevels" value="Level 4"> Lvl 4 (Modification)</label>
            <label class="level-chip"><input type="checkbox" name="dgcaLevels" value="Level 5"> Lvl 5 (Overhaul)</label>
          </div>
        </div>

      </div>

      <!-- PDF Attachment -->
      <div class="section-divider"></div>
      <div class="section-title">Attachment (PDF Form Pengajuan)</div>
      <div class="form-group">
        <div class="file-dropzone" onclick="document.getElementById('pdfFile').click()">
          <span id="uploadLabel">Click to select PDF document</span>
          <input type="file" id="pdfFile" accept="application/pdf" style="display:none;" onchange="handleFileSelected(event)" />
        </div>
      </div>

    </form>
  </div>
  <div class="modal-footer">
    <div id="spinnerForm" class="loading-spinner-form">Submitting Request...</div>
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="btnSubmitForm" onclick="submitForm()">Submit Application</button>
  </div>
</div>

<script>
  // Script penunjang modul form
  let selectedFileBase64 = "";
  let selectedFileName = "";

  function initFormScript() {
    // Isi default tanggal hari ini
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("submitDate").value = today;
  }

  function toggleAuthFields(authType) {
    const isChecked = document.getElementById(`${authType}Checked`).checked;
    const group = document.getElementById(`${authType}LevelsGroup`);
    if (isChecked) {
      group.classList.remove("disabled-row");
    } else {
      group.classList.add("disabled-row");
      // Uncheck inside level chips
      group.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    }
  }

  function handleFileSelected(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (file.type !== "application/pdf") {
      alert("Please upload a valid PDF document.");
      e.target.value = "";
      return;
    }

    selectedFileName = file.name;
    document.getElementById("uploadLabel").innerText = `Selected File: ${file.name}`;

    // Read to Base64
    const reader = new FileReader();
    reader.onload = function(event) {
      selectedFileBase64 = event.target.result.split(",")[1]; // Dapatkan payload string murni base64
    };
    reader.readAsDataURL(file);
  }

  function submitForm() {
    const form = document.getElementById("newCapForm");
    if (!form.reportValidity()) return;

    const username = document.getElementById("username").value;
    const unit = document.getElementById("unit").value;
    const dateVal = document.getElementById("submitDate").value;
    const caplistItem = document.getElementById("caplistItem").value;
    const rating = document.getElementById("rating").value;
    const partNumber = document.getElementById("partNumber").value;
    const partName = document.getElementById("partName").value;
    const manufacturer = document.getElementById("manufacturer").value;
    const ataChapter = document.getElementById("ataChapter").value;
    const shop = document.getElementById("shop").value;
    const aircraftType = document.getElementById("aircraftType").value;

    // Kumpulkan level sertifikasi terpilih
    const getCheckedLevels = (name) => {
      return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(c => c.value).join(", ");
    };

    const easaLevels = getCheckedLevels("easaLevels");
    const faaLevels = getCheckedLevels("faaLevels");
    const dgcaLevels = getCheckedLevels("dgcaLevels");

    const submitBtn = document.getElementById("btnSubmitForm");
    const spinner = document.getElementById("spinnerForm");

    submitBtn.disabled = true;
    spinner.style.display = "block";

    const payload = {
      action: "newSubmission",
      username: username,
      unit: unit,
      date: dateVal,
      caplistItem: caplistItem,
      rating: rating,
      partNumber: partNumber,
      partName: partName,
      manufacturer: manufacturer,
      ataChapter: ataChapter,
      shop: shop,
      aircraftType: aircraftType,
      easaLevels: easaLevels,
      faaLevels: faaLevels,
      dgcaLevels: dgcaLevels,
      fileData: selectedFileBase64,
      fileName: selectedFileName
    };

    fetch(GAS_API_URL, {
      method: "POST",
      mode: "no-cors", // Mode no-cors jika domain Vercel belum dideklarasikan eksplisit di Headers GAS
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    })
    .then(res => {
      // Untuk mode: "no-cors", kita tidak akan mendapatkan akses penuh respon JSON, 
      // tetapi proses backend Google Drive tetap tereksekusi dengan sukses.
      alert("Submission successfully processed!");
      closeModal();
      loadSubmissions(); // reload data
    })
    .catch(err => {
      console.error(err);
      alert("Submission Error. Check logs.");
    })
    .finally(() => {
      submitBtn.disabled = false;
      spinner.style.display = "none";
    });
  }
</script>
