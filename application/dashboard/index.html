<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Capability Submissions Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2 family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3c92a6;
      --primary-dark: #2d6e7e;
      --primary-light: #eef7f9;
      --bg: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius-lg: 14px;
      --radius-md: 10px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .btn {
      padding: 10px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      color: var(--text-main);
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-danger {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fee2e2;
    }
    .btn-danger:hover { background: #fee2e2; }

    /* RESPONSIVE CARD GRID SYSTEM */
    .submissions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .submission-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .submission-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .id-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-dark);
      background-color: var(--primary-light);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-submitted { background: #e0f2fe; color: #0369a1; }
    .status-review { background: #fef3c7; color: #d97706; }
    .status-approved { background: #dcfce7; color: #15803d; }
    .status-rejected { background: #fee2e2; color: #b91c1c; }

    /* Component Details layout */
    .component-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0 0 4px 0;
    }

    .component-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .meta-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-bottom: 16px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .meta-val {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Authority Level badge styles */
    .authority-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    /* Collapsible History Logs styling */
    .history-section {
      border-top: 1px dashed var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .history-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .history-list {
      display: none;
      list-style: none;
      padding-left: 0;
      margin: 8px 0 0 0;
      font-size: 11px;
    }

    .history-list li {
      padding: 4px 0;
      border-bottom: 1px solid #f1f5f9;
      color: var(--text-muted);
    }

    /* EMBEDDED MODAL & FORM STYLING */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 16px;
      box-sizing: border-box;
    }

    .modal-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 650px;
      max-height: 90vh;
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      align-items: center;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input[type="text"], input[type="date"], select {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: inherit;
    }

    .auth-row {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      margin-bottom: 12px;
    }

    .level-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      padding-left: 24px;
    }

    .disabled-row { opacity: 0.5; pointer-events: none; }

    .file-dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      background: var(--primary-light);
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <a href="../../index.html" class="btn" style="margin-bottom:12px; padding:6px 12px;">← Back to Search</a>
      <h1>New Capability Submissions</h1>
      <p style="color: var(--text-muted); margin: 4px 0 0 0;">Manage and track new capabilities applications</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      New Submission
    </button>
  </header>

  <div class="submissions-grid" id="submissionsGrid">
    <!-- Cards will load here -->
    <div style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 80px 0;">
      Loading submissions data...
    </div>
  </div>
</div>

<!-- EMBEDDED MODAL (Zero dynamic fetch failure) -->
<div id="modalOverlay" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <h3 style="margin:0; font-size:18px;">Request New Capability</h3>
      <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-light);">&times;</button>
    </div>
    <div class="modal-body">
      <form id="newCapForm">
        <div class="form-row">
          <div class="form-group">
            <label>Username Pengaju</label>
            <input type="text" id="username" required placeholder="User ID/Name" />
          </div>
          <div class="form-group">
            <label>Unit Pengaju</label>
            <input type="text" id="unit" required placeholder="e.g. TE-12" />
          </div>
        </div>
        <div class="form-group">
          <label>Tanggal Pengajuan</label>
          <input type="date" id="submitDate" required />
        </div>

        <div style="border-top: 1px solid var(--border); margin:16px 0; padding-top:12px;"></div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Capability Category</label>
            <select id="caplistItem" required>
              <option value="">-- Select Category --</option>
              <option value="Accessories">Accessories</option>
              <option value="Emergency">Emergency</option>
              <option value="Engine & APU">Engine & APU</option>
              <option value="Instrument">Instrument</option>
              <option value="Limited Airframe">Limited Airframe</option>
              <option value="Radio">Radio</option>
              <option value="Landing Gear, Wheel, and Brake">Landing Gear, Wheel, and Brake</option>
            </select>
          </div>
          <div class="form-group">
            <label>Component Rating</label>
            <select id="rating" required>
              <option value="">-- Select Rating --</option>
              <option value="C1 - Air Cond. & Pressure">C1 - Air Cond. & Pressure</option>
              <option value="C3 - Comms. and Navigation">C3 - Comms. and Navigation</option>
              <option value="C5 - Electrical Power & Lights">C5 - Electrical Power & Lights</option>
              <option value="C6 - Emergency Equipment">C6 - Emergency Equipment</option>
              <option value="C7 - Engine - APU">C7 - Engine - APU</option>
              <option value="C8 - Flight Control">C8 - Flight Control</option>
              <option value="C12 - Hydraulic Power">C12 - Hydraulic Power</option>
              <option value="C13 - Indicating / Recording System">C13 - Indicating / Recording System</option>
              <option value="C14 - Landing Gear, Wheel & Brake">C14 - Landing Gear, Wheel & Brake</option>
              <option value="C15 - Oxygen">C15 - Oxygen</option>
              <option value="C17 - Pneumatic & Vacuum">C17 - Pneumatic & Vacuum</option>
              <option value="C18 - Protection ice/rain/fire">C18 - Protection ice/rain/fire</option>
              <option value="C19 - Windows">C19 - Windows</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Part Number (PN)</label>
            <input type="text" id="partNumber" required placeholder="PN" />
          </div>
          <div class="form-group">
            <label>Part Name</label>
            <input type="text" id="partName" required placeholder="Part Name" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Manufacturer</label>
            <input type="text" id="manufacturer" required placeholder="e.g. Honeywell" />
          </div>
          <div class="form-group">
            <label>ATA Chapter</label>
            <input type="text" id="ataChapter" required placeholder="e.g. 29" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Shop Work Center</label>
            <input type="text" id="shop" placeholder="e.g. Hydraulic Shop" />
          </div>
          <div class="form-group">
            <label>Aircraft Type</label>
            <input type="text" id="aircraftType" placeholder="e.g. B737-800" />
          </div>
        </div>

        <!-- Auths & Levels -->
        <div style="border-top: 1px solid var(--border); margin:16px 0; padding-top:12px;"></div>
        <div class="auth-row">
          <label style="font-weight:700;"><input type="checkbox" id="easaChecked" onchange="toggleAuthFields('easa')" /> EASA Certification</label>
          <div id="easaLevelsGroup" class="level-options disabled-row">
            <label><input type="checkbox" name="easaLevels" value="Level 1"> L1(Tested)</label>
            <label><input type="checkbox" name="easaLevels" value="Level 2"> L2(Repaired)</label>
            <label><input type="checkbox" name="easaLevels" value="Level 3"> L3(Modified)</label>
            <label><input type="checkbox" name="easaLevels" value="Level 4"> L4(Overhauled)</label>
          </div>
        </div>

        <div class="auth-row">
          <label style="font-weight:700;"><input type="checkbox" id="faaChecked" onchange="toggleAuthFields('faa')" /> FAA Certification</label>
          <div id="faaLevelsGroup" class="level-options disabled-row">
            <label><input type="checkbox" name="faaLevels" value="Level 1"> L1</label>
            <label><input type="checkbox" name="faaLevels" value="Level 2"> L2</label>
            <label><input type="checkbox" name="faaLevels" value="Level 3"> L3</label>
            <label><input type="checkbox" name="faaLevels" value="Level 4"> L4</label>
            <label><input type="checkbox" name="faaLevels" value="Level 5"> L5</label>
          </div>
        </div>

        <div class="auth-row">
          <label style="font-weight:700;"><input type="checkbox" id="dgcaChecked" onchange="toggleAuthFields('dgca')" /> DGCA Certification</label>
          <div id="dgcaLevelsGroup" class="level-options disabled-row">
            <label><input type="checkbox" name="dgcaLevels" value="Level 1"> L1</label>
            <label><input type="checkbox" name="dgcaLevels" value="Level 2"> L2</label>
            <label><input type="checkbox" name="dgcaLevels" value="Level 3"> L3</label>
            <label><input type="checkbox" name="dgcaLevels" value="Level 4"> L4</label>
            <label><input type="checkbox" name="dgcaLevels" value="Level 5"> L5</label>
          </div>
        </div>

        <!-- File Upload -->
        <div class="form-group">
          <label>Attachment PDF Form Pengajuan</label>
          <div class="file-dropzone" onclick="document.getElementById('pdfFile').click()">
            <span id="uploadLabel">Pilih File PDF</span>
            <input type="file" id="pdfFile" accept="application/pdf" style="display:none;" onchange="handleFileSelected(event)" />
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <span id="spinnerForm" style="display:none; color:var(--primary); font-size:12px; font-weight:600;">Processing...</span>
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="btnSubmitForm" onclick="submitForm()">Submit Request</button>
    </div>
  </div>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbycaGtEDv-GXxAIlfGv26tYUc1IAUY2MRIgJq1IUbBdP_VrJnvA_B-6-GdRbW2RKKtJ/exec";
  
  let selectedFileBase64 = "";
  let selectedFileName = "";

  window.onload = function() {
    loadSubmissions();
    document.getElementById("submitDate").value = new Date().toISOString().split('T')[0];
  };

  function loadSubmissions() {
    fetch(`${GAS_API_URL}?action=getSubmissions`)
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById("submissionsGrid");
        grid.innerHTML = "";

        if (data.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 40px 0;">No submissions found.</div>`;
          return;
        }

        data.forEach(row => {
          let levels = [];
          if (row.easaLevels) levels.push(`<strong>EASA:</strong> ${row.easaLevels}`);
          if (row.faaLevels) levels.push(`<strong>FAA:</strong> ${row.faaLevels}`);
          if (row.dgcaLevels) levels.push(`<strong>DGCA:</strong> ${row.dgcaLevels}`);

          // Build History Items
          let historyLi = "";
          if (row.history && Array.isArray(row.history)) {
            row.history.forEach(h => {
              historyLi += `<li>[${h.date}] ${h.user}: ${h.action} (<strong>${h.status}</strong>)</li>`;
            });
          } else {
            historyLi = "<li>No History Log</li>";
          }

          const card = document.createElement("div");
          card.className = "submission-card";
          card.innerHTML = `
            <div>
              <div class="card-top">
                <span class="id-badge">${row.id}</span>
                <span class="status-badge status-${row.status.toLowerCase()}">${row.status}</span>
              </div>
              <h4 class="component-title">${row.partName}</h4>
              <div class="component-sub">PN: <span style="font-weight:700; color:var(--primary);">${row.partNumber}</span></div>
              
              <div class="meta-details">
                <div class="meta-item"><span class="meta-label">Category</span><span class="meta-val">${row.caplistItem}</span></div>
                <div class="meta-item"><span class="meta-label">Rating</span><span class="meta-val">${row.rating}</span></div>
                <div class="meta-item"><span class="meta-label">Manufacturer</span><span class="meta-val">${row.manufacturer}</span></div>
                <div class="meta-item"><span class="meta-label">ATA Chapter</span><span class="meta-val">${row.ataChapter}</span></div>
                <div class="meta-item"><span class="meta-label">A/C Type</span><span class="meta-val">${row.aircraftType || "—"}</span></div>
                <div class="meta-item"><span class="meta-label">Requester</span><span class="meta-val">${row.username} (${row.unit})</span></div>
              </div>

              <div class="authority-box">
                ${levels.length > 0 ? levels.join("<br>") : "<em>No authority level specified</em>"}
              </div>

              ${row.fileUrl ? `<a href="${row.fileUrl}" target="_blank" class="btn" style="width:100%; justify-content:center; margin-bottom:12px;">Open PDF Attachment</a>` : ''}
            </div>

            <div>
              <!-- History Collapse -->
              <div class="history-section">
                <div class="history-header" onclick="toggleHistory('${row.id}')">
                  <span>Update Logs (${row.history ? row.history.length : 0})</span>
                  <span>▼</span>
                </div>
                <ul class="history-list" id="history-${row.id}">
                  ${historyLi}
                </ul>
              </div>

              <!-- Admin/Action Options -->
              <div class="action-row">
                <button class="btn" style="flex:1;" onclick="promptStatusChange('${row.id}')">Change Status</button>
                <button class="btn btn-danger" onclick="deleteSubmission('${row.id}')">Delete</button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("submissionsGrid").innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--danger); padding: 40px 0;">Error loading submissions.</div>`;
      });
  }

  // Interaktivitas Modal internal
  function openModal() {
    document.getElementById("modalOverlay").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
  }

  function toggleAuthFields(authType) {
    const isChecked = document.getElementById(`${authType}Checked`).checked;
    const group = document.getElementById(`${authType}LevelsGroup`);
    if (isChecked) group.classList.remove("disabled-row");
    else {
      group.classList.add("disabled-row");
      group.querySelectorAll('input').forEach(i => i.checked = false);
    }
  }

  function handleFileSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.type !== "application/pdf") {
      alert("Format berkas wajib PDF");
      e.target.value = "";
      return;
    }
    selectedFileName = file.name;
    document.getElementById("uploadLabel").innerText = `Selected: ${file.name}`;
    const reader = new FileReader();
    reader.onload = function(event) {
      selectedFileBase64 = event.target.result.split(",")[1];
    };
    reader.readAsDataURL(file);
  }

  function toggleHistory(id) {
    const el = document.getElementById(`history-${id}`);
    el.style.display = el.style.display === "block" ? "none" : "block";
  }

  function submitForm() {
    const form = document.getElementById("newCapForm");
    if (!form.reportValidity()) return;

    document.getElementById("btnSubmitForm").disabled = true;
    document.getElementById("spinnerForm").style.display = "inline-block";

    const getCheckedVal = (name) => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(c => c.value).join(", ");

    const payload = {
      action: "newSubmission",
      username: document.getElementById("username").value,
      unit: document.getElementById("unit").value,
      date: document.getElementById("submitDate").value,
      caplistItem: document.getElementById("caplistItem").value,
      rating: document.getElementById("rating").value,
      partNumber: document.getElementById("partNumber").value,
      partName: document.getElementById("partName").value,
      manufacturer: document.getElementById("manufacturer").value,
      ataChapter: document.getElementById("ataChapter").value,
      shop: document.getElementById("shop").value,
      aircraftType: document.getElementById("aircraftType").value,
      easaLevels: getCheckedVal("easaLevels"),
      faaLevels: getCheckedVal("faaLevels"),
      dgcaLevels: getCheckedVal("dgcaLevels"),
      fileData: selectedFileBase64,
      fileName: selectedFileName
    };

    fetch(GAS_API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => {
      alert("Submission successfully processed!");
      closeModal();
      form.reset();
      selectedFileBase64 = "";
      document.getElementById("uploadLabel").innerText = "Pilih File PDF";
      loadSubmissions();
    })
    .catch(err => {
      console.error(err);
      alert("Failed to submit.");
    })
    .finally(() => {
      document.getElementById("btnSubmitForm").disabled = false;
      document.getElementById("spinnerForm").style.display = "none";
    });
  }

  // Update Status
  function promptStatusChange(id) {
    const newStatus = prompt("Masukkan Status Baru (e.g. UNDER REVIEW, APPROVED, REJECTED):");
    if (!newStatus) return;
    
    const comment = prompt("Catatan / Keterangan Perubahan:");
    const user = prompt("Petugas yang meng-update:");

    const payload = {
      action: "updateSubmission",
      id: id,
      newStatus: newStatus.toUpperCase(),
      comment: comment,
      updaterUser: user
    };

    fetch(GAS_API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => {
      alert("Status updated!");
      loadSubmissions();
    });
  }

  // Delete
  function deleteSubmission(id) {
    if (!confirm("Are you sure you want to delete submission " + id + "?")) return;

    fetch(GAS_API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "deleteSubmission", id: id })
    })
    .then(() => {
      alert("Submission deleted!");
      loadSubmissions();
    });
  }
</script>
</body>
</html>
