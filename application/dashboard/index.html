<script>
/**
 * SUBMISSION MODULE - Independent Logic (No Ruin)
 */
let allSubmissions = [];
let filteredSubmissions = [];

/**
 * 1. Load data dari Server (Updated with Loader Logic)
 */
function loadSubmissions() {
  // Pastikan loader menyala saat fetch dimulai
  showLoader(); 

  fetch(`${GAS_API_URL}?action=getSubmissions&_=${new Date().getTime()}`)
    .then(res => res.json())
    .then(data => {
      allSubmissions = data;
      filteredSubmissions = data;
      currentPage = 1; 
      
      renderSubmissionCards();
      updateDataStatus(); // Ini akan mengupdate teks di header
    })
    .catch(err => {
      console.error("Load Submissions Error:", err);
      document.getElementById("tableBody").innerHTML = `<div style="text-align:center; padding:60px; color:red;">Failed to load submissions.</div>`;
    })
    .finally(() => {
      // 2. MATIKAN LOADER hanya setelah data selesai di-render
      setTimeout(() => hideLoader(), 300); 
    });
}

/**
 * 2. Fungsi Filter / Search khusus Submission
 */
function applySubmissionFilters() {
  const keyword = document.getElementById("globalSearch").value.toLowerCase().trim();
  
  filteredSubmissions = allSubmissions.filter(s => 
    s.partNumber.toLowerCase().includes(keyword) || 
    s.id.toLowerCase().includes(keyword) ||
    s.partName.toLowerCase().includes(keyword) ||
    (s.username && s.username.toLowerCase().includes(keyword))
  );

  currentPage = 1; // Kembali ke halaman 1 hasil pencarian
  renderSubmissionCards();
  updateDataStatus();
}

/**
 * 3. Render Kartu Submission (Classic Layout, Dropdown Menu & Timeline Icon)
 */
function renderSubmissionCards() {
  const container = document.getElementById("tableBody");
  container.innerHTML = "";

  if (filteredSubmissions.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding: 60px; color:var(--text-light);"><p>No matching submissions found.</p></div>`;
    updatePaginationInfo(0);
    return;
  }

  let start = 0, end = filteredSubmissions.length;
  if (rowsPerPage !== "all") {
    start = (currentPage - 1) * rowsPerPage;
    end = start + rowsPerPage;
  }

  const fragment = document.createDocumentFragment();
  const pageData = filteredSubmissions.slice(start, end);

  pageData.forEach((row, rIdx) => {
    const statusMap = {
      'SUBMITTED':    { bg: '#e0f2fe', color: '#0369a1', state: 'OPEN' },
      'UNDER REVIEW': { bg: '#fef3c7', color: '#d97706', state: 'PROGRESS' },
      'APPROVED':     { bg: '#dcfce7', color: '#15803d', state: 'CLOSED' },
      'REJECTED':     { bg: '#fee2e2', color: '#b91c1c', state: 'CLOSED' }
    };
    const s = statusMap[row.status] || { bg: '#f3f4f6', color: '#374151', state: 'UNKNOWN' };

    const card = document.createElement("div");
    card.className = "data-card"; // Menggunakan layout 1.6fr 3fr dari index.css

    card.innerHTML = `
      <!-- HORIZONTAL ACTION MENU (Top Right) -->
      <div class="card-actions-wrapper">
        <button class="btn" style="padding:8px; border:none; background:var(--primary-light); color:var(--primary);" onclick="toggleCardMenu(${rIdx})">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
        </button>
        <div id="dropdown-${rIdx}" class="menu-dropdown">
          <button class="menu-btn-item" onclick='openEditForm(${JSON.stringify(row).replace(/'/g, "&apos;")})'>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Manage Submission
          </button>
          <button class="menu-btn-item delete" onclick="cancelSubmission('${row.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Cancel Submission
          </button>
        </div>
      </div>

      <div class="card-main">
        <div class="card-header-row">
            <span class="no-badge">${row.id}</span>
            <div class="vertical-divider"></div>
            ${formatLogoValue(row.authority)}
        </div>
        
        <div class="detail-item" style="margin-top: 10px;">
            <span class="detail-label">PART NUMBER</span>
            <div class="pn-display" style="font-size: 22px; font-weight: 800; color: var(--primary); margin: 8px 0;">
                ${row.partNumber}
            </div>
        </div>

        ${renderCapabilityStepper(row.authority, row.levels)}
      </div>

      <div class="data-details">
        <div class="detail-item"><span class="detail-label">PART NAME</span><span class="detail-value">${row.partName}</span></div>
        <div class="detail-item"><span class="detail-label">MANUFACTURER</span><span class="detail-value">${row.manufacturer || '—'}</span></div>
        <div class="detail-item"><span class="detail-label">SHOP / WC</span><span class="detail-value">${row.shop}</span></div>
        <div class="detail-item"><span class="detail-label">ATA</span><span class="detail-value">${row.ataChapter}</span></div>
        <div class="detail-item"><span class="detail-label">A/C TYPE</span><span class="detail-value">${row.aircraftType}</span></div>
        <div class="detail-item"><span class="detail-label">REQUESTER</span><span class="detail-value">${row.username}</span></div>
        
        <!-- FOOTER: STATUS, ATTACHMENTS & TIMELINE -->
        <div class="detail-item" style="grid-column: span 3; border-top: 1px solid var(--border); padding-top:12px; margin-top:8px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="display:flex; align-items:center; gap:16px;">
               <div class="detail-item">
                 <span class="detail-label">STATUS</span>
                 <span class="status-badge" style="background:${s.bg}; color:${s.color}; font-size:10px; font-weight:800;">
                    ${row.status}
                 </span>
               </div>
               <div class="vertical-divider" style="height:25px; background:#eee;"></div>
               <div class="detail-item">
                 <span class="detail-label">ATTACHMENTS</span>
                 <div class="detail-value">${renderFileList(row.fileUrl)}</div>
               </div>
            </div>

            <!-- TIMELINE PROGRESS ICON (Bottom Right) -->
            <button class="timeline-btn" title="View Progress Details" onclick='openSubmissionTimeline(${JSON.stringify(row).replace(/'/g, "&apos;")})'>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            </button>
          </div>
        </div>
      </div>
    `;
    fragment.appendChild(card);
  });

  container.appendChild(fragment);
  updatePaginationInfo(filteredSubmissions.length);
}

/**
 * TOGGLE DROPDOWN LOGIC
 */
function toggleCardMenu(idx) {
  const allDropdowns = document.querySelectorAll('.menu-dropdown');
  allDropdowns.forEach((m, i) => {
    if(i !== idx) m.classList.remove('active');
  });
  document.getElementById(`dropdown-${idx}`).classList.toggle('active');
}

// Menutup dropdown saat klik di mana saja
window.addEventListener('click', (e) => {
  if (!e.target.closest('.card-actions-wrapper')) {
    document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
  }
});

/**
 * 4. Helper Render List File
 */
function renderFileList(jsonFiles) {
  try {
    if(!jsonFiles || jsonFiles === "" || jsonFiles === "[]") return "<em style='color:var(--text-light)'>No files</em>";
    const files = JSON.parse(jsonFiles);
    return files.map(f => `
      <a href="${f.url}" target="_blank" style="color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-right:15px; font-size:12px; font-weight:600;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
        ${f.name}
      </a>
    `).join("");
  } catch(e) { 
    // Fallback untuk data URL lama (string tunggal)
    return `<a href="${jsonFiles}" target="_blank" style="color:var(--primary); font-size:12px; font-weight:600;">View Attachment</a>`; 
  }
}
</script>
