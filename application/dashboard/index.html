<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Capability Submissions Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3c92a6;
      --primary-dark: #2d6e7e;
      --primary-light: #eef7f9;
      --bg: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --radius-lg: 14px;
      --radius-md: 10px;
      --transition: all 0.2s ease-in-out;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      color: var(--text-main);
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    /* Table & Submissions Styles */
    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow-x: auto;
      box-shadow: var(--shadow-sm);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: #f8fafc;
      padding: 16px 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 16px 20px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-submitted { background: #e0f2fe; color: #0369a1; }
    .status-review { background: #fef3c7; color: #d97706; }
    .status-approved { background: #dcfce7; color: #15803d; }
    .status-rejected { background: #fee2e2; color: #b91c1c; }

    /* Modal Overlay (Placeholder container) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .history-btn {
      font-size: 12px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    /* History Log Card style inside table */
    .history-list {
      font-size: 11px;
      color: var(--text-muted);
      list-style-type: none;
      padding-left: 0;
      margin: 4px 0 0 0;
    }

    .history-list li {
      margin-bottom: 2px;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1>New Capability Submissions</h1>
      <p style="color: var(--text-muted); margin: 4px 0 0 0;">Manage and track new capabilities applications</p>
    </div>
    <button id="btnNewRequest" class="btn btn-primary" onclick="openModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      New Submission
    </button>
  </header>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Requester</th>
          <th>Caplist & Rating</th>
          <th>Component Detail</th>
          <th>Auth & Levels</th>
          <th>Attachment</th>
          <th>Status</th>
          <th>History Logs</th>
        </tr>
      </thead>
      <tbody id="submissionTableBody">
        <tr>
          <td colspan="9" style="text-align: center; color: var(--text-light); padding: 40px;">Loading submissions data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Container -->
<div id="modalOverlay" class="modal-overlay">
  <!-- Content dynamically loaded from modal/form/index.html -->
  <div id="modalContentContainer"></div>
</div>

<script>
  // Hubungkan dengan GAS API URL yang Anda miliki
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbycaGtEDv-GXxAIlfGv26tYUc1IAUY2MRIgJq1IUbBdP_VrJnvA_B-6-GdRbW2RKKtJ/exec";

  // Memuat data saat halaman dibuka
  window.onload = function() {
    loadSubmissions();
  };

  function loadSubmissions() {
    fetch(`${GAS_API_URL}?action=getSubmissions`)
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("submissionTableBody");
        tbody.innerHTML = "";

        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:var(--text-light);">No submissions found.</td></tr>`;
          return;
        }

        data.forEach(row => {
          let levelsText = [];
          if (row.easaLevels) levelsText.push(`EASA: ${row.easaLevels}`);
          if (row.faaLevels) levelsText.push(`FAA: ${row.faaLevels}`);
          if (row.dgcaLevels) levelsText.push(`DGCA: ${row.dgcaLevels}`);

          // Render History
          let historyHtml = '<ul class="history-list">';
          if (row.history && Array.isArray(row.history)) {
            row.history.forEach(h => {
              historyHtml += `<li><strong>[${h.date}]</strong> ${h.user}: ${h.action} (${h.status})</li>`;
            });
          } else {
            historyHtml += `<li>No history</li>`;
          }
          historyHtml += '</ul>';

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><strong>${row.id}</strong></td>
            <td>${row.date}</td>
            <td>
              <div><strong>${row.username}</strong></div>
              <div style="font-size:11px; color:var(--text-light);">${row.unit}</div>
            </td>
            <td>
              <div><strong>${row.caplistItem}</strong></div>
              <div style="font-size:11px; color:var(--text-muted);">${row.rating}</div>
            </td>
            <td>
              <div><strong>PN: ${row.partNumber}</strong></div>
              <div style="font-size:11px; color:var(--text-muted);">${row.partName} (${row.manufacturer})</div>
              <div style="font-size:11px; color:var(--text-light);">ATA: ${row.ataChapter} | AC: ${row.aircraftType}</div>
            </td>
            <td style="font-size:12px;">
              ${levelsText.join("<br>")}
            </td>
            <td>
              ${row.fileUrl ? `<a href="${row.fileUrl}" target="_blank" class="btn" style="padding:4px 8px; font-size:11px;">PDF Link</a>` : '—'}
            </td>
            <td>
              <span class="status-badge status-${row.status.toLowerCase()}">${row.status}</span>
            </td>
            <td>
              ${historyHtml}
            </td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("submissionTableBody").innerHTML = `<tr><td colspan="9" style="text-align:center; color:var(--danger);">Failed to load data.</td></tr>`;
      });
  }

  // Load modal HTML secara dinamis dari folder modal/form/
  function openModal() {
    const overlay = document.getElementById("modalOverlay");
    const container = document.getElementById("modalContentContainer");
    
    overlay.style.display = "flex";
    
    if (container.innerHTML.trim() === "") {
      fetch("./modal/form/index.html")
        .then(res => res.text())
        .then(html => {
          container.innerHTML = html;
          // Inisialisasi script interaktif form setelah dimuat
          initFormScript();
        })
        .catch(err => {
          container.innerHTML = `<div style="background:white; padding:20px; border-radius:10px; text-align:center;">
            <p>Failed to load form templates.</p>
            <button class="btn" onclick="closeModal()">Close</button>
          </div>`;
        });
    }
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
  }
</script>
</body>
</html>
