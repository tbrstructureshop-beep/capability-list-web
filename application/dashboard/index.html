<script>
/**
 * SUBMISSION MODULE
 */
let allSubmissions = [];
let filteredSubmissions = [];
let subCurrentPage = 1;
let subRowsPerPage = 10;

function loadSubmissions() {
  fetch(`${GAS_API_URL}?action=getSubmissions`)
    .then(res => res.json())
    .then(data => {
      allSubmissions = data;
      filteredSubmissions = data;
      renderSubmissionCards();
    });
}

function applySubmissionFilters() {
  const keyword = document.getElementById("globalSearch").value.toLowerCase();
  filteredSubmissions = allSubmissions.filter(s => 
    s.partNumber.toLowerCase().includes(keyword) || 
    s.id.toLowerCase().includes(keyword) ||
    s.partName.toLowerCase().includes(keyword)
  );
  subCurrentPage = 1;
  renderSubmissionCards();
}

function renderSubmissionCards() {
  const container = document.getElementById("tableBody");
  container.innerHTML = "";

  const start = (subCurrentPage - 1) * subRowsPerPage;
  const end = start + subRowsPerPage;
  const pageData = filteredSubmissions.slice(start, end);

  pageData.forEach(row => {
    const statusMap = {
      'SUBMITTED':    { bg: '#e0f2fe', color: '#0369a1', state: 'OPEN' },
      'UNDER REVIEW': { bg: '#fef3c7', color: '#d97706', state: 'PROGRESS' },
      'APPROVED':     { bg: '#dcfce7', color: '#15803d', state: 'CLOSED' },
      'REJECTED':     { bg: '#fee2e2', color: '#b91c1c', state: 'CLOSED' }
    };
    const s = statusMap[row.status] || { bg: '#f3f4f6', color: '#374151', state: 'UNKNOWN' };

    const card = document.createElement("div");
    card.className = "data-card";
    
    card.innerHTML = `
      <div class="card-main">
        <div class="card-header-row">
            <span class="no-badge">${row.id}</span>
            <div class="vertical-divider"></div>
            ${formatLogoValue(row.authority)}
            <span class="status-badge" style="background:${s.bg}; color:${s.color}; margin-left:auto;">
              ${s.state}: ${row.status}
            </span>
        </div>
        
        <div class="detail-item" style="margin-top: 10px;">
            <span class="detail-label">PART NUMBER</span>
            <div class="detail-value" style="font-size: 18px; font-weight: 700; color: var(--primary);">${row.partNumber}</div>
        </div>

        <div style="margin-top:15px; font-size:11px; background:var(--primary-light); padding:10px; border-radius:8px;">
          <div class="detail-label">REQUESTED LEVELS</div>
          <div class="detail-value">${row.levels || '—'}</div>
        </div>

        <!-- TOMBOL EDIT UNTUK SUBMISSION -->
        <button onclick='openEditForm(${JSON.stringify(row).replace(/'/g, "&apos;")})' class="btn" style="margin-top:15px; width:100%; border-color:var(--primary); color:var(--primary);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          Edit / Manage Submission
        </button>
      </div>

      <div class="data-details">
        <div class="detail-item"><span class="detail-label">PART NAME</span><span class="detail-value">${row.partName}</span></div>
        <div class="detail-item"><span class="detail-label">RATING</span><span class="detail-value">${row.rating}</span></div>
        <div class="detail-item"><span class="detail-label">SHOP</span><span class="detail-value">${row.shop}</span></div>
        <div class="detail-item"><span class="detail-label">REQUESTER</span><span class="detail-value">${row.username}</span></div>
        <div class="detail-item"><span class="detail-label">DATE</span><span class="detail-value">${row.date}</span></div>
        <div class="detail-item" style="grid-column: span 2;">
          <span class="detail-label">ATTACHMENTS</span>
          <div class="detail-value">${renderFileList(row.fileUrl)}</div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  updatePaginationInfo(filteredSubmissions.length);
}
</script>
