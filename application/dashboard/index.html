<script>
/**
 * SUBMISSION MODULE - Professionally Styled
 */

function loadSubmissions() {
  fetch(`${GAS_API_URL}?action=getSubmissions`)
    .then(res => res.json())
    .then(data => {
      renderSubmissionCards(data);
      document.getElementById("dataStatus").textContent = `Found ${data.length} submissions`;
    });
}

function renderSubmissionCards(data) {
  const container = document.getElementById("tableBody");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:60px; color:var(--text-light);"><p>No submissions found.</p></div>`;
    return;
  }

  data.forEach(row => {
    const statusMap = {
      'SUBMITTED':    { bg: '#e0f2fe', color: '#0369a1', state: 'OPEN' },
      'UNDER REVIEW': { bg: '#fef3c7', color: '#d97706', state: 'PROGRESS' },
      'APPROVED':     { bg: '#dcfce7', color: '#15803d', state: 'CLOSED' },
      'REJECTED':     { bg: '#fee2e2', color: '#b91c1c', state: 'CLOSED' }
    };
    const s = statusMap[row.status] || { bg: '#f3f4f6', color: '#374151', state: 'UNKNOWN' };

    const card = document.createElement("div");
    card.className = "data-card"; // Konsisten dengan Main DB Card
    
    card.innerHTML = `
      <div class="card-main">
        <div class="card-header-row">
            <span class="no-badge">${row.id}</span>
            <div class="vertical-divider"></div>
            ${formatLogoValue(row.authority)}
            <span class="status-badge" style="background:${s.bg}; color:${s.color}; margin-left:auto;">
              ${s.state}: ${row.status}
            </span>
        </div>
        
        <div class="detail-item" style="margin-top: 10px;">
            <span class="detail-label">PART NUMBER</span>
            <div class="detail-value" style="font-size: 18px; font-weight: 700; color: var(--primary);">
                ${row.partNumber}
            </div>
        </div>

        <div style="margin-top:15px; font-size:11px; background:var(--primary-light); padding:10px; border-radius:8px;">
          <div class="detail-label" style="margin-bottom:4px;">REQUESTED LEVELS (${row.authority})</div>
          <div class="detail-value" style="color:var(--primary-dark);">${row.levels || '—'}</div>
        </div>
      </div>

      <div class="data-details">
        <div class="detail-item"><span class="detail-label">PART NAME</span><span class="detail-value">${row.partName}</span></div>
        <div class="detail-item"><span class="detail-label">RATING</span><span class="detail-value">${row.rating}</span></div>
        <div class="detail-item"><span class="detail-label">SHOP</span><span class="detail-value">${row.shop}</span></div>
        <div class="detail-item"><span class="detail-label">REQUESTER</span><span class="detail-value">${row.username} (${row.unit})</span></div>
        <div class="detail-item"><span class="detail-label">DATE SUBMITTED</span><span class="detail-value">${row.date}</span></div>
        
        <div class="detail-item" style="grid-column: span 2; border-top: 1px solid var(--border); pt:10px;">
          <span class="detail-label">DOCUMENTS / ATTACHMENTS</span>
          <div class="detail-value" style="margin-top:5px;">
            ${renderFileList(row.fileUrl)}
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function renderFileList(jsonFiles) {
  try {
    if(!jsonFiles || jsonFiles === "") return "<em>No files attached</em>";
    const files = JSON.parse(jsonFiles);
    return files.map(f => `
      <a href="${f.url}" target="_blank" style="color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-right:15px; font-size:12px; font-weight:600;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
        ${f.name}
      </a>
    `).join("");
  } catch(e) { 
    // Fallback jika data lama masih berupa string URL tunggal
    return `<a href="${jsonFiles}" target="_blank" class="btn">View Attachment</a>`; 
  }
}
</script>
