<!-- SweetAlert2 for Pro Notifications -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Container Modal Update Source -->
<div id="sourceModal" class="modal-overlay" style="display:none;">
  <div class="modal-card" style="max-width: 960px; border-radius: 20px;">
    <div class="modal-header" style="background: var(--primary-light); border-bottom: 1px solid rgba(60, 146, 166, 0.2);">
      <h3 class="modal-title" style="color: var(--primary-dark); display: flex; align-items: center; gap: 10px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        Source Manager & Engine Control
      </h3>
      <button class="close-x" onclick="closeUpdateSourceModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="modal-body" style="background: #fcfdfe; padding: 20px;">
      <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px; padding: 0 5px;">
        Konfigurasi jalur data dan kontrol mesin sinkronisasi untuk setiap otoritas penerbangan.
      </p>
      <!-- REPAIR: Grid responsive setup -->
      <div id="sourceCardsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <!-- Cards loaded by JS -->
      </div>
    </div>
  </div>
</div>

<style>
  /* REPAIR: Base Card - Ensure box-sizing and prevent overflow */
  .source-card { 
    background: #ffffff; border: 1px solid var(--border); border-radius: 16px; 
    padding: 20px; transition: all 0.3s ease; display: flex; flex-direction: column;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    box-sizing: border-box;
    width: 100%;
    overflow: hidden; 
  }
  .source-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: var(--shadow-md); }
  
  .card-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
  .auth-label { font-size: 16px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
  
  .status-tag { 
    font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; 
    text-transform: uppercase; white-space: nowrap; 
  }

  .meta-box { 
    background: var(--bg); border-radius: 12px; padding: 12px; margin-bottom: 15px;
    border: 1px solid #edf2f7;
  }
  .meta-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 6px; gap: 10px; }
  .meta-row:last-child { margin-bottom: 0; }
  .meta-label { color: var(--text-light); font-weight: 600; text-transform: uppercase; white-space: nowrap; }
  .meta-value { color: var(--text-main); font-weight: 700; text-align: right; word-break: break-all; }

  .section-divider-label {
    font-size: 9px; font-weight: 800; color: var(--primary); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .section-divider-label::after { content: ""; flex: 1; height: 1px; background: var(--primary-light); }

  /* REPAIR: Input Group - Use grid for precise control to stop overflow */
  .input-group-pro { 
    display: grid; 
    grid-template-columns: 1fr auto auto auto; 
    gap: 4px; 
    margin-bottom: 15px; 
    align-items: center;
  }
  
  .input-pro {
    min-width: 0; /* CRITICAL: Prevents horizontal spill */
    width: 100%; 
    padding: 8px 10px; 
    border-radius: 8px; 
    border: 1.5px solid var(--border);
    font-size: 12px; font-weight: 500; outline: none;
    box-sizing: border-box;
  }
  .input-pro:focus { border-color: var(--primary); }

  .btn-pro-icon {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); flex-shrink: 0;
  }
  .btn-pro-icon:hover { background: var(--primary-light); color: var(--primary); }

  .btn-group-engine { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
    margin-top: auto; 
    padding-top: 15px; 
  }
  
  .engine-btn { 
    padding: 10px 5px; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border); 
    background: #fff; font-weight: 700; font-size: 11px; display: flex; align-items: center; 
    justify-content: center; gap: 6px; transition: all 0.2s;
    white-space: nowrap; 
  }
  .engine-btn.run { background: var(--primary); color: #fff; border: none; }

  /* --- RESPONSIVE FIXES --- */
  @media (max-width: 640px) {
    .modal-card { max-width: 100% !important; height: 100%; border-radius: 0 !important; margin: 0; }
    .modal-body { padding: 15px; }
    .source-card { padding: 15px; }
    .input-group-pro { grid-template-columns: 1fr auto auto auto; }
    .btn-group-engine { grid-template-columns: 1fr; }
  }

  @media (max-width: 400px) {
    .auth-label span { font-size: 14px; }
    .input-group-pro { grid-template-columns: 1fr auto auto; }
    /* Hidden to save space on extremely small screens */
    [id^="open-"] { display: none; } 
  }
</style>

<script>
/**
 * Logika Internal Pro Modal UpdateSource
 */
// 1. Fungsi "Penjaga" Mesin - Berjalan diam-diam (Silent Auto-Resume)
function runStealthEngineGuard(data) {
  data.forEach(s => {
    const isTimeout = (s.status && s.status.toUpperCase().includes("TIMEOUT"));
    const hasId = (s.sourceId && s.sourceId !== "-");

    if (isTimeout && hasId) {
      console.warn(`[Stealth Mode] Auto-Resume triggered for: ${s.authority}`);
      
      // Kirim POST tanpa notifikasi UI (Silent Request)
      fetch(GAS_API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ 
          action: "triggerProcess", 
          auth: s.authority, 
          mode: "resume" 
        })
      });
    }
  });
}

// 2. Fungsi Utama Load & Render Cards
function loadSourceCards() {
  const container = document.getElementById('sourceCardsContainer');
  
  // Tampilkan Spinner saat loading awal
  container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--text-light);">
    <div class="spinner" style="margin: 0 auto 15px;"></div>
    <p>Synchronizing configurations...</p>
  </div>`;
  
  fetch(`${GAS_API_URL}?action=getSourceData&_=${new Date().getTime()}`)
    .then(res => res.json())
    .then(data => {
      // JALANKAN PENJAGA DIAM-DIAM JIKA ADA TIMEOUT
      runStealthEngineGuard(data);

      // BERSIHKAN CONTAINER DAN RENDER ULANG UI
      container.innerHTML = "";
      
      data.forEach(s => {
          const card = document.createElement('div');
          card.className = "source-card";
          const hasUrl = s.pdfCopy && s.pdfCopy.trim() !== "";
          
          // --- LOGIKA VALIDASI TOMBOL (INA - FIXED) ---
          const isFileMissing = (!s.sourceId || s.sourceId === "-");
          const isCompleted = (s.status === "COMPLETED");
          const isInProgress = (s.status === "IN PROGRESS");
          const isTimeout = (s.status === "TIMEOUT (PLEASE RERUN)");
  
          // 1. Resume Sync Inactive jika: Selesai OR Sedang Jalan OR File Kosong
          const resumeDisabled = (isCompleted || isInProgress || isFileMissing) ? "disabled" : "";
          
          // 2. Full Rebuild Inactive jika: Sedang Jalan OR Timeout OR File Kosong
          const rebuildDisabled = (isInProgress || isTimeout || isFileMissing) ? "disabled" : "";
  
          // Dinamisasi Warna Status Tag
          let statusBg = '#f3f4f6'; 
          let statusColor = '#374151';
          if (isCompleted) { 
            statusBg = '#dcfce7'; statusColor = '#15803d'; 
          } else if (isInProgress) { 
            statusBg = '#e0f2fe'; statusColor = '#0369a1'; 
          } else if (isTimeout) {
            statusBg = '#fee2e2'; statusColor = '#b91c1c';
          }
  
          card.innerHTML = `
            <div class="card-header-top">
              <div class="auth-label">
                ${formatLogoValue(s.authority)}
                <span>${s.authority}</span>
              </div>
              <span class="status-tag" style="background: ${statusBg}; color: ${statusColor};">
                ${s.status || 'READY'}
              </span>
            </div>
  
            <div class="meta-box">
              <div class="meta-row"><span class="meta-label">Last Sheet</span><span class="meta-value">${s.lastSheet || '-'}</span></div>
              <div class="meta-row"><span class="meta-label">Last Sync PN</span><span class="meta-value">${s.lastPN || '-'}</span></div>
              <div class="meta-row"><span class="meta-label">Timestamp</span><span class="meta-value">${s.updateAt || '-'}</span></div>
            </div>
            
            <div class="section-divider-label">PDF SharePoint</div>
            <div class="input-group-pro">
              <input type="text" id="pdf-${s.authority}" class="input-pro" 
                     value="${s.pdfCopy || ''}" placeholder="URL SharePoint..." 
                   ${hasUrl ? 'readonly' : ''}>
              
              <button class="btn-pro-icon" id="lock-${s.authority}" title="Edit Tautan" onclick="toggleEdit('${s.authority}')">
                <svg id="icon-lock-${s.authority}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  ${hasUrl ? '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' : '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>'}
                </svg>
              </button>
  
              <button class="btn-pro-icon" id="save-${s.authority}" title="Simpan" disabled onclick="updatePdfUrl('${s.authority}', ${s.rowIndex})">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline></svg>
              </button>
  
              <button class="btn-pro-icon" id="open-${s.authority}" title="Buka" ${!hasUrl ? 'disabled' : ''} onclick="window.open(document.getElementById('pdf-${s.authority}').value, '_blank')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              </button>
            </div>
            
            <div class="section-divider-label">Source Master ${isFileMissing ? '<span style="color:#ef4444; font-weight:900;">(File Required)</span>' : ''}</div>
            <div class="input-group-pro">
               <input type="text" value="${s.sourceId}" readonly class="input-pro" style="background:#f1f5f9; font-size:11px; ${isFileMissing ? 'border:1.5px solid #ef4444;' : ''}">
               <button class="btn-pro-icon" title="Replace GSheet Source" onclick="document.getElementById('file-${s.authority}').click()">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
               </button>
               <input type="file" id="file-${s.authority}" style="display:none;" onchange="uploadNewSource(event, '${s.authority}', '${s.sourceId}', ${s.rowIndex})">
            </div>
  
            <div class="btn-group-engine">
              <button class="engine-btn" ${resumeDisabled} onclick="triggerProc('${s.authority}', 'resume')" 
                style="${resumeDisabled ? 'opacity:0.4; cursor:not-allowed; background:#f3f4f6; pointer-events:none;' : ''}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Resume Sync
              </button>
              <button class="engine-btn run" ${rebuildDisabled} onclick="triggerProc('${s.authority}', 'scratch')" 
                style="${rebuildDisabled ? 'opacity:0.4; cursor:not-allowed; background:#9ca3af; border:none; pointer-events:none;' : ''}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                Full Rebuild
              </button>
            </div>
          `;
          container.appendChild(card);
      });
    });
}

function toggleEdit(auth) {
  const input = document.getElementById(`pdf-${auth}`);
  const saveBtn = document.getElementById(`save-${auth}`);
  const lockBtn = document.getElementById(`lock-${auth}`);
  const iconBox = document.getElementById(`icon-lock-${auth}`);
  const isLocked = input.readOnly;

  if (isLocked) {
    input.readOnly = false; input.focus(); saveBtn.disabled = false; lockBtn.classList.add('active-edit');
    iconBox.innerHTML = '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>';
  } else {
    input.readOnly = true; saveBtn.disabled = true; lockBtn.classList.remove('active-edit');
    iconBox.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>';
  }
}

function updatePdfUrl(auth, row) {
  const url = document.getElementById(`pdf-${auth}`).value;
  Swal.fire({ title: 'Updating URL...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  fetch(GAS_API_URL, {
    method: "POST", mode: "no-cors",
    body: JSON.stringify({ action: "updateSourceConfig", rowIndex: row, pdfCopy: url })
  }).then(() => {
    Swal.fire({ icon: 'success', title: 'Updated!', text: `SharePoint URL for ${auth} has been saved.`, timer: 2000, showConfirmButton: false });
    loadSourceCards();
  }).catch(() => Swal.fire('Error', 'Failed to update URL', 'error'));
}

function uploadNewSource(e, auth, oldId, row) {
  const file = e.target.files[0];
  if (!file) return;

  Swal.fire({
    title: 'Replace Source?',
    text: `Upload ${file.name} sebagai master source ${auth}?`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Yes, Upload'
  }).then((result) => {
    if (result.isConfirmed) {
      const reader = new FileReader();
      Swal.fire({ title: 'Uploading & Registering ID...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      reader.onload = function(evt) {
        // Hapus mode: "no-cors" agar kita bisa mendapat respon dari GAS
        fetch(GAS_API_URL, { 
          method: "POST", 
          body: JSON.stringify({ 
            action: "uploadSourceFile", 
            rowIndex: row, 
            oldId: oldId, 
            fileName: file.name, 
            fileData: evt.target.result.split(",")[1] 
          }) 
        })
        .then(res => res.json())
        .then(response => { 
          if(response.success) {
            Swal.fire('Success!', `Master source ${auth} berhasil diupdate dengan ID baru.`, 'success');
            loadSourceCards(); // Refresh modal untuk mengaktifkan tombol
          } else {
            throw new Error(response.error);
          }
        })
        .catch(err => {
          // Fallback jika CORS bermasalah, tunggu 3 detik lalu refresh
          setTimeout(() => { loadSourceCards(); }, 3000);
          Swal.fire('Info', 'Proses upload selesai. Merefresh data...', 'info');
        });
      };
      reader.readAsDataURL(file);
    }
  });
}

function triggerProc(auth, mode) {
  const config = mode === 'scratch' 
    ? { title: 'Full Rebuild?', text: `This will WIPE all current ${auth} data and start from scratch. Proceed?`, icon: 'warning' }
    : { title: 'Resume Process?', text: `Continue processing ${auth} from last checkpoint?`, icon: 'question' };

  Swal.fire({
    ...config,
    showCancelButton: true,
    confirmButtonColor: mode === 'scratch' ? '#d33' : '#3c92a6',
    confirmButtonText: 'Confirm'
  }).then((result) => {
    if (result.isConfirmed) {
      fetch(GAS_API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "triggerProcess", auth: auth, mode: mode }) });
      Swal.fire('Engine Started', 'Process is running in the background. Check status in a few minutes.', 'success');
    }
  });
}
</script>
