<!-- modal/tool/dashboard/index.html -->
<div id="toolDashboardModal" class="modal-card" style="max-width: 900px;">
  <div class="modal-header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
      <h2 style="margin:0; font-size: 18px;">Edit Tools</h2>
    </div>
    <button class="close-x" onclick="closeToolDashboard()">&times;</button>
  </div>

  <div class="modal-body" style="background: #f8fafc;">
    <!-- Tool Identity Header -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 40px; padding: 20px; background: white; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border);">
      <div id="toolQR" style="padding: 10px; border: 1px solid #eee; border-radius: 8px; position: relative;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=TOOL-INFO" alt="QR" width="80">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:2px; border-radius:4px;">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--primary)"><path d="M14.7 6.3l1.6 1.6-3.77 3.77-1.6-1.6 3.77-3.77zM2 22l3-3 6.91-6.91a6 6 0 1 0-3-3L2 16v6h6l3-3"></path></svg>
        </div>
      </div>
      <div style="height: 80px; width: 2px; background: var(--primary);"></div>
      <div style="text-align: left;">
        <div id="displayPN" style="font-size: 32px; font-weight: 800; color: #1e40af; line-height: 1;">NORTEC600D</div>
        <div style="font-size: 12px; color: var(--text-light); text-transform: uppercase; font-weight: 700;">part number</div>
      </div>
      <div style="text-align: left;">
        <div id="displayTN" style="font-size: 32px; font-weight: 800; color: #1e40af; line-height: 1;">1NTXX0113</div>
        <div style="font-size: 12px; color: var(--text-light); text-transform: uppercase; font-weight: 700;">tool number</div>
      </div>
    </div>

    <!-- Form Grid -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Tools Serial Number</label>
        <input type="text" id="toolSN" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;" value="140024606">
      </div>
      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Tools Reg Number</label>
        <input type="text" id="toolReg" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;" value="1NTXX0113">
      </div>
      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Model</label>
        <input type="text" id="toolModel" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;" value="NORTEC600">
      </div>
      
      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Location</label>
        <input type="text" id="toolLoc" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;" value="NDT H2">
      </div>
      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Manufacture</label>
        <input type="text" id="toolManuf" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;" value="OLYMPUS">
      </div>
      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Store</label>
        <select id="toolStore" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;">
          <option>Select one</option>
          <option value="H1">H1</option><option value="H2">H2</option><option value="H3">H3</option><option value="H4">H4</option>
          <option value="ND" selected>ND</option><option value="HP">HP</option><option value="W1">W1</option><option value="XX">XX</option>
          <option value="72">72</option><option value="DI">DI</option><option value="AN">AN</option><option value="UP">UP</option>
          <option value="OT">OT</option><option value="W2">W2</option><option value="LG">LG</option><option value="DP">DP</option>
        </select>
      </div>

      <div class="field-group">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Status</label>
        <select id="toolStatus" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;">
          <option value="AVAILABLE" selected>AVAILABLE</option>
          <option value="BROKEN">BROKEN</option>
          <option value="CALIBRATION">CALIBRATION</option>
          <option value="QUARANTINED">QUARANTINED</option>
          <option value="MISSING">MISSING</option>
          <option value="MAINTENANCE">MAINTENANCE</option>
          <option value="BOOKED">BOOKED</option>
        </select>
      </div>
      <div class="field-group" style="grid-column: span 2;">
        <label style="display:block; font-size:11px; font-weight:700; margin-bottom:6px; color:var(--text-main);">Category</label>
        <select id="toolCategory" class="form-control" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#fff;">
          <option>Select one</option>
          <option value="GENERAL">GENERAL</option>
          <option value="IMTE" selected>IMTE</option>
          <option value="PMI NDT">PMI NDT</option>
          <option value="PMI MAC">PMI MAC</option>
          <option value="PMI TCR">PMI TCR</option>
        </select>
      </div>
    </div>

    <!-- Media Section -->
    <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="background: white; border: 1px dashed var(--primary); border-radius: 12px; padding: 20px; text-align: center;">
            <div style="font-size: 12px; font-weight: 700; margin-bottom: 10px;">TOOL IMAGE</div>
            <img id="toolImgPreview" src="https://via.placeholder.com/150x100?text=No+Image" style="max-width: 100%; border-radius: 8px; margin-bottom: 10px;">
            <button class="btn" style="width: 100%; justify-content: center; font-size: 12px;">Change Image</button>
        </div>
        <div style="background: white; border: 1px dashed var(--primary); border-radius: 12px; padding: 20px; text-align: center;">
            <div style="font-size: 12px; font-weight: 700; margin-bottom: 10px;">MANUAL / PDF</div>
            <div style="height: 100px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 8px; margin-bottom: 10px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </div>
            <button class="btn" style="width: 100%; justify-content: center; font-size: 12px;">Upload PDF</button>
        </div>
    </div>
  </div>

  <div class="modal-footer" style="padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end;">
    <button class="btn" id="saveToolBtn" disabled style="background: #d1d5db; color: white; border: none; cursor: not-allowed; min-width: 180px;">No Data Changed</button>
  </div>
</div>

<script>
  function initToolDashboard(data) {
    if(!data) return;
    document.getElementById('displayPN').textContent = data.pn || 'N/A';
    document.getElementById('displayTN').textContent = data.tn || 'N/A';
    // Logic for tracking changes to enable the Save Button can be added here
  }
</script>
