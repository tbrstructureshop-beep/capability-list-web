<div id="toolFormModal" class="modal-card" style="max-width: 900px; box-shadow: var(--shadow-md);">
  <!-- ... Header and Identity Header preserved ... -->
  
  <div class="modal-body" style="background: #ffffff; padding: 24px;">
    <!-- Identity Header code here -->
    
    <!-- Main Grid Form code here -->

    <!-- Media Section -->
    <div style="margin-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
        <div class="media-upload-box">
            <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">TOOL VISUAL ASSET</div>
            <div style="height: 140px; background: #f1f5f9; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #e2e8f0;">
                <!-- Thumbnail display using GDrive Proxy logic -->
                <img id="f_toolImgPreview" src="https://via.placeholder.com/200x140?text=NO+IMAGE" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <!-- Hidden Input -->
            <input type="file" id="f_toolImgInput" accept="image/*" hidden>
            <button class="btn" style="width: 100%; justify-content: center; font-size: 12px; background: white;" onclick="document.getElementById('f_toolImgInput').click()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              Update Image
            </button>
        </div>
        <div class="media-upload-box">
            <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">TECHNICAL DOCUMENT / PDF</div>
            <div id="f_pdfPreviewContainer" style="height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff1f2; border-radius: 10px; margin-bottom: 15px; border: 1px solid #fecaca;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <div id="f_pdfFileName" style="margin-top: 8px; font-size: 10px; font-weight: 700; color: #b91c1c;">NO PDF UPLOADED</div>
            </div>
            <!-- Hidden Input -->
            <input type="file" id="f_toolPdfInput" accept="application/pdf" hidden>
            <button class="btn" style="width: 100%; justify-content: center; font-size: 12px; background: white;" onclick="document.getElementById('f_toolPdfInput').click()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              Upload Document
            </button>
        </div>
    </div>
  </div>
  
  <!-- Modal Footer preserved -->
</div>

<script>
/**
 * INA - Revised initToolForm with Image/PDF support
 */
function initToolForm(tn, pn) {
    const saveBtn = document.getElementById('f_saveToolBtn');
    let uploadedImg = null;
    let uploadedPdf = null;

    // Helper to extract Drive ID and get high-res thumbnail
    const getDriveThumb = (url) => {
      if(!url || url.includes('placeholder')) return url;
      const id = url.match(/[-\w]{25,}/);
      return id ? `https://lh3.googleusercontent.com/d/${id[0]}=s400` : url;
    };

    // 1. Populate data
    if (tn && typeof allToolData !== 'undefined') {
      const existing = allToolData.find(i => i.tn === tn && i.pn === pn);
      if (existing) {
        // ... previous field population ...
        document.getElementById('f_toolImgPreview').src = getDriveThumb(existing.imgUrl);
        if(existing.pdfUrl) document.getElementById('f_pdfFileName').textContent = "VIEW DOCUMENT";
      }
    }

    // 2. Handle Image Selection
    document.getElementById('f_toolImgInput').onchange = function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('f_toolImgPreview').src = ev.target.result;
        uploadedImg = { name: file.name, data: ev.target.result.split(',')[1] };
        saveBtn.disabled = false;
        saveBtn.style.opacity = "1";
      };
      reader.readAsDataURL(file);
    };

    // 3. Handle PDF Selection
    document.getElementById('f_toolPdfInput').onchange = function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('f_pdfFileName').textContent = file.name;
        uploadedPdf = { name: file.name, data: ev.target.result.split(',')[1] };
        saveBtn.disabled = false;
        saveBtn.style.opacity = "1";
      };
      reader.readAsDataURL(file);
    };

    saveBtn.onclick = async () => {
      const payload = {
        action: "saveToolVariant",
        pn: pn,
        tn: tn || `TN-${Date.now()}`,
        // ... other text fields ...
        imgFile: uploadedImg,
        pdfFile: uploadedPdf,
        updatedBy: currentUser ? currentUser.name : "Guest"
      };

      // ... existing post logic ...
    };
}
</script>
