<!-- modal/tool/dashboard/form/index.html -->
<style>
  #toolFormModal .form-label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.02em; }
  #toolFormModal .form-control { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: #f9fafb; font-size: 13px; transition: 0.2s; }
  #toolFormModal .form-control:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(60, 146, 166, 0.1); }
  .media-upload-box { background: #fff; border: 1px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .tool-thumb { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); background: #f1f5f9; cursor: pointer; }

  /* Autocomplete Styles for "Google Advice" feel */
  .autocomplete-container { position: relative; }
  .suggestion-box {
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    z-index: 2000;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }
  .suggestion-item {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-main);
    border-bottom: 1px solid #f9fafb;
    transition: background 0.1s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--primary-light); color: var(--primary); font-weight: 700; }
  .suggestion-header { padding: 6px 14px; font-size: 9px; font-weight: 800; color: var(--text-light); background: #f9fafb; text-transform: uppercase; }
</style>

<div id="toolFormModal" class="modal-card" style="max-width: 900px; box-shadow: var(--shadow-md);">
  <div class="modal-header" style="background: #f8fafc; border-bottom: 1px solid var(--border);">
    <div style="display: flex; align-items: center; gap: 12px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <h2 style="margin:0; font-size: 16px; color: var(--text-main);">Tool Detail / Edit Variant</h2>
    </div>
    <button class="close-x" onclick="closeToolForm()">&times;</button>
  </div>

  <div class="modal-body" style="background: #ffffff; padding: 24px;">
    <!-- Identity Header -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 40px; padding: 24px; background: #fff; border-radius: 14px; margin-bottom: 24px; border: 1px solid var(--border);">
      <div style="padding: 8px; border: 1px solid #e5e7eb; border-radius: 10px; background: white;">
        <img id="f_formQRImg" src="https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=TOOL" width="70" height="70">
      </div>
      <div style="text-align: left;">
        <div id="formDisplayPN" style="font-size: 28px; font-weight: 800; color: #1e40af; line-height: 1;">PN</div>
        <div style="font-size: 11px; color: var(--text-light); text-transform: uppercase; font-weight: 700;">Reference Group PN</div>
      </div>
      <div style="text-align: left;">
        <div id="formDisplayTN" style="font-size: 28px; font-weight: 800; color: #1e40af; line-height: 1;">TN</div>
        <div style="font-size: 11px; color: var(--text-light); text-transform: uppercase; font-weight: 700;">tool number</div>
      </div>
    </div>

    <!-- Form Grid -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
      <div><label class="form-label">Tool Part Number</label><input type="text" id="f_toolPN" class="form-control force-up"></div>
      <div><label class="form-label">Serial Number</label><input type="text" id="f_toolSN" class="form-control force-up"></div>
      <div><label class="form-label">Reg Number</label><input type="text" id="f_toolReg" class="form-control force-up"></div>
      <div><label class="form-label">Model</label><input type="text" id="f_toolModel" class="form-control force-up"></div>
      <div><label class="form-label">Location</label><input type="text" id="f_toolLoc" class="form-control force-up"></div>
      <div><label class="form-label">Manufacture</label><input type="text" id="f_toolManuf" class="form-control force-up"></div>
      
      <!-- STYLED AUTOCOMPLETE STORE -->
      <div class="autocomplete-container">
        <label class="form-label">Store</label>
        <input type="text" id="f_toolStore" class="form-control force-up" placeholder="Type store..." autocomplete="off">
        <div id="box_stores" class="suggestion-box"></div>
      </div>

      <!-- STYLED AUTOCOMPLETE STATUS -->
      <div class="autocomplete-container">
        <label class="form-label">Status</label>
        <input type="text" id="f_toolStatus" class="form-control force-up" placeholder="Type status..." autocomplete="off">
        <div id="box_statuses" class="suggestion-box"></div>
      </div>

      <!-- STYLED AUTOCOMPLETE CATEGORY -->
      <div class="autocomplete-container" style="grid-column: span 1;">
        <label class="form-label">Category</label>
        <input type="text" id="f_toolCategory" class="form-control force-up" placeholder="Type category..." autocomplete="off">
        <div id="box_categories" class="suggestion-box"></div>
      </div>
    </div>

    <!-- Media Section -->
    <div style="margin-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
        <div class="media-upload-box">
            <div style="font-size: 11px; font-weight: 800; margin-bottom: 12px;">TOOL VISUAL ASSET</div>
            <div style="height: 140px; background: #f1f5f9; border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                <img id="f_toolImgPreview" src="https://via.placeholder.com/200x140?text=NO+IMAGE" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <input type="file" id="f_toolImgInput" accept="image/*" hidden>
            <button class="btn" style="width: 100%;" onclick="document.getElementById('f_toolImgInput').click()">Update Image</button>
        </div>
        <div class="media-upload-box">
            <div style="font-size: 11px; font-weight: 800; margin-bottom: 12px;">PDF DOCUMENT</div>
            <div style="height: 140px; background: #fff1f2; border-radius: 10px; margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                <div id="f_pdfFileName" style="margin-top: 8px; font-size: 10px; font-weight: 700; color: #b91c1c;">NO PDF</div>
            </div>
            <input type="file" id="f_toolPdfInput" accept="application/pdf" hidden>
            <button class="btn" style="width: 100%;" onclick="document.getElementById('f_toolPdfInput').click()">Upload PDF</button>
        </div>
    </div>
  </div>

  <div class="modal-footer" style="padding: 20px 24px; border-top: 1px solid var(--border); background: #f8fafc; display: flex; justify-content: flex-end; gap: 12px;">
    <button class="btn" onclick="closeToolForm()" style="background: white;">Cancel</button>
    <button class="btn btn-primary" id="f_saveToolBtn" disabled style="min-width: 180px;">No Data Changed</button>
  </div>
</div>

<script>
/**
 * INA - Master initToolForm with Autocomplete Suggestion logic
 */
async function initToolForm(tn, pn) {
    const saveBtn = document.getElementById('f_saveToolBtn');
    if (!saveBtn) return; 
    
    let uploadedImg = null;
    let uploadedPdf = null;
    let caplistPn = pn; 
    let masterOptions = { stores: [], statuses: [], categories: [] };

    document.getElementById('formDisplayPN').textContent = caplistPn || "MASTER";
    document.getElementById('formDisplayTN').textContent = tn || "NEW ENTRY";

    // --- FETCH OPTIONS & SETUP AUTOCOMPLETE ---
    try {
      const optResp = await fetch(`${GAS_API_URL}?action=getToolDropdownOptions`);
      masterOptions = await optResp.json();
      
      setupAutocomplete('f_toolStore', 'box_stores', masterOptions.stores);
      setupAutocomplete('f_toolStatus', 'box_statuses', masterOptions.statuses);
      setupAutocomplete('f_toolCategory', 'box_categories', masterOptions.categories);
    } catch(e) { console.error("Dropdown options failed to load", e); }

    function setupAutocomplete(inputId, boxId, options) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(boxId);

      const renderList = (val) => {
        const filtered = options.filter(o => o.toLowerCase().includes(val.toLowerCase()));
        if(filtered.length === 0 && val === "") {
          box.innerHTML = `<div class="suggestion-header">Recent Options</div>` + options.slice(0, 5).map(o => `<div class="suggestion-item">${o}</div>`).join('');
        } else if (filtered.length > 0) {
          box.innerHTML = `<div class="suggestion-header">Suggestions</div>` + filtered.map(o => `<div class="suggestion-item">${o}</div>`).join('');
        } else {
          box.innerHTML = `<div class="suggestion-item" style="color:var(--text-light); cursor:default;">New: "${val.toUpperCase()}"</div>`;
        }
        box.style.display = "block";
      };

      input.onfocus = () => renderList(input.value);
      input.oninput = () => renderList(input.value);
      
      // Close on blur but allow for item click
      input.onblur = () => setTimeout(() => { box.style.display = "none"; }, 200);

      box.onclick = (e) => {
        if(e.target.classList.contains('suggestion-item') && !e.target.innerText.startsWith('New:')) {
          input.value = e.target.innerText;
          input.dispatchEvent(new Event('input')); // Trigger save button check
          box.style.display = "none";
        }
      };
    }

    // 1. Populate Existing Data
    if (tn && typeof allToolData !== 'undefined') {
      const existing = allToolData.find(i => i.tn === tn);
      if (existing) {
        document.getElementById('f_toolPN').value = existing.pn || ""; 
        document.getElementById('f_toolSN').value = (existing.sn && existing.sn !== "N/A") ? existing.sn : "";
        document.getElementById('f_toolReg').value = (existing.reg && existing.reg !== "N/A") ? existing.reg : "";
        document.getElementById('f_toolModel').value = existing.model || "";
        document.getElementById('f_toolLoc').value = existing.location || "";
        document.getElementById('f_toolManuf').value = existing.manufacturer || "";
        document.getElementById('f_toolStore').value = existing.store || "";
        document.getElementById('f_toolStatus').value = existing.status || "";
        document.getElementById('f_toolCategory').value = existing.category || "";
        
        if(existing.imgUrl && existing.imgUrl !== "" && existing.imgUrl !== "undefined") {
           const idMatch = existing.imgUrl.match(/[-\w]{25,}/);
           document.getElementById('f_toolImgPreview').src = idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[0]}=s400` : existing.imgUrl;
        }
        if(existing.pdfUrl && existing.pdfUrl !== "" && existing.pdfUrl !== "undefined") {
          const pLabel = document.getElementById('f_pdfFileName');
          pLabel.textContent = "CURRENT_DOCUMENT.PDF";
          pLabel.style.color = "#22c55e";
        }
      }
    } else {
      document.getElementById('f_toolPN').value = caplistPn; 
    }

    if(tn) document.getElementById('f_formQRImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=${tn}`;

    // 2. Change Listeners & Forced Uppercase
    document.querySelectorAll('#toolFormModal .form-control').forEach(input => {
      input.addEventListener('input', function() {
        if(this.classList.contains('force-up')) this.value = this.value.toUpperCase();
        saveBtn.disabled = false; 
        saveBtn.textContent = "Save Changes"; 
        saveBtn.style.opacity = "1";
      });
    });

    // 3. File Handlers (preserved)
    document.getElementById('f_toolImgInput').onchange = (e) => {
      if(!e.target.files.length) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('f_toolImgPreview').src = ev.target.result;
        uploadedImg = { name: e.target.files[0].name, data: ev.target.result.split(',')[1] };
        saveBtn.disabled = false;
      };
      reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('f_toolPdfInput').onchange = (e) => {
       if(!e.target.files.length) return;
       const reader = new FileReader();
       reader.onload = (ev) => {
         document.getElementById('f_pdfFileName').textContent = e.target.files[0].name;
         uploadedPdf = { name: e.target.files[0].name, data: ev.target.result.split(',')[1] };
         saveBtn.disabled = false;
       };
       reader.readAsDataURL(e.target.files[0]);
    };

    // 4. Submit Logic
    saveBtn.onclick = async () => {
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";
      const payload = {
        action: "saveToolVariant",
        caplistPn: caplistPn,
        pn: document.getElementById('f_toolPN').value, 
        tn: tn || `TN-${Date.now()}`,
        sn: document.getElementById('f_toolSN').value,
        reg: document.getElementById('f_toolReg').value,
        model: document.getElementById('f_toolModel').value,
        location: document.getElementById('f_toolLoc').value,
        manufacturer: document.getElementById('f_toolManuf').value,
        store: document.getElementById('f_toolStore').value,
        status: document.getElementById('f_toolStatus').value,
        category: document.getElementById('f_toolCategory').value,
        imgFile: uploadedImg,
        pdfFile: uploadedPdf,
        updatedBy: (typeof currentUser !== 'undefined' && currentUser) ? currentUser.name : "Guest"
      };

      try {
        const r = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
        const res = await r.json();
        if(res.success) {
          Swal.fire({ icon: 'success', title: 'Tool Saved', timer: 1200, showConfirmButton: false });
          closeToolForm();
          if(typeof loadToolData === 'function') loadToolData();
        }
      } catch(e) { console.error(e); Swal.fire("Error", e.message, "error"); saveBtn.disabled = false; }
    };
}
</script>
