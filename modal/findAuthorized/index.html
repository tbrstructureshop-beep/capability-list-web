<style>
  .find-card {
    background: #fff; width: 450px; border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    display: flex; flex-direction: column; overflow: hidden;
    animation: findSlideIn 0.3s ease-out;
  }
  @keyframes findSlideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  
  .find-search-box { padding: 20px; border-bottom: 1px solid var(--border); background: #f9fafb; }
  .find-input { 
    width: 100%; padding: 14px 16px; border-radius: 12px; 
    border: 1.5px solid var(--border); outline: none; font-size: 15px;
    transition: 0.2s;
  }
  .find-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(60, 146, 166, 0.1); }

  .advice-list { max-height: 350px; overflow-y: auto; padding: 10px; display: none; flex-direction: column; gap: 4px; }
  .advice-item {
    padding: 12px 16px; border-radius: 10px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: 0.2s; border: 1px solid transparent;
  }
  .advice-item:hover { background: var(--primary-light); border-color: var(--primary); }
  .advice-info { display: flex; flex-direction: column; }
  .advice-name { font-weight: 700; color: var(--text-main); font-size: 14px; }
  .advice-meta { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .advice-unit { font-size: 10px; background: #eee; padding: 2px 8px; border-radius: 20px; font-weight: 800; }
  
  .empty-advice { padding: 40px 20px; text-align: center; color: var(--text-light); font-size: 13px; }
</style>

<div class="find-card">
  <div class="find-search-box">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
       <label style="font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase;">Search Personnel</label>
       <button onclick="closeFindModal()" style="border:none; background:none; cursor:pointer; font-size:18px;">&times;</button>
    </div>
    <input type="text" id="findPersonInput" class="find-input" placeholder="Type ID, Name, or Unit..." oninput="handleAdvice(this.value)">
  </div>
  
  <div id="adviceContainer" class="advice-list"></div>
  
  <div id="initialState" class="empty-advice">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom:10px; opacity:0.5;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <p>Start typing to find personnel...</p>
  </div>
</div>

<script>
  let localStaff = [];
  let existingIds = new Set();

  function initFindPersonnel(staff, existing) {
    localStaff = staff;
    existingIds = existing;
    document.getElementById('findPersonInput').focus();
  }

  function handleAdvice(query) {
    const container = document.getElementById('adviceContainer');
    const initialState = document.getElementById('initialState');
    
    if(!query || query.length < 1) {
      container.style.display = 'none';
      initialState.style.display = 'block';
      return;
    }

    const q = query.toLowerCase();
    const matches = localStaff.filter(u => {
      if(existingIds.has(String(u.empId))) return false; // Hide if already in set
      return String(u.empId).toLowerCase().includes(q) || 
             String(u.name).toLowerCase().includes(q) || 
             String(u.unit).toLowerCase().includes(q);
    }).slice(0, 10); // Show top 10

    initialState.style.display = 'none';
    container.style.display = 'flex';

    if(matches.length === 0) {
      container.innerHTML = `<div class="empty-advice">No matching personnel found (or already added)</div>`;
    } else {
      container.innerHTML = matches.map(u => `
        <div class="advice-item" onclick="selectPersonnel('${u.empId}', '${u.name}')">
          <div class="advice-info">
            <span class="advice-name">${u.name}</span>
            <span class="advice-meta">ID: ${u.empId} • ${u.jobTitle || 'No Title'}</span>
          </div>
          <span class="advice-unit">${u.unit}</span>
        </div>
      `).join('');
    }
  }

  function selectPersonnel(id, name) {
    closeFindModal();
    if(typeof processAddPerson === 'function') {
      processAddPerson(id);
    }
  }

  function closeFindModal() {
    document.getElementById('findAuthorizedOverlay').style.display = 'none';
  }
</script>
