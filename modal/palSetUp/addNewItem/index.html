<style>
  .bulk-add-card {
    background: #fff; width: 95%; max-width: 550px; border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    display: flex; flex-direction: column; overflow: hidden;
    animation: bulkSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes bulkSlideIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  
  .bulk-search-box { padding: 20px; border-bottom: 1px solid var(--border); background: #f9fafb; }
  .bulk-search-box input {
    width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
    outline: none; font-size: 14px; transition: 0.2s;
  }
  .bulk-search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(60, 146, 166, 0.1); }
  
  .selection-basket {
    padding: 12px 20px; background: var(--primary-light); border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 8px; max-height: 100px; overflow-y: auto;
  }
  .basket-tag {
    background: white; border: 1px solid var(--primary); color: var(--primary);
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .basket-tag span { cursor: pointer; color: #ef4444; font-size: 16px; font-weight: bold; }

  .bulk-advice-list { max-height: 380px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  .bulk-item {
    padding: 12px 16px; border-radius: 12px; cursor: pointer;
    display: grid; grid-template-columns: 30px 1fr auto; align-items: center;
    transition: 0.2s; border: 1px solid transparent;
  }
  .bulk-item:hover { background: #f3f4f6; }
  .bulk-item.selected { background: var(--primary-light); border-color: var(--primary); }
  .bulk-info { display: flex; flex-direction: column; padding-left: 10px; }
  .bulk-pn { font-weight: 800; color: var(--primary); font-size: 14px; }
  .bulk-desc { font-size: 12px; color: var(--text-main); font-weight: 600; line-height: 1.2; }
  .bulk-meta { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
  .bulk-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
</style>

<div id="bulkAddModalOverlay" class="modal-overlay" style="display:none; z-index: 17000;">
  <div class="bulk-add-card">
    <div class="bulk-search-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
         <label style="font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:0.05em;">Bulk Add Authorized Parts</label>
         <button onclick="closeBulkAddModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color:var(--text-light);">&times;</button>
      </div>
      <input type="text" id="bulkSearchInput" placeholder="Search by P/N, Name, or ATA..." oninput="updateBulkAdvice(this.value)">
    </div>

    <div id="selectionBasket" class="selection-basket" style="display:none;"></div>
    
    <div id="bulkAdviceContainer" class="bulk-advice-list">
       <div style="padding:40px; text-align:center; color:var(--text-light); font-size: 13px;">Type at least 2 characters to search in Capability List...</div>
    </div>

    <div class="bulk-footer">
      <button class="btn" onclick="closeBulkAddModal()">Cancel</button>
      <button id="btnSaveBulk" class="btn btn-primary" onclick="saveBulkAuthorized()" disabled>Save Selection (0)</button>
    </div>
  </div>
</div>

<script>
  /**
   * State Management menggunakan Composite Key (Otoritas + PN)
   * Agar satu PN yang punya banyak otoritas bisa dipilih secara terpisah.
   */
  let selectedItems = new Map(); 

  window.startBulkAddProcess = function() {
    const overlay = document.getElementById('bulkAddModalOverlay');
    if (overlay) {
      overlay.style.display = 'flex';
      document.getElementById('bulkSearchInput').value = '';
      document.getElementById('bulkSearchInput').focus();
      document.getElementById('bulkAdviceContainer').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-light); font-size: 13px;">Type to search components...</div>';
      selectedItems.clear();
      updateBasketUI();
    }
  };

  function closeBulkAddModal() {
    document.getElementById('bulkAddModalOverlay').style.display = 'none';
  }

  /**
   * REPAIRED: updateBulkAdvice & toggleBulkItem (Step 2 - Frontend Logic)
   * 
   * Perbaikan fokus pada:
   * 1. Normalisasi Part Number (menghapus spasi/newline) untuk Key pencocokan.
   * 2. Highlighting: Memastikan class 'selected' muncul saat item diklik.
   * 3. FAA Multi-PN: Menangani string PN yang mengandung karakter pindah baris agar tidak merusak JavaScript.
   */
  
  function updateBulkAdvice(query) {
      const container = document.getElementById('bulkAdviceContainer');
      if(!query || query.length < 2) {
        container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-light); font-size: 13px;">Type at least 2 characters to search in Capability List...</div>';
        return;
      }
  
      // Normalisasi query: hapus spasi agar pencarian PN lebih fleksibel
      const q = query.toLowerCase().replace(/\s+/g, ''); 
  
      const matches = rawData.filter(row => 
        // Cek kolom PN (index 5) dengan normalisasi spasi
        String(row[5]).toLowerCase().replace(/\s+/g, '').includes(q) || 
        String(row[6]).toLowerCase().includes(q) || 
        String(row[3]).toLowerCase().includes(q)
      ).slice(0, 25);
  
      if(matches.length === 0) {
        container.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-muted);">No matching items found.</div>';
        return;
      }
  
      container.innerHTML = matches.map(row => {
        const auth = String(row[1]);
        const pnRaw = String(row[5]);
        
        // NORMALISASI KEY: Kunci unik menggunakan Gabungan Otoritas + PN tanpa spasi
        const cleanPn = pnRaw.replace(/\s+/g, ''); 
        const itemKey = `${auth}|${cleanPn}`;
        
        const isSelected = selectedItems.has(itemKey);
        
        // Sanitasi Deskripsi & PN untuk ditaruh di dalam attribute onclick HTML
        const safeDesc = row[6].replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');
        const safePnForClick = pnRaw.replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');
  
        return `
          <div class="bulk-item ${isSelected ? 'selected' : ''}" 
               onclick="toggleBulkItem('${auth}', '${safePnForClick}', '${safeDesc}', '${row[3]}')">
            <input type="checkbox" ${isSelected ? 'checked' : ''} 
                   onclick="event.stopPropagation(); toggleBulkItem('${auth}', '${safePnForClick}', '${safeDesc}', '${row[3]}')">
            <div class="bulk-info">
              <span class="bulk-pn">${pnRaw}</span>
              <span class="bulk-desc">${row[6]}</span>
              <span class="bulk-meta">${auth} • ATA ${row[3]}</span>
            </div>
            <div style="opacity:0.6;">${typeof formatLogoValue === 'function' ? formatLogoValue(auth) : auth}</div>
          </div>
        `;
      }).join('');
  }
  
  function toggleBulkItem(auth, pn, desc, ata) {
      // Normalisasi PN (hapus spasi/newline) saat membuat Key untuk disimpan di Map
      const cleanPn = pn.replace(/\s+/g, '');
      const itemKey = `${auth}|${cleanPn}`; 
      
      if(selectedItems.has(itemKey)) {
        selectedItems.delete(itemKey);
      } else {
        // Simpan PN asli untuk dikirim ke sheet, tapi gunakan cleanPn sebagai Key di Map
        selectedItems.set(itemKey, { 
          authority: auth, 
          pn: pn, 
          desc: desc, 
          ata: ata 
        });
      }
      
      // Update Keranjang (basket) UI
      updateBasketUI();
      
      // RE-RENDER LIST: Agar highlight biru (class .selected) langsung muncul/hilang seketika
      const currentQuery = document.getElementById('bulkSearchInput').value;
      updateBulkAdvice(currentQuery);
  }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    
    if(selectedItems.size === 0) {
      basket.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = "Save Selection (0)";
      return;
    }

    basket.style.display = 'flex';
    saveBtn.disabled = false;
    saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    
    basket.innerHTML = Array.from(selectedItems.values()).map(item => {
      const itemKey = `${item.authority}|${item.pn}`;
      return `
        <div class="basket-tag">
          <small style="font-size:8px; opacity:0.7; margin-right:4px;">${item.authority}</small> ${item.pn} 
          <span onclick="toggleBulkItem('${item.authority}','${item.pn}')">&times;</span>
        </div>
      `;
    }).join('');
  }

  async function saveBulkAuthorized() {
    const empId = document.getElementById('pal_id').textContent;
    const itemsArray = Array.from(selectedItems.values());
    
    Swal.fire({ title: 'Updating Ability List...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "bulkAddAuthorized",
          empId: empId,
          items: itemsArray
        })
      });
      const result = await res.json();
      if(result.success) {
        Swal.fire({ icon: 'success', title: 'Saved!', text: `${itemsArray.length} items added.`, timer: 1500, showConfirmButton: false });
        closeBulkAddModal();
        if (typeof openPALDocument === 'function') {
           openPALDocument(empId, document.getElementById('pal_name').textContent, document.getElementById('pal_title').textContent);
        }
      }
    } catch(e) {
      Swal.fire("Error", "Failed to save selection", "error");
    }
  }
</script>
