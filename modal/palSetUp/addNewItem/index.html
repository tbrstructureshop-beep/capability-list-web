<style>
  /* --- STYLING MODAL BULK ADD --- */
  .bulk-add-card {
    background: var(--card-bg);
    width: 95%; max-width: 550px; border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .bulk-search-box { padding: 24px; border-bottom: 1px solid var(--border); background: #f9fafb; }
  .bulk-search-box input {
    width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border);
    outline: none; font-size: 14px; background: var(--card-bg); color: var(--text-main);
  }

  .selection-basket {
    padding: 12px 20px; background: var(--primary-light); border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 8px; max-height: 100px; overflow-y: auto;
  }

  .basket-tag {
    background: var(--card-bg); border: 1px solid var(--primary); color: var(--primary);
    padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }

  .bulk-advice-list { max-height: 400px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  /* --- STYLE UNTUK ITEM YANG SUDAH DIMILIKI --- */
  .bulk-item {
    padding: 12px 16px; border-radius: 14px; cursor: pointer;
    display: grid; grid-template-columns: 35px 1fr auto; align-items: center;
    border: 1px solid transparent; transition: 0.2s;
  }
  .bulk-item:hover:not(.already-owned) { background: var(--bg); }
  .bulk-item.selected { background: var(--primary-light); border-color: var(--primary); }

  .bulk-item.already-owned {
    opacity: 0.6;
    background: #f1f5f9 !important;
    cursor: not-allowed !important;
    pointer-events: none; /* MATIKAN INTERAKSI */
    border-left: 4px solid #94a3b8;
  }
  .bulk-item.already-owned .bulk-pn { color: #64748b; text-decoration: line-through; }

  .bulk-pn { font-weight: 800; color: var(--primary); font-size: 14px; }
  .bulk-desc { font-size: 12px; color: var(--text-main); font-weight: 600; }
  .bulk-meta { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
  
  .already-badge {
    background: #94a3b8; color: white; padding: 2px 6px; border-radius: 4px;
    font-size: 9px; font-weight: 800; margin-left: 5px;
  }

  .bulk-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
</style>

<div id="bulkAddModalOverlay" class="modal-overlay" style="display:none; z-index: 17000; justify-content: center; align-items: center;">
  <div class="bulk-add-card">
    <div class="bulk-search-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
         <label style="font-size:12px; font-weight:800; color:var(--primary); text-transform:uppercase;">Bulk Add Authorized Parts</label>
         <button onclick="closeBulkAddModal()" style="border:none; background:none; cursor:pointer; font-size:24px;">&times;</button>
      </div>
      <input type="text" id="bulkSearchInput" placeholder="Search Part Number atau Description..." oninput="updateBulkAdvice(this.value)">
    </div>

    <div id="selectionBasket" class="selection-basket" style="display:none;"></div>
    
    <div id="bulkAdviceContainer" class="bulk-advice-list"></div>

    <div class="bulk-footer">
      <button class="btn" onclick="closeBulkAddModal()">Cancel</button>
      <button id="btnSaveBulk" class="btn btn-primary" onclick="saveBulkAuthorized()" disabled>Save Selection (0)</button>
    </div>
  </div>
</div>

<script>
  let selectedItems = new Map(); 
  let employeeOwnedSet = new Set(); // Key: "AUTHORITY|PNCLEAN"

  /**
   * 1. SYNC DATA: Ambil apa yang sudah dimiliki employee
   */
  window.startBulkAddProcess = async function() {
    const overlay = document.getElementById('bulkAddModalOverlay');
    overlay.style.display = 'flex';
    document.getElementById('bulkSearchInput').value = '';
    document.getElementById('bulkAdviceContainer').innerHTML = '<p style="text-align:center; padding:20px;">Checking current authorized list...</p>';
    
    selectedItems.clear();
    employeeOwnedSet.clear();
    updateBasketUI();

    const empId = window.currentPalEmpId || document.getElementById('pal_id').textContent;
    
    try {
      const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
      const result = await res.json();
      
      if(result.success) {
        result.items.forEach(item => {
          const auth = item.auth.toUpperCase().trim();
          // Pecah P/N karena di sheet Authorized kolom Part Number isinya bisa rombongan (;)
          const pns = String(item.pn).split(/[;,\n\r]+/);
          pns.forEach(p => {
            const cleanP = p.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            if(cleanP) employeeOwnedSet.add(`${auth}|${cleanP}`);
          });
        });
      }
      document.getElementById('bulkAdviceContainer').innerHTML = '<p style="text-align:center; color:var(--text-light); padding:20px;">Ready. Start searching...</p>';
    } catch(e) {
      console.error(e);
      document.getElementById('bulkAdviceContainer').innerHTML = '<p style="color:red; text-align:center;">Failed to sync data.</p>';
    }
  };

  /**
   * 2. LOGIKA SEARCH & FILTER: Bandingkan Database vs OwnedSet
   */
  function updateBulkAdvice(query) {
    const container = document.getElementById('bulkAdviceContainer');
    if(!query || query.length < 2) { container.innerHTML = ''; return; }

    const q = query.toLowerCase().replace(/[^a-z0-9]/g, ''); 
    
    // Filter dari Master Data 'rawData' (global variable di index.html utama)
    const matches = rawData.filter(row => {
      const pnDB = String(row[5]).toLowerCase().replace(/[^a-z0-9]/g, '');
      const nameDB = String(row[6]).toLowerCase();
      return pnDB.includes(q) || nameDB.includes(q);
    }).slice(0, 30);

    if(matches.length === 0) {
      container.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-light);">No items found in database.</p>';
      return;
    }

    container.innerHTML = matches.map(row => {
      const authDB = String(row[1]).trim().toUpperCase();
      const pnFullDB = String(row[5]);
      
      // LOGIKA VALIDASI: Pecah P/N di Database baris ini (siapa tau dia juga rombongan)
      const pnsInRow = pnFullDB.split(/[;,\n\r]+/);
      let isOwned = false;

      for (let p of pnsInRow) {
        const cleanP = p.replace(/[^A-Z0-9]/gi, '').toUpperCase();
        if (employeeOwnedSet.has(`${authDB}|${cleanP}`)) {
          isOwned = true;
          break; // Jika salah satu saja P/N di baris ini sudah dimiliki, tandai baris ini Owned
        }
      }

      // ID Unik untuk Basket (P/N pertama + Auth)
      const firstPnClean = pnsInRow[0].replace(/[^A-Z0-9]/gi, '').toUpperCase();
      const itemKey = `${authDB}|${firstPnClean}`;
      const isSelected = selectedItems.has(itemKey);

      return `
        <div class="bulk-item ${isOwned ? 'already-owned' : (isSelected ? 'selected' : '')}" 
             ${isOwned ? '' : `onclick="toggleBulkItem('${authDB}', '${pnFullDB.replace(/'/g, "\\'")}', '${String(row[6]).replace(/'/g, "\\'")}', '${row[3]}')"`}>
          
          <div style="display:flex; align-items:center; justify-content:center;">
             ${isOwned ? 
               `<svg width="20" height="20" viewBox="0 0 24 24" fill="#94a3b8"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : 
               `<input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">`
             }
          </div>

          <div class="bulk-info">
            <span class="bulk-pn">${pnFullDB}</span>
            <span class="bulk-desc">${row[6]}</span>
            <span class="bulk-meta">${authDB} • ATA ${row[3]} ${isOwned ? '<span class="already-badge">AUTHORIZED</span>' : ''}</span>
          </div>

          <div style="text-align:right;">
             ${typeof formatLogoValue === 'function' ? formatLogoValue(authDB) : authDB}
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleBulkItem(auth, pn, desc, ata) {
    const firstPnClean = pn.split(/[;,\n\r]+/)[0].replace(/[^A-Z0-9]/gi, '').toUpperCase();
    const itemKey = `${auth.toUpperCase()}|${firstPnClean}`; 
    
    if(selectedItems.has(itemKey)) { 
      selectedItems.delete(itemKey); 
    } else { 
      selectedItems.set(itemKey, { authority: auth, pn: pn, desc: desc, ata: ata }); 
    }
    updateBasketUI();
    updateBulkAdvice(document.getElementById('bulkSearchInput').value);
  }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    if(selectedItems.size === 0) { basket.style.display = 'none'; saveBtn.disabled = true; saveBtn.textContent = "Save Selection (0)"; return; }

    basket.style.display = 'flex'; saveBtn.disabled = false; saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    basket.innerHTML = Array.from(selectedItems.values()).map(item => `
      <div class="basket-tag">
        <small>${item.authority}</small> ${item.pn.substring(0,10)}... 
        <span style="cursor:pointer; color:#ef4444; font-weight:bold;" onclick="toggleBulkItem('${item.authority}','${item.pn.replace(/'/g, "\\'")}','','')">&times;</span>
      </div>`).join('');
  }

  async function saveBulkAuthorized() {
    const empId = window.currentPalEmpId || document.getElementById('pal_id').textContent;
    const itemsArray = Array.from(selectedItems.values());
    
    Swal.fire({ title: 'Saving...', text: `Adding ${itemsArray.length} items to Staff ID ${empId}`, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    try {
      const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify({ action: "bulkAddAuthorized", empId: empId, items: itemsArray }) });
      const result = await res.json();
      if(result.success) {
        Swal.fire({ icon: 'success', title: 'Success', timer: 1500, showConfirmButton: false });
        closeBulkAddModal();
        if (typeof openPALDocument === 'function') openPALDocument(empId, document.getElementById('pal_name').textContent, document.getElementById('pal_title').textContent);
      } else { throw new Error(result.error); }
    } catch(e) { Swal.fire('Error', e.message, 'error'); }
  }

  function closeBulkAddModal() { document.getElementById('bulkAddModalOverlay').style.display = 'none'; }
</script>
