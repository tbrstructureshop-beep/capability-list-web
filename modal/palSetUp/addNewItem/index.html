<style>
  /* --- STYLING MODAL BULK ADD (ALIGNED WITH ROOT) --- */
  .bulk-add-card {
    background: var(--card-bg);
    width: 95%;
    max-width: 550px;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: bulkSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes bulkSlideIn { 
    from { opacity: 0; transform: translateY(20px) scale(0.98); } 
    to { opacity: 1; transform: translateY(0) scale(1); } 
  }

  .bulk-search-box {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    background: #f9fafb;
  }

  .bulk-search-box input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
    transition: all 0.2s;
    background: var(--card-bg);
    color: var(--text-main);
  }

  .bulk-search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(60, 146, 166, 0.1);
  }

  .selection-basket {
    padding: 12px 20px;
    background: var(--primary-light);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap; gap: 8px;
    max-height: 120px; overflow-y: auto;
  }

  .basket-tag {
    background: var(--card-bg);
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-sm);
  }

  .basket-tag span { cursor: pointer; color: #ef4444; font-size: 16px; font-weight: bold; line-height: 1; }

  .bulk-advice-list {
    max-height: 400px;
    overflow-y: auto;
    padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
    background: var(--card-bg);
  }

  .bulk-item {
    padding: 12px 16px;
    border-radius: 14px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 30px 1fr auto;
    align-items: center;
    border: 1px solid transparent;
    transition: 0.2s;
  }

  .bulk-item:hover:not(.already-owned) { background: var(--bg); transform: translateX(4px); }
  .bulk-item.selected { background: var(--primary-light); border-color: var(--primary); }

  /* --- LOGIKA FREEZE / ALREADY OWNED (MIMIC PDF GRAYSCALE) --- */
  .bulk-item.already-owned {
    opacity: 0.5 !important;
    cursor: not-allowed !important;
    background: #f1f5f9 !important;
    filter: grayscale(100%) brightness(0.9) !important; 
    border-left: 4px solid var(--text-light) !important;
    pointer-events: none;
  }

  .bulk-item.already-owned .bulk-pn { color: var(--text-muted) !important; }

  .bulk-info { display: flex; flex-direction: column; padding-left: 12px; overflow: hidden; }
  .bulk-pn { font-weight: 800; color: var(--primary); font-size: 14px; }
  .bulk-desc { font-size: 12px; color: var(--text-main); font-weight: 600; line-height: 1.3; margin: 2px 0; }
  .bulk-meta { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }

  .bulk-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 12px;
    background: var(--bg);
  }

  .already-badge {
    font-size: 8px; background: #64748b; color: white;
    padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: 800;
  }

  .bulk-item input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--primary);
  }
</style>

<script>
  let selectedItems = new Map(); 
  let alreadyOwnedItems = new Set(); // Menyimpan database "Auth|PN" per individu

  /**
   * 1. TRIGGER: Ambil data existing dulu sebelum buka modal
   */
  window.startBulkAddProcess = async function() {
    const overlay = document.getElementById('bulkAddModalOverlay');
    if (!overlay) return;

    overlay.style.display = 'flex';
    document.getElementById('bulkSearchInput').value = '';
    document.getElementById('bulkSearchInput').focus();
    document.getElementById('bulkAdviceContainer').innerHTML = '<div class="bulk-loading-state"><p>Syncing user records...</p></div>';
    
    selectedItems.clear();
    alreadyOwnedItems.clear();
    updateBasketUI();

    const empId = window.currentPalEmpId || document.getElementById('pal_id').textContent;
    try {
      const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
      const result = await res.json();
      if(result.success) {
        result.items.forEach(item => {
          const auth = String(item.auth).trim().toUpperCase();
          // PENTING: Pecah PN dari database (FAA case) agar tiap PN masuk kamus
          const pns = String(item.pn).split(/[;,\n\t]+/);
          pns.forEach(p => {
            const cleanP = p.trim().replace(/\s+/g, '').toUpperCase();
            if(cleanP) alreadyOwnedItems.add(`${auth}|${cleanP}`);
          });
        });
      }
      document.getElementById('bulkAdviceContainer').innerHTML = '<div class="bulk-loading-state"><p>Search items to add.</p></div>';
    } catch(e) { console.error("Sync Error", e); }
  };

  /**
   * 2. SEARCH: Cek tiap PN di dalam cell hasil cari
   */
  function updateBulkAdvice(query) {
    const container = document.getElementById('bulkAdviceContainer');
    if(!query || query.length < 2) return;

    const q = query.toLowerCase().replace(/\s+/g, ''); 
    const matches = rawData.filter(row => 
      String(row[5]).toLowerCase().replace(/\s+/g, '').includes(q) || 
      String(row[6]).toLowerCase().includes(q) || 
      String(row[3]).toLowerCase().includes(q)
    ).slice(0, 30);

    if(matches.length === 0) {
      container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted);">No items found.</div>';
      return;
    }

    container.innerHTML = matches.map(row => {
      const auth = String(row[1]).trim().toUpperCase();
      const pnRaw = String(row[5]);
      
      // LOGIKA FREEZE: Pecah isi cell PN hasil cari, cek apakah ada yang sudah dimiliki?
      const pnsInRow = pnRaw.split(/[;,\n\t]+/);
      let isOwned = false;
      for(let p of pnsInRow) {
        const cleanP = p.trim().replace(/\s+/g, '').toUpperCase();
        if(cleanP && alreadyOwnedItems.has(`${auth}|${cleanP}`)) {
          isOwned = true;
          break;
        }
      }

      const itemKey = `${auth}|${pnRaw.replace(/\s+/g, '').toUpperCase()}`;
      const isSelected = selectedItems.has(itemKey);
      
      const safeDesc = row[6].replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');
      const safePnForClick = pnRaw.replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');

      // Hilangkan checkbox kalau Owned, ganti dengan div kosong agar grid tetap lurus
      const sideActionHtml = isOwned ? '<div></div>' : `<input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">`;
      const clickAction = isOwned ? "" : `onclick="toggleBulkItem('${auth}', '${safePnForClick}', '${safeDesc}', '${row[3]}')"`;

      return `
        <div class="bulk-item ${isOwned ? 'already-owned' : (isSelected ? 'selected' : '')}" ${clickAction}>
          ${sideActionHtml}
          <div class="bulk-info">
            <span class="bulk-pn">${pnRaw}</span>
            <span class="bulk-desc">${row[6]}</span>
            <span class="bulk-meta">${auth} • ATA ${row[3]} ${isOwned ? '<span class="already-badge">ALREADY OWNED</span>' : ''}</span>
          </div>
          <div style="text-align:right;">${typeof formatLogoValue === 'function' ? formatLogoValue(auth) : auth}</div>
        </div>
      `;
    }).join('');
  }

  function toggleBulkItem(auth, pn, desc, ata) {
    const cleanPn = pn.replace(/\s+/g, '').toUpperCase();
    const itemKey = `${auth.toUpperCase()}|${cleanPn}`; 
    if (alreadyOwnedItems.has(itemKey)) return;

    if(selectedItems.has(itemKey)) {
      selectedItems.delete(itemKey);
    } else {
      selectedItems.set(itemKey, { authority: auth, pn: pn, desc: desc, ata: ata });
    }
    updateBasketUI();
    updateBulkAdvice(document.getElementById('bulkSearchInput').value);
  }

  // Sisa fungsi (updateBasketUI & saveBulkAuthorized) tetap sama dengan penanganan SweetAlert target.
  function closeBulkAddModal() { document.getElementById('bulkAddModalOverlay').style.display = 'none'; }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    if(selectedItems.size === 0) { basket.style.display = 'none'; saveBtn.disabled = true; saveBtn.textContent = "Save Selection (0)"; return; }
    basket.style.display = 'flex'; saveBtn.disabled = false; saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    basket.innerHTML = Array.from(selectedItems.values()).map(item => `<div class="basket-tag"><small style="font-size:8px; opacity:0.7;">${item.authority}</small> ${item.pn.substring(0,10)}... <span onclick="toggleBulkItem('${item.authority}','${item.pn.replace(/'/g, "\\'")}','','')">&times;</span></div>`).join('');
  }

  async function saveBulkAuthorized() {
    const empId = window.currentPalEmpId || document.getElementById('pal_id').textContent;
    const itemsArray = Array.from(selectedItems.values());
    const swalConfig = { target: document.getElementById('bulkAddModalOverlay'), allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } };
    Swal.fire({ ...swalConfig, title: 'Updating Ability List', html: `Recording records to ${empId}...` });
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify({ action: "bulkAddAuthorized", empId: empId, items: itemsArray }) });
      const result = await res.json();
      if(result.success) {
        await Swal.fire({ ...swalConfig, icon: 'success', title: 'Items Saved!', timer: 2000, showConfirmButton: false });
        closeBulkAddModal();
        if (typeof openPALDocument === 'function') { openPALDocument(empId, document.getElementById('pal_name').textContent, document.getElementById('pal_title').textContent); }
      } else { throw new Error(result.error); }
    } catch(e) { Swal.fire({ ...swalConfig, icon: 'error', title: 'Save Failed', text: e.message }); }
  }
</script>
