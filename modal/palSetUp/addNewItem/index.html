<style>
  .bulk-add-card {
    background: #fff; 
    width: 90%;
    max-width: 550px; 
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    display: flex; 
    flex-direction: column; 
    overflow: hidden;
    animation: bulkSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @keyframes bulkSlideIn { 
    from { opacity: 0; transform: translateY(20px) scale(0.95); } 
    to { opacity: 1; transform: translateY(0) scale(1); } 
  }
  
  .bulk-search-box { 
    padding: 20px; 
    border-bottom: 1px solid var(--border); 
    background: #f9fafb; 
  }

  .bulk-search-box input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
    transition: 0.2s;
  }
  
  .bulk-search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(60, 146, 166, 0.1);
  }
  
  /* Selection Basket */
  .selection-basket {
    padding: 12px 20px; 
    background: var(--primary-light);
    border-bottom: 1px solid var(--border);
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    max-height: 120px; 
    overflow-y: auto;
  }
  
  .basket-tag {
    background: white; 
    border: 1px solid var(--primary); 
    color: var(--primary);
    padding: 4px 12px; 
    border-radius: 20px; 
    font-size: 11px; 
    font-weight: 700;
    display: flex; 
    align-items: center; 
    gap: 8px;
    box-shadow: var(--shadow-sm);
  }
  
  .basket-tag span { 
    cursor: pointer; 
    color: #ef4444; 
    font-size: 14px;
    line-height: 1;
  }

  .bulk-advice-list { 
    max-height: 350px; 
    overflow-y: auto; 
    padding: 10px; 
    display: flex; 
    flex-direction: column; 
    gap: 6px; 
    background: #fff;
  }
  
  .bulk-item {
    padding: 12px 16px; 
    border-radius: 12px; 
    cursor: pointer;
    display: grid; 
    grid-template-columns: 30px 1fr auto; 
    align-items: center;
    transition: 0.2s; 
    border: 1px solid transparent;
  }
  
  .bulk-item:hover { background: #f3f4f6; }
  .bulk-item.selected { 
    background: var(--primary-light); 
    border-color: var(--primary); 
  }

  .bulk-info { display: flex; flex-direction: column; padding-left: 10px; }
  .bulk-pn { font-weight: 800; color: var(--primary); font-size: 14px; }
  .bulk-desc { font-size: 12px; color: var(--text-main); font-weight: 600; line-height: 1.2; margin: 2px 0; }
  .bulk-meta { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }

  .bulk-footer { 
    padding: 16px 20px; 
    border-top: 1px solid var(--border); 
    display: flex; 
    justify-content: flex-end; 
    gap: 12px; 
    background: #fff;
  }
</style>

<div id="bulkAddModalOverlay" class="modal-overlay" style="display:none; z-index: 17000;">
  <div class="bulk-add-card">
    <div class="bulk-search-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
         <label style="font-size:12px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing: 0.05em;">Bulk Add Authorized Parts</label>
         <button onclick="closeBulkAddModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color: var(--text-light);">&times;</button>
      </div>
      <input type="text" id="bulkSearchInput" placeholder="Search by P/N, Name, or ATA..." oninput="updateBulkAdvice(this.value)">
    </div>

    <div id="selectionBasket" class="selection-basket" style="display:none;">
      <!-- Selected Items Tags go here -->
    </div>
    
    <div id="bulkAdviceContainer" class="bulk-advice-list">
       <div style="padding:60px 20px; text-align:center; color:var(--text-light); font-size: 13px;">
         <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:10px; opacity:0.5;">
           <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
         </svg>
         <p>Type at least 2 characters to search components...</p>
       </div>
    </div>

    <div class="bulk-footer">
      <button class="btn" onclick="closeBulkAddModal()">Cancel</button>
      <button id="btnSaveBulk" class="btn btn-primary" onclick="saveBulkAuthorized()" disabled>Save Selection (0)</button>
    </div>
  </div>
</div>

<script>
  /**
   * State Management
   */
  let selectedItems = new Map(); 

  /**
   * Global Entry Point (Called by index.html Bridge)
   */
  window.startBulkAddProcess = function() {
    const overlay = document.getElementById('bulkAddModalOverlay');
    if (overlay) {
      overlay.style.display = 'flex';
      document.getElementById('bulkSearchInput').value = '';
      document.getElementById('bulkSearchInput').focus();
      document.getElementById('bulkAdviceContainer').innerHTML = `<div style="padding:60px 20px; text-align:center; color:var(--text-light);">Type at least 2 characters to search...</div>`;
      selectedItems.clear();
      updateBasketUI();
    }
  };

  function closeBulkAddModal() {
    document.getElementById('bulkAddModalOverlay').style.display = 'none';
  }

  /**
   * Search Logic using Main Index rawData
   */
  function updateBulkAdvice(query) {
    const container = document.getElementById('bulkAdviceContainer');
    if(!query || query.length < 2) {
      container.innerHTML = `<div style="padding:60px 20px; text-align:center; color:var(--text-light);">Type at least 2 characters to search...</div>`;
      return;
    }

    const q = query.toLowerCase();
    // rawData mapping: 1:AUTH, 3:ATA, 5:PN, 6:NAME
    const matches = rawData.filter(row => 
      String(row[5]).toLowerCase().includes(q) || 
      String(row[6]).toLowerCase().includes(q) || 
      String(row[3]).toLowerCase().includes(q)
    ).slice(0, 30); // Show up to 30 for better performance

    if(matches.length === 0) {
      container.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted);">No matching components found.</div>`;
      return;
    }

    container.innerHTML = matches.map(row => {
      const pn = String(row[5]);
      const isSelected = selectedItems.has(pn);
      return `
        <div class="bulk-item ${isSelected ? 'selected' : ''}" onclick="toggleBulkItem('${row[1]}', '${pn}', '${row[6].replace(/'/g, "\\'")}', '${row[3]}')">
          <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleBulkItem('${row[1]}', '${pn}', '${row[6].replace(/'/g, "\\'")}', '${row[3]}')">
          <div class="bulk-info">
            <span class="bulk-pn">${pn}</span>
            <span class="bulk-desc">${row[6]}</span>
            <span class="bulk-meta">${row[1]} • ATA ${row[3]}</span>
          </div>
          <div style="opacity: 0.6;">${typeof formatLogoValue === 'function' ? formatLogoValue(row[1]) : row[1]}</div>
        </div>
      `;
    }).join('');
  }

  function toggleBulkItem(auth, pn, name, ata) {
    if(selectedItems.has(pn)) {
      selectedItems.delete(pn);
    } else {
      selectedItems.set(pn, { authority: auth, pn: pn, name: name, ata: ata });
    }
    updateBasketUI();
    updateBulkAdvice(document.getElementById('bulkSearchInput').value);
  }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    
    if(selectedItems.size === 0) {
      basket.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = "Save Selection (0)";
      return;
    }

    basket.style.display = 'flex';
    saveBtn.disabled = false;
    saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    
    basket.innerHTML = Array.from(selectedItems.values()).map(item => `
      <div class="basket-tag">
        ${item.pn} <span onclick="toggleBulkItem('','${item.pn}')">&times;</span>
      </div>
    `).join('');
  }

  /**
   * Save Process to Google Apps Script
   */
  async function saveBulkAuthorized() {
    // Check if employee ID is valid (comes from Main Index variable)
    const empId = typeof currentPalEmpId !== 'undefined' ? currentPalEmpId : document.getElementById('pal_id')?.textContent;
    
    if(!empId || empId === '-') {
      Swal.fire("Error", "Employee context not found. Please reopen PAL Document.", "error");
      return;
    }

    const itemsArray = Array.from(selectedItems.values());
    
    Swal.fire({ 
      title: 'Saving Items...', 
      text: `Adding ${itemsArray.length} items to ${empId}`,
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading() 
    });
    
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "bulkAddAuthorized",
          empId: empId,
          items: itemsArray
        })
      });
      const result = await res.json();
      
      if(result.success) {
        Swal.fire({ icon: 'success', title: 'Items Added!', text: 'Personnel Ability List has been updated.', timer: 2000, showConfirmButton: false });
        closeBulkAddModal();
        
        // Auto-refresh the underlying document if the refresh function exists
        if (typeof openPALDocument === 'function') {
           const currentName = document.getElementById('pal_name')?.textContent || '';
           const currentTitle = document.getElementById('pal_title')?.textContent || '';
           openPALDocument(empId, currentName, currentTitle);
        }
      } else {
        throw new Error(result.error || "Server rejected the request");
      }
    } catch(e) {
      console.error(e);
      Swal.fire("Error", "Failed to save: " + e.message, "error");
    }
  }
</script>
