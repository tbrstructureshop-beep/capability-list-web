<style>
  .bulk-add-card {
    background: #fff; width: 550px; border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    display: flex; flex-direction: column; overflow: hidden;
    animation: bulkSlideIn 0.3s ease-out;
  }
  @keyframes bulkSlideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  
  .bulk-search-box { padding: 20px; border-bottom: 1px solid var(--border); background: #f9fafb; }
  
  /* Selection Basket */
  .selection-basket {
    padding: 10px 20px; background: var(--primary-light);
    border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 8px; max-height: 100px; overflow-y: auto;
  }
  .basket-tag {
    background: white; border: 1px solid var(--primary); color: var(--primary);
    padding: 2px 10px; border-radius: 15px; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 5px;
  }
  .basket-tag span { cursor: pointer; color: #ef4444; }

  .bulk-advice-list { max-height: 400px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  
  .bulk-item {
    padding: 12px 16px; border-radius: 12px; cursor: pointer;
    display: grid; grid-template-columns: 40px 1fr 100px; align-items: center;
    transition: 0.2s; border: 1px solid transparent;
  }
  .bulk-item:hover { background: #f3f4f6; }
  .bulk-item.selected { background: var(--primary-light); border-color: var(--primary); }

  .bulk-info { display: flex; flex-direction: column; }
  .bulk-pn { font-weight: 800; color: var(--primary); font-size: 14px; }
  .bulk-desc { font-size: 12px; color: var(--text-main); font-weight: 600; }
  .bulk-meta { font-size: 10px; color: var(--text-light); text-transform: uppercase; }

  .bulk-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
</style>

<div id="bulkAddModalOverlay" class="modal-overlay" style="display:none; z-index: 16000;">
  <div class="bulk-add-card">
    <div class="bulk-search-box">
      <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
         <label style="font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase;">Bulk Add Authorized Parts</label>
         <button onclick="closeBulkAddModal()" style="border:none; background:none; cursor:pointer; font-size:20px;">&times;</button>
      </div>
      <input type="text" id="bulkSearchInput" class="find-input" placeholder="Search by P/N, Name, or ATA..." oninput="updateBulkAdvice(this.value)">
    </div>

    <div id="selectionBasket" class="selection-basket" style="display:none;"></div>
    
    <div id="bulkAdviceContainer" class="bulk-advice-list">
       <div style="padding:40px; text-align:center; color:var(--text-light);">Start searching for items in the Capability List...</div>
    </div>

    <div class="bulk-footer">
      <button class="btn" onclick="closeBulkAddModal()">Cancel</button>
      <button id="btnSaveBulk" class="btn btn-primary" onclick="saveBulkAuthorized()" disabled>Save Selection (0)</button>
    </div>
  </div>
</div>

<script>
  let selectedItems = new Map(); // Key: PN, Value: {auth, pn}

  function openBulkAddModal() {
    document.getElementById('bulkAddModalOverlay').style.display = 'flex';
    document.getElementById('bulkSearchInput').value = '';
    document.getElementById('bulkSearchInput').focus();
    selectedItems.clear();
    updateBasketUI();
  }

  function closeBulkAddModal() {
    document.getElementById('bulkAddModalOverlay').style.display = 'none';
  }

  function updateBulkAdvice(query) {
    const container = document.getElementById('bulkAdviceContainer');
    if(!query || query.length < 2) return;

    const q = query.toLowerCase();
    // rawData format based on Main Index: 1:AUTH, 3:ATA, 5:PN, 6:NAME
    const matches = rawData.filter(row => 
      String(row[5]).toLowerCase().includes(q) || 
      String(row[6]).toLowerCase().includes(q) || 
      String(row[3]).toLowerCase().includes(q)
    ).slice(0, 20);

    container.innerHTML = matches.map((row, idx) => {
      const isSelected = selectedItems.has(row[5]);
      return `
        <div class="bulk-item ${isSelected ? 'selected' : ''}" onclick="toggleBulkItem('${row[1]}', '${row[5]}')">
          <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">
          <div class="bulk-info">
            <span class="bulk-pn">${row[5]}</span>
            <span class="bulk-desc">${row[6]}</span>
            <span class="bulk-meta">${row[1]} • ATA ${row[3]}</span>
          </div>
          <div style="text-align:right;">${formatLogoValue(row[1])}</div>
        </div>
      `;
    }).join('');
  }

  function toggleBulkItem(auth, pn) {
    if(selectedItems.has(pn)) {
      selectedItems.delete(pn);
    } else {
      selectedItems.set(pn, { authority: auth, pn: pn });
    }
    updateBasketUI();
    // Refresh advice list to show check state
    updateBulkAdvice(document.getElementById('bulkSearchInput').value);
  }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    
    if(selectedItems.size === 0) {
      basket.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = "Save Selection (0)";
      return;
    }

    basket.style.display = 'flex';
    saveBtn.disabled = false;
    saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    
    basket.innerHTML = Array.from(selectedItems.values()).map(item => `
      <div class="basket-tag">
        ${item.pn} <span onclick="toggleBulkItem('','${item.pn}')">&times;</span>
      </div>
    `).join('');
  }

  async function saveBulkAuthorized() {
    const itemsArray = Array.from(selectedItems.values());
    
    Swal.fire({ title: 'Updating Personnel Set...', didOpen: () => Swal.showLoading() });
    
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "bulkAddAuthorized",
          empId: currentPalEmpId,
          items: itemsArray
        })
      });
      const result = await res.json();
      if(result.success) {
        Swal.fire({ icon: 'success', title: 'Saved!', text: `${itemsArray.length} items added to PAL.`, timer: 1500 });
        closeBulkAddModal();
        // Refresh the document items if the doc is open
        openPALDocument(currentPalEmpId, document.getElementById('pal_name').textContent, document.getElementById('pal_title').textContent);
      }
    } catch(e) {
      Swal.fire("Error", "Failed to save selection", "error");
    }
  }
</script>
