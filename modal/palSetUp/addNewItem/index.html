<style>
  /* --- STYLING MODAL BULK ADD --- */
  .bulk-add-card {
    background: #fff;
    width: 95%;
    max-width: 550px;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: bulkSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes bulkSlideIn { 
    from { opacity: 0; transform: translateY(20px) scale(0.98); } 
    to { opacity: 1; transform: translateY(0) scale(1); } 
  }

  .bulk-search-box {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    background: #f9fafb;
  }

  .bulk-search-box input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
    transition: all 0.2s;
  }

  .bulk-search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(60, 146, 166, 0.1);
  }

  .selection-basket {
    padding: 12px 20px;
    background: var(--primary-light);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 120px;
    overflow-y: auto;
  }

  .basket-tag {
    background: #fff;
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center; gap: 8px;
  }

  .basket-tag span {
    cursor: pointer; color: #ef4444; font-size: 16px; font-weight: bold;
  }

  .bulk-advice-list {
    max-height: 400px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bulk-item {
    padding: 12px 16px;
    border-radius: 14px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 30px 1fr auto;
    align-items: center;
    border: 1px solid transparent;
    transition: 0.2s;
  }

  .bulk-item:hover { background: var(--bg); }
  .bulk-item.selected { background: var(--primary-light); border-color: var(--primary); }

  .bulk-info { display: flex; flex-direction: column; padding-left: 12px; }
  .bulk-pn { font-weight: 800; color: var(--primary); font-size: 14px; }
  .bulk-desc { font-size: 12px; color: var(--text-main); font-weight: 600; line-height: 1.3; }
  .bulk-meta { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }

  .bulk-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  /* CSS UNTUK LOADING SPINNER DI DALAM MODAL */
  .bulk-loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 15px;
    color: var(--text-light);
  }
</style>

<div id="bulkAddModalOverlay" class="modal-overlay" style="display:none; z-index: 17000; justify-content: center; align-items: center;">
  <div class="bulk-add-card">
    <div class="bulk-search-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
         <label style="font-size:12px; font-weight:800; color:var(--primary); text-transform:uppercase;">Bulk Add Authorized Parts</label>
         <button onclick="closeBulkAddModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color:var(--text-light);">&times;</button>
      </div>
      <input type="text" id="bulkSearchInput" placeholder="Search by P/N, Name, or ATA..." oninput="updateBulkAdvice(this.value)">
    </div>

    <div id="selectionBasket" class="selection-basket" style="display:none;"></div>
    
    <div id="bulkAdviceContainer" class="bulk-advice-list">
       <div class="bulk-loading-state">
         <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5;">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
         </svg>
         <p>Type to search in Capability List...</p>
       </div>
    </div>

    <div class="bulk-footer">
      <button class="btn" onclick="closeBulkAddModal()">Cancel</button>
      <button id="btnSaveBulk" class="btn btn-primary" onclick="saveBulkAuthorized()" disabled>Save Selection (0)</button>
    </div>
  </div>
</div>

<script>
  let selectedItems = new Map(); 

  window.startBulkAddProcess = function() {
    const overlay = document.getElementById('bulkAddModalOverlay');
    if (overlay) {
      overlay.style.display = 'flex';
      document.getElementById('bulkSearchInput').value = '';
      document.getElementById('bulkSearchInput').focus();
      selectedItems.clear();
      updateBasketUI();
    }
  };

  function closeBulkAddModal() {
    document.getElementById('bulkAddModalOverlay').style.display = 'none';
  }

  function updateBulkAdvice(query) {
    const container = document.getElementById('bulkAdviceContainer');
    if(!query || query.length < 2) return;

    const q = query.toLowerCase().replace(/\s+/g, ''); 
    const matches = rawData.filter(row => 
      String(row[5]).toLowerCase().replace(/\s+/g, '').includes(q) || 
      String(row[6]).toLowerCase().includes(q) || 
      String(row[3]).toLowerCase().includes(q)
    ).slice(0, 30);

    if(matches.length === 0) {
      container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted);">No items found.</div>';
      return;
    }

    container.innerHTML = matches.map(row => {
      const auth = String(row[1]);
      const pnRaw = String(row[5]);
      const cleanPn = pnRaw.replace(/\s+/g, ''); 
      const itemKey = `${auth}|${cleanPn}`;
      const isSelected = selectedItems.has(itemKey);
      
      const safeDesc = row[6].replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');
      const safePn = pnRaw.replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');

      return `
        <div class="bulk-item ${isSelected ? 'selected' : ''}" 
             onclick="toggleBulkItem('${auth}', '${safePn}', '${safeDesc}', '${row[3]}')">
          <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">
          <div class="bulk-info">
            <span class="bulk-pn">${pnRaw}</span>
            <span class="bulk-desc">${row[6]}</span>
            <span class="bulk-meta">${auth} • ATA ${row[3]}</span>
          </div>
          <div style="opacity:0.8;">${typeof formatLogoValue === 'function' ? formatLogoValue(auth) : auth}</div>
        </div>
      `;
    }).join('');
  }

  function toggleBulkItem(auth, pn, desc, ata) {
    const cleanPn = pn.replace(/\s+/g, '');
    const itemKey = `${auth}|${cleanPn}`; 
    if(selectedItems.has(itemKey)) {
      selectedItems.delete(itemKey);
    } else {
      selectedItems.set(itemKey, { authority: auth, pn: pn, desc: desc, ata: ata });
    }
    updateBasketUI();
    updateBulkAdvice(document.getElementById('bulkSearchInput').value);
  }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    if(selectedItems.size === 0) {
      basket.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = "Save Selection (0)";
      return;
    }
    basket.style.display = 'flex';
    saveBtn.disabled = false;
    saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    basket.innerHTML = Array.from(selectedItems.values()).map(item => `
      <div class="basket-tag">
        <small style="font-size:8px; opacity:0.7;">${item.authority}</small> 
        ${item.pn.length > 15 ? item.pn.substring(0,12) + '...' : item.pn} 
        <span onclick="toggleBulkItem('${item.authority}','${item.pn.replace(/'/g, "\\'")}','','')">&times;</span>
      </div>
    `).join('');
  }

  async function saveBulkAuthorized() {
    const empId = window.currentPalEmpId || document.getElementById('pal_id').textContent;
    const itemsArray = Array.from(selectedItems.values());
    
    // FIX: Paksa SweetAlert Muncul Paling Depan
    const swalConfig = {
      target: document.getElementById('bulkAddModalOverlay'), // Muncul di dalam modal agar z-index ikut modal
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    };

    Swal.fire({
      ...swalConfig,
      title: 'Updating Ability List',
      html: `Recording <b>${itemsArray.length}</b> items to Employee <b>${empId}</b>...`
    });
    
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "bulkAddAuthorized",
          empId: empId,
          items: itemsArray
        })
      });
      const result = await res.json();
      
      if(result.success) {
        // SUCCESS NOTIF
        await Swal.fire({
          ...swalConfig,
          icon: 'success',
          title: 'Items Saved!',
          text: `Successfully added to ${empId}`,
          timer: 2000,
          showConfirmButton: false
        });

        closeBulkAddModal();
        if (typeof openPALDocument === 'function') {
           openPALDocument(empId, document.getElementById('pal_name').textContent, document.getElementById('pal_title').textContent);
        }
      } else {
        throw new Error(result.error);
      }
    } catch(e) {
      Swal.fire({ ...swalConfig, icon: 'error', title: 'Save Failed', text: e.message });
    }
  }
</script>
