<style>
  /* --- STYLING MODAL BULK ADD --- */
  :root {
    --modal-bg: rgba(17, 24, 39, 0.7);
    --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
  }

  /* Animasi Masuk */
  @keyframes bulkSlideIn { 
    from { opacity: 0; transform: translateY(20px) scale(0.98); } 
    to { opacity: 1; transform: translateY(0) scale(1); } 
  }

  .bulk-add-card {
    background: #fff;
    width: 95%;
    max-width: 550px;
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: bulkSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Header & Search */
  .bulk-search-box {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    background: #f9fafb;
  }

  .bulk-search-box input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
    transition: all 0.2s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
  }

  .bulk-search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(60, 146, 166, 0.1);
    background: #fff;
  }

  /* Keranjang Seleksi (Selection Basket) */
  .selection-basket {
    padding: 12px 20px;
    background: var(--primary-light);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 120px;
    overflow-y: auto;
  }

  .basket-tag {
    background: #fff;
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
    transition: 0.2s;
  }

  .basket-tag:hover {
    background: #fff5f5;
    border-color: #ef4444;
  }

  .basket-tag span {
    cursor: pointer;
    color: #ef4444;
    font-size: 16px;
    font-weight: bold;
    line-height: 1;
  }

  /* List Item Advice */
  .bulk-advice-list {
    max-height: 400px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #fff;
  }

  .bulk-item {
    padding: 12px 16px;
    border-radius: 14px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 30px 1fr auto;
    align-items: center;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .bulk-item:hover {
    background: var(--bg);
    transform: translateX(4px);
  }

  .bulk-item.selected {
    background: var(--primary-light);
    border-color: var(--primary);
  }

  .bulk-info {
    display: flex;
    flex-direction: column;
    padding-left: 12px;
  }

  .bulk-pn {
    font-weight: 800;
    color: var(--primary);
    font-size: 14px;
    letter-spacing: -0.01em;
  }

  .bulk-desc {
    font-size: 12px;
    color: var(--text-main);
    font-weight: 600;
    line-height: 1.3;
    margin: 2px 0;
  }

  .bulk-meta {
    font-size: 10px;
    color: var(--text-light);
    text-transform: uppercase;
    font-weight: 700;
  }

  /* Footer */
  .bulk-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    background: #f9fafb;
  }

  /* Checkbox Custom */
  .bulk-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary);
  }
</style>

<!-- KONTENER UTAMA -->
<div id="bulkAddModalOverlay" class="modal-overlay" style="display:none; z-index: 17000; justify-content: center; align-items: center;">
  <div class="bulk-add-card">
    <div class="bulk-search-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
         <label style="font-size:12px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:0.05em;">Bulk Add Authorized Parts</label>
         <button onclick="closeBulkAddModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color:var(--text-light);">&times;</button>
      </div>
      <input type="text" id="bulkSearchInput" placeholder="Search by P/N, Name, or ATA..." oninput="updateBulkAdvice(this.value)">
    </div>

    <div id="selectionBasket" class="selection-basket" style="display:none;"></div>
    
    <div id="bulkAdviceContainer" class="bulk-advice-list">
       <div style="padding:60px 20px; text-align:center; color:var(--text-light); font-size: 13px;">
         <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:10px; opacity:0.5;">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
         </svg>
         <p>Type at least 2 characters to search components...</p>
       </div>
    </div>

    <div class="bulk-footer">
      <button class="btn" onclick="closeBulkAddModal()">Cancel</button>
      <button id="btnSaveBulk" class="btn btn-primary" onclick="saveBulkAuthorized()" disabled>Save Selection (0)</button>
    </div>
  </div>
</div>

<script>
  let selectedItems = new Map(); 

  window.startBulkAddProcess = function() {
    const overlay = document.getElementById('bulkAddModalOverlay');
    if (overlay) {
      overlay.style.display = 'flex';
      document.getElementById('bulkSearchInput').value = '';
      document.getElementById('bulkSearchInput').focus();
      document.getElementById('bulkAdviceContainer').innerHTML = '<div style="padding:60px 20px; text-align:center; color:var(--text-light); font-size: 13px;">Search components...</div>';
      selectedItems.clear();
      updateBasketUI();
    }
  };

  function closeBulkAddModal() {
    document.getElementById('bulkAddModalOverlay').style.display = 'none';
  }

  function updateBulkAdvice(query) {
    const container = document.getElementById('bulkAdviceContainer');
    if(!query || query.length < 2) return;

    const q = query.toLowerCase().replace(/\s+/g, ''); 

    // rawData mapping: 1:Auth, 3:ATA, 5:PN, 6:Name
    const matches = rawData.filter(row => 
      String(row[5]).toLowerCase().replace(/\s+/g, '').includes(q) || 
      String(row[6]).toLowerCase().includes(q) || 
      String(row[3]).toLowerCase().includes(q)
    ).slice(0, 30);

    if(matches.length === 0) {
      container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted);">No items found.</div>';
      return;
    }

    container.innerHTML = matches.map(row => {
      const auth = String(row[1]);
      const pnRaw = String(row[5]);
      const ata = String(row[3]);
      const desc = String(row[6]);
      
      const cleanPn = pnRaw.replace(/\s+/g, ''); 
      const itemKey = `${auth}|${cleanPn}`;
      const isSelected = selectedItems.has(itemKey);
      
      const safeDesc = desc.replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');
      const safePn = pnRaw.replace(/'/g, "\\'").replace(/[\r\n]+/g, ' ');

      return `
        <div class="bulk-item ${isSelected ? 'selected' : ''}" 
             onclick="toggleBulkItem('${auth}', '${safePn}', '${safeDesc}', '${ata}')">
          <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">
          <div class="bulk-info">
            <span class="bulk-pn">${pnRaw}</span>
            <span class="bulk-desc">${desc}</span>
            <span class="bulk-meta">${auth} • ATA ${ata}</span>
          </div>
          <div style="opacity:0.8;">${typeof formatLogoValue === 'function' ? formatLogoValue(auth) : auth}</div>
        </div>
      `;
    }).join('');
  }

  function toggleBulkItem(auth, pn, desc, ata) {
    const cleanPn = pn.replace(/\s+/g, '');
    const itemKey = `${auth}|${cleanPn}`; 
    
    if(selectedItems.has(itemKey)) {
      selectedItems.delete(itemKey);
    } else {
      selectedItems.set(itemKey, { authority: auth, pn: pn, desc: desc, ata: ata });
    }
    
    updateBasketUI();
    updateBulkAdvice(document.getElementById('bulkSearchInput').value);
  }

  function updateBasketUI() {
    const basket = document.getElementById('selectionBasket');
    const saveBtn = document.getElementById('btnSaveBulk');
    
    if(selectedItems.size === 0) {
      basket.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = "Save Selection (0)";
      return;
    }

    basket.style.display = 'flex';
    saveBtn.disabled = false;
    saveBtn.textContent = `Save Selection (${selectedItems.size})`;
    
    basket.innerHTML = Array.from(selectedItems.values()).map(item => `
      <div class="basket-tag">
        <small style="font-size:8px; opacity:0.7;">${item.authority}</small> 
        ${item.pn.length > 15 ? item.pn.substring(0,12) + '...' : item.pn} 
        <span onclick="toggleBulkItem('${item.authority}','${item.pn.replace(/'/g, "\\'")}','','')">&times;</span>
      </div>
    `).join('');
  }

  async function saveBulkAuthorized() {
    const empId = window.currentPalEmpId || document.getElementById('pal_id').textContent;
    const itemsArray = Array.from(selectedItems.values());
    
    // 1. OPEN LOADING SPINNER (SweetAlert2)
    Swal.fire({ 
      title: 'Updating Ability List', 
      html: `Recording <b>${itemsArray.length}</b> items to Employee <b>${empId}</b>...`,
      allowOutsideClick: false,
      didOpen: () => { 
        Swal.showLoading(); 
      }
    });
    
    try {
      // 2. FETCH TO SERVER
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "bulkAddAuthorized",
          empId: empId,
          items: itemsArray
        })
      });
      const result = await res.json();
      
      if(result.success) {
        // 3. SUCCESS NOTIFICATION
        await Swal.fire({ 
          icon: 'success', 
          title: 'Items Saved!', 
          text: `Successfully added ${itemsArray.length} parts to ${empId}'s ability list.`, 
          timer: 2000, 
          showConfirmButton: false 
        });

        // 4. CLOSE MODAL AND REFRESH DOCUMENT
        closeBulkAddModal();
        if (typeof openPALDocument === 'function') {
           const name = document.getElementById('pal_name').textContent;
           const title = document.getElementById('pal_title').textContent;
           openPALDocument(empId, name, title);
        }
      } else {
        throw new Error(result.error || "Unknown server error");
      }
    } catch(e) {
      // 5. ERROR NOTIFICATION
      console.error("Save Bulk Error:", e);
      Swal.fire({
        icon: 'error',
        title: 'Saving Failed',
        text: e.message || "Could not connect to the server."
      });
    }
  }
</script>
