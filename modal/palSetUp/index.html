<style>
  /* --- PRINT SETUP A4 --- */
  @page {
    size: A4 portrait;
    margin: 5mm;
  }

  @media print {
    /* Hide everything except the print area */
    body * { visibility: hidden !important; overflow: visible !important; }
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    
    /* Reset position for printing to prevent doubling/offset */
    #palDocumentModal { 
      position: absolute !important; 
      left: 0 !important; 
      top: 0 !important; 
      width: 100% !important; 
      height: auto !important;
      background: white !important;
    }
    
    .modal-overlay { background: none !important; padding: 0 !important; display: block !important; }
    .no-print { display: none !important; }
    
    #palPrintArea { 
      margin: 0 !important; 
      padding: 0 !important; 
      width: 200mm !important; /* Fixed width to prevent overflow */
    }

    /* Fixed Footer for actual printing */
    .pal-footer-fixed {
      position: fixed;
      bottom: 5mm;
      left: 10mm;
      right: 10mm;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #000;
      border-top: 1px solid #000;
      padding-top: 4px;
      visibility: visible !important;
    }
    .page-counter:after { content: "Page " counter(page) " of " counter(pages); }
  }

  /* --- SCREEN VIEW STYLES --- */
  .pal-doc { 
    background: white; 
    width: 200mm; 
    min-height: 285mm; 
    padding: 10mm; 
    margin: 20px auto; 
    color: #000; 
    font-family: Arial, sans-serif; 
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }

  .logo-section { text-align: center; margin-bottom: 25px; }
  .logo-img { height: 48px; width: auto; }
  
  .title-section { 
    text-align: center; 
    font-weight: bold; 
    font-size: 17px; 
    text-decoration: underline; 
    margin-bottom: 25px; 
  }

  .pal-header-table { width: 100%; margin-bottom: 15px; border-collapse: collapse; font-size: 12px; }
  .pal-header-table td { padding: 4px 0; }

  .pal-main-table { width: 100%; border-collapse: collapse; border: 1.5px solid #000; table-layout: fixed; }
  .pal-main-table th { 
    border: 1px solid #000; padding: 8px 4px; background: #f2f2f2; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
  }
  .pal-main-table td { 
    border: 1px solid #000; padding: 6px; font-size: 10px; 
    vertical-align: top; word-wrap: break-word; 
  }

  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pn-item { display: flex; gap: 5px; line-height: 1.2; }

  /* Footer Table Ratio 25% | 50% | 25% */
  .pal-sig-table { 
    width: 100%; 
    margin-top: 40px; 
    border-collapse: collapse; 
    font-size: 11px; 
    table-layout: fixed;
    break-inside: avoid;
  }
  .pal-sig-table td { vertical-align: bottom; padding-bottom: 5px; }
  
  .col-date { width: 25%; text-align: left; }
  .col-mid { width: 50%; }
  .col-sig { width: 25%; text-align: center; }

  /* Hide print footer in web preview */
  .pal-footer-fixed { display: none; }
  @media print { .pal-footer-fixed { display: flex; } }

  .preview-footer {
    margin-top: auto;
    padding-top: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    border-top: 1px solid #000;
  }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500;">
  <div class="no-print" style="position: fixed; top: 0; width: 100%; background: #323639; padding: 12px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 12px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none;">Print A4 Portrait</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:#fff; color:#333; border:none;">+ Add New Item</button>
     </div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'" style="color:white; opacity:0.8; font-size: 30px; border: none; background: none; cursor: pointer;">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <div class="logo-section">
      <img src="pricing/assets/GMF_Logo.png" class="logo-img">
    </div>
    
    <div class="title-section">PERSONAL ABILITY LIST</div>

    <table class="pal-header-table">
      <tr><td width="150">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
      <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
      <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
    </table>

    <table class="pal-main-table">
      <thead>
        <tr>
          <th width="35">No.</th>
          <th width="180">DESCRIPTION</th>
          <th>PART NUMBER</th>
          <th width="85">ATA</th>
          <th width="90">RELATED AUTH</th>
        </tr>
      </thead>
      <tbody id="pal_items_body"></tbody>
    </table>
    
    <!-- Signature Table 25/50/25 -->
    <table class="pal-sig-table">
      <tr>
        <td class="col-date">
          Date : <br><br>
          <span id="pal_today_date" style="border-bottom: 1px solid #000; min-width: 120px; display: inline-block; padding-bottom: 2px;">-</span>
        </td>
        <td class="col-mid"></td>
        <td class="col-sig">
          Approved by SM Structure Workshop<br><br><br><br>
          ( <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> )<br>
          Name & Signature
        </td>
      </tr>
    </table>

    <!-- Screen Preview Footer -->
    <div class="preview-footer no-print">
      <span>Form No.: GMF/Q-364 R1</span>
      <span>Page 1</span>
    </div>

    <!-- Print Only Fixed Footer -->
    <div class="pal-footer-fixed">
      <span>Form No.: GMF/Q-364 R1</span>
      <span class="page-counter"></span>
    </div>
  </div>
</div>

<script>
async function openPALDocument(empId, name, title) {
  currentPalEmpId = empId;
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  document.getElementById('palDocumentModal').style.display = 'block';
  
  showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    Object.values(aggregated).forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td align="center">${idx + 1}</td>
        <td style="text-transform: uppercase;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td align="center"><strong>${group.ata}</strong></td>
        <td align="center" style="font-weight: bold; font-size: 9px;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });
  } catch(e) { console.error(e); }
  finally { hideLoader(); }
}
</script>
