<style>
  /* --- PRINT SETUP A4 --- */
  @page {
    size: A4 portrait;
    margin: 5mm;
  }

  @media print {
    body * { visibility: hidden; }
    #palPrintArea, #palPrintArea * { visibility: visible; }
    #palPrintArea { 
      position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; 
    }
    .no-print { display: none !important; }
    
    .pal-footer-fixed {
      position: fixed;
      bottom: 5mm;
      left: 10mm;
      right: 10mm;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #666;
    }
  }

  .pal-doc { 
    background: white; 
    width: 200mm; 
    min-height: 287mm; 
    padding: 10mm; 
    margin: 0 auto; 
    color: #000; 
    font-family: Arial, sans-serif; 
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .logo-section { text-align: center; margin-bottom: 20px; }
  .logo-img { height: 45px; width: auto; }
  
  .title-section { 
    text-align: center; 
    font-weight: bold; 
    font-size: 16px; 
    text-decoration: underline; 
    margin-bottom: 20px; 
    letter-spacing: 0.5px;
  }

  .pal-header-table { width: 100%; margin-bottom: 15px; border-collapse: collapse; font-size: 12px; }
  .pal-header-table td { padding: 3px 0; }

  .pal-main-table { width: 100%; border-collapse: collapse; border: 1px solid #000; table-layout: fixed; }
  .pal-main-table th { 
    border: 1px solid #000; padding: 8px 4px; background: #f2f2f2; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
  }
  .pal-main-table td { 
    border: 1px solid #000; padding: 6px; font-size: 10px; 
    vertical-align: top; word-wrap: break-word; 
  }

  /* Aggregated PN Grid: Two Columns */
  .pn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .pn-item {
    display: flex;
    gap: 5px;
    line-height: 1.2;
  }

  .signature-space { 
    margin-top: 40px; 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-end; 
    font-size: 11px;
  }

  .pal-footer-content {
    margin-top: auto;
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #444;
  }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500;">
  <div style="max-width: 950px; width: 95%; height: 95vh; background: #eee; overflow-y: auto; border-radius: 12px; position: relative;">
    
    <!-- Top Controls -->
    <div class="no-print" style="position: sticky; top: 0; background: #fff; padding: 15px 25px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
       <div style="display:flex; gap: 10px;">
         <button class="btn btn-primary" onclick="window.print()">Print A4 (Portrait)</button>
         <button class="btn" onclick="openBulkAddModal()">+ Add New Item</button>
       </div>
       <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'">&times;</button>
    </div>

    <!-- Page Area -->
    <div id="palPrintArea" class="pal-doc">
      
      <div class="logo-section">
        <img src="pricing/assets/GMF_Logo.png" class="logo-img">
      </div>
      
      <div class="title-section">PERSONAL ABILITY LIST</div>

      <table class="pal-header-table">
        <tr><td width="150">Name</td><td width="10">:</td><td><span id="pal_name"></span></td></tr>
        <tr><td>Personnel Number</td><td>:</td><td><span id="pal_id"></span></td></tr>
        <tr><td>Present Title</td><td>:</td><td><span id="pal_title"></span></td></tr>
      </table>

      <table class="pal-main-table">
        <thead>
          <tr>
            <th width="35">No.</th>
            <th width="180">DESCRIPTION</th>
            <th>PART NUMBER</th>
            <th width="80">ATA</th>
            <th width="90">RELATED AUTH</th>
          </tr>
        </thead>
        <tbody id="pal_items_body">
          <!-- Data Rows Injected Here -->
        </tbody>
      </table>
      
      <!-- Signature Space -->
      <div class="signature-space">
        <div>
          Date : <br><br>
          <span id="pal_today_date" style="border-bottom: 1px solid #000; padding-bottom: 2px;">-</span>
        </div>
        <div style="text-align: center;">
          Approved by SM Structure Workshop<br><br><br><br>
          ( __________________________ )
        </div>
      </div>

      <!-- Footer Info -->
      <div class="pal-footer-content">
        <span>Form No.: GMF/Q-364 R1</span>
        <span class="no-print-view">Page 1</span>
      </div>

      <!-- Page Number for Print -->
      <div class="pal-footer-fixed no-print-view">
        <span>Form No.: GMF/Q-364 R1</span>
      </div>
    </div>
  </div>
</div>

<script>
let currentPalEmpId = "";

/**
 * REBUILT: openPALDocument
 * Uses Reference instead of 2-digit ATA and aggregates PNs into 2 columns.
 */
async function openPALDocument(empId, name, title) {
  currentPalEmpId = empId;
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  // Set Today's Date
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  document.getElementById('palDocumentModal').style.display = 'flex';
  
  showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    
    if(!data.success) throw new Error(data.error);

    // --- AGGREGATION LOGIC: Group by Desc + Auth + Ref (ATA Full) ---
    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) {
        acc[key] = { 
          desc: item.desc, 
          auth: item.auth, 
          ataRef: item.ref, // Use Reference of the CMM
          pns: [item.pn] 
        };
      } else {
        if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      }
      return acc;
    }, {});

    const groupedArray = Object.values(aggregated);
    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';

    groupedArray.forEach((group, idx) => {
      // Split Part Numbers into two columns
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnGridHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnGridHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnGridHtml += `</div><div>`;
      col2.forEach(p => pnGridHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnGridHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td align="center">${idx + 1}</td>
        <td style="text-transform: uppercase;">${group.desc}</td>
        <td>${pnGridHtml}</td>
        <td align="center">${group.ataRef}</td>
        <td align="center" style="font-weight: bold; font-size: 9px;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });

  } catch(e) {
    console.error(e);
    Swal.fire("Error", "Gagal memuat data PAL", "error");
  } finally {
    hideLoader();
  }
}
</script>
