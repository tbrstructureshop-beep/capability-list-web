<style>
  /* --- 1. LEARNING FROM PLACARD: PRINT ENGINE --- */
  @media print {
    @page { 
      size: A4 portrait; 
      margin: 0; /* Let the container handle the padding for precision */
    }
    body { background: white !important; }
    
    /* Hide EVERYTHING except the modal and its content */
    body * { visibility: hidden !important; }
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    
    #palDocumentModal { 
      position: absolute !important; 
      left: 0; top: 0; 
      width: 100%; 
      background: white !important;
      display: block !important;
    }
    
    .no-print { display: none !important; }
    
    .pal-doc { 
      box-shadow: none !important; 
      margin: 0 !important; 
      padding: 15mm !important; /* Standard A4 Margin */
      width: 210mm; 
      min-height: 297mm;
      box-sizing: border-box;
    }

    /* Logic for repeating headers on every page */
    thead { display: table-header-group; }
    tfoot { display: table-footer-group; }
  }

  /* --- 2. SCREEN PREVIEW STYLES --- */
  .pal-doc { 
    background: white; 
    width: 210mm; 
    min-height: 297mm; 
    padding: 15mm; 
    margin: 30px auto; 
    color: #000; 
    font-family: Arial, sans-serif; 
    box-shadow: 0 0 30px rgba(0,0,0,0.5); 
    box-sizing: border-box;
  }

  .layout-table { width: 100%; border-collapse: collapse; }

  /* Logo & Title Header */
  .header-logo-section { text-align: center; margin-bottom: 5px; }
  .logo-img { height: 40px; width: auto; }
  .title-section { 
    text-align: center; font-weight: 800; font-size: 15px; 
    text-decoration: underline; margin-bottom: 20px; text-transform: uppercase; 
  }
  
  /* Employee Info */
  .info-table { width: 60%; border-collapse: collapse; margin-bottom: 20px; font-size: 11px; }
  .info-table td { padding: 3px 0; }

  /* Main Data Table */
  .main-table { width: 100%; border-collapse: collapse; border: 1.5px solid black; }
  .main-table th { 
    border: 1.5px solid black; padding: 8px 4px; background: #f2f2f2; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
  }
  .main-table td { 
    border: 1.5px solid black; padding: 10px 6px; font-size: 10px; 
    vertical-align: top; 
  }

  /* P/N List Handling */
  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pn-item { display: flex; gap: 5px; line-height: 1.2; white-space: nowrap; }

  /* Signature Table (Last Page Only) */
  .sig-table { 
    width: 100%; border-collapse: collapse; border: 1.5px solid black; 
    margin-top: 15px; table-layout: fixed; page-break-inside: avoid;
  }
  .sig-table td { border: 1.5px solid black; height: 95px; padding: 10px; vertical-align: top; font-size: 11px; }
  
  .form-footer-meta { 
    display: flex; justify-content: space-between; font-size: 9px; padding-top: 10px; 
  }

</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500; overflow-y: auto;">
  
  <!-- UI CONTROLS (Learning from placard) -->
  <div class="no-print" style="position: sticky; top: 0; background: #222; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 16000; border-bottom: 1px solid #444;">
     <div style="display:flex; gap: 10px;">
       <button class="btn" style="background:#3c92a6; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;" onclick="window.print()">Print A4 PDF</button>
       <button class="btn" style="background:#444; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;" onclick="openBulkAddModal()">+ Add Item</button>
     </div>
     <button onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <table class="layout-table">
      <thead>
        <tr>
          <td>
            <!-- REPEATING HEADER -->
            <div class="header-logo-section"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section">PERSONAL ABILITY LIST</div>

            <table class="info-table">
              <tr><td width="140">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
              <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
              <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
            </table>

            <!-- Repeating Th -->
            <table class="main-table" style="border-bottom: none;">
              <thead>
                <tr>
                  <th width="35">NO.</th>
                  <th width="180">DESCRIPTION</th>
                  <th>PART NUMBER</th>
                  <th width="70">ATA</th>
                  <th width="70">AUTH</th>
                </tr>
              </thead>
            </table>
          </td>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>
            <table class="main-table">
              <tbody id="pal_items_body">
                <!-- Data rows injected by JS -->
              </tbody>
            </table>

            <!-- SIGNATURE (Last page) -->
            <table class="sig-table">
              <tr>
                <td style="width: 35.59%;">
                  Date : <br><br>
                  <strong id="pal_today_date" style="font-size:14px;">-</strong>
                </td>
                <td style="width: 33.68%;"></td>
                <td style="width: 30.73%; text-align: center; display: flex; flex-direction: column; justify-content: space-between;">
                   <div>Approved by<br>SM Structure Workshop</div>
                   <div style="margin-top: auto;">
                     ( ___________________________ )<br>
                     <small>Name & Signature</small>
                   </div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td>
            <div class="form-footer-meta">
              <span>Form No: GMF/Q-364 R1</span>
              <span>Page 1 of 1</span>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
/**
 * RENDER LOGIC
 */
window.openPALDocument = async function(empId, name, title) {
  const modal = document.getElementById('palDocumentModal');
  if (!modal) return;

  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  document.getElementById('pal_today_date').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  if (typeof showLoader === 'function') showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    
    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ata.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ata, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    Object.values(aggregated).forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td width="35" style="text-align:center;">${idx + 1}</td>
        <td width="180" style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td width="70" style="text-align:center; font-weight:bold;">${group.ata}</td>
        <td width="70" style="text-align:center; font-weight:bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });
  } catch(e) { console.error(e); }
  finally { if (typeof hideLoader === 'function') hideLoader(); }
}
</script>
