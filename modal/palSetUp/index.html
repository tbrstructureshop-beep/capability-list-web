<style>
  /* --- 1. PRINT CONFIG (A4 ISOLATION) --- */
  @page { 
    size: A4 portrait; 
    margin: 0; 
  }

  @media print {
    /* Reset Global untuk Print */
    html, body {
      background: #fff !important;
      width: 210mm;
      height: 297mm;
      margin: 0 auto !important;
      padding: 0 !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Sembunyikan Dashboard Utama */
    body * { visibility: hidden !important; }
    
    /* Tampilkan hanya Modal Dokumen */
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    
    #palDocumentModal { 
      position: absolute !important; 
      left: 0 !important; 
      top: 0 !important; 
      width: 210mm !important; 
      background: white !important; 
      display: block !important; 
      overflow: visible !important;
      margin: 0 auto !important;
    }

    .no-print { display: none !important; }
    
    .pal-doc { 
      margin: 0 auto !important; 
      padding: 15mm !important; /* Margin dalam kertas A4 */
      box-shadow: none !important; 
      width: 210mm !important; 
      min-height: 0 !important; 
      display: block !important; 
    }

    /* Table Logic for Repeating Headers/Footers */
    .layout-table { 
      width: 100% !important; 
      border-collapse: collapse; 
      table-layout: fixed;
      margin: 0 auto !important;
    }
    thead { display: table-header-group; }
    tfoot { display: table-footer-group; }

    /* Page Counter */
    .page-counter {
      font-weight: normal;
    }
  }

  /* --- 2. SCREEN VIEW STYLES (PREVIEW PDF MODE) --- */
  #palDocumentModal {
    background: rgba(82, 86, 89, 1); /* Dark gray ala PDF viewer */
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: none;
    overflow-y: auto;
  }

  .pal-doc { 
    background: white; 
    width: 210mm; 
    min-height: 297mm; 
    padding: 15mm; 
    margin: 30px auto; 
    color: #000; 
    font-family: Arial, sans-serif; 
    box-shadow: 0 0 20px rgba(0,0,0,0.5); 
    box-sizing: border-box; 
    position: relative;
  }

  /* --- 3. ISI DOKUMEN (KONTEN TETAP TERJAGA) --- */
  .layout-table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  .logo-container { text-align: center; padding-bottom: 10px; }
  .logo-img { height: 48px; width: auto; display: block; margin: 0 auto; }
  
  .title-section { 
    text-align: center; 
    font-weight: bold; 
    font-size: 14px; 
    text-decoration: underline; 
    margin-bottom: 20px; 
    text-transform: uppercase; 
  }
  
  .info-table { width: 65%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; }
  .info-table td { padding: 2px 0; }

  .main-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1px solid black; 
    table-layout: fixed; 
  }
  .main-table th { 
    border: 1px solid black; padding: 8px 4px; background: #f2f2f2 !important; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
    -webkit-print-color-adjust: exact;
  }
  .main-table td { 
    border: 1px solid black; padding: 6px; font-size: 10px; 
    vertical-align: top; word-wrap: break-word; 
  }

  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pn-item { display: flex; gap: 5px; line-height: 1.2; }

  /* FOOTER SIGNATURE */
  .footer-sig-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1px solid black; 
    margin-top: 20px; 
    table-layout: fixed; 
  }
  .footer-sig-table td { 
    border: 1px solid black; 
    height: 110px; 
    vertical-align: top; 
    padding: 10px; 
    font-size: 11px; 
  }
  
  #col_1 { width: 35%; }
  #col_2 { width: 34%; }
  #col_3 { width: 31%; }

  .sig-inner-flex { 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    height: 100%; 
    text-align: center; 
  }

  .meta-footer-wrap { 
    display: flex; 
    justify-content: space-between; 
    margin-top: 2px; /* Perkecil jarak */
    font-size: 10px; 
    border-top: none; /* Hilangkan garis agar tidak double dengan border tabel */
    padding-top: 2px;
  }

  .screen-page-info { font-size: 11px; color: #ccc; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; z-index: 15500;">
  
  <!-- Control Bar (No Print) -->
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 10px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 12px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 18px; color:white; cursor:pointer; font-weight: bold; border-radius: 4px; display:flex; align-items:center; gap:8px;">
         <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
         Print to PDF
       </button>
       <button class="btn" onclick="openBulkAddModal()" style="background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.3); padding: 8px 16px; cursor:pointer; font-weight: bold; border-radius: 4px;">+ Add Items</button>
     </div>
     <div class="screen-page-info">A4 Portrait Preview | Professional Mode</div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';" style="color:white; font-size:30px; border:none; background:none; cursor:pointer;">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <table class="layout-table">
      <!-- HEADER AUTOMATIC REPEAT -->
      <thead>
        <tr>
          <td>
            <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section">PERSONAL ABILITY LIST</div>

            <table class="info-table">
              <tr><td width="130">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
              <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
              <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
            </table>
          </td>
        </tr>
      </thead>

      <!-- BODY CONTENT -->
      <tbody>
        <tr>
          <td>
            <table class="main-table">
              <thead>
                <tr>
                  <th width="35">No.</th>
                  <th width="180">DESCRIPTION</th>
                  <th>PART NUMBER</th>
                  <th width="80">ATA</th>
                  <th width="80">RELATED AUTH</th>
                </tr>
              </thead>
              <tbody id="pal_items_body"></tbody>
            </table>
          </td>
        </tr>
      </tbody>

      <!-- FOOTER AUTOMATIC REPEAT -->
      <tfoot>
        <tr>
          <td>
            <table class="footer-sig-table">
              <tr>
                <td id="col_1">
                  Date : <br><br>
                  <span id="pal_today_date" style="font-weight:bold; font-size: 12px;">-</span>
                </td>
                <td id="col_2"></td>
                <td id="col_3">
                  <div class="sig-inner-flex">
                    <div>Approved by<br>SM Structure Workshop</div>
                    <div>
                      ( _____________________ )<br>
                      <span style="font-size: 10px; margin-top: 5px; display: block;">Name & Signature</span>
                    </div>
                  </div>
                </td>
              </tr>
            </table>

            <div class="meta-footer-wrap">
              <div>Form No.: GMF/Q-364 R1</div>
              <div class="page-counter">
                Page <span class="curr-p">1</span> of <span class="total-p">1</span>
              </div>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
/**
 * Global Function for rendering the PAL Document
 * IDs preserved exactly to match your existing logic.
 */
window.openPALDocument = async function(empId, name, title) {
  const modal = document.getElementById('palDocumentModal');
  if (!modal) return;

  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  if (typeof showLoader === 'function') showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    Object.values(aggregated).forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;">${idx + 1}</td>
        <td style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td style="text-align:center;"><strong>${group.ata}</strong></td>
        <td style="text-align:center; font-size: 9px; font-weight: bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });

    // --- MANUALLY CALCULATE PAGE TOTALS ---
    setTimeout(() => {
      const printArea = document.getElementById('palPrintArea');
      if (printArea) {
        // A4 Height at 96 DPI is ~1122px
        const totalPages = Math.ceil(printArea.scrollHeight / 1120) || 1;
        const totalElements = document.querySelectorAll('.total-p');
        totalElements.forEach(el => el.textContent = totalPages);
      }
    }, 200);
    // --- END CALCULATION ---

  } catch(e) { 
    console.error(e); 
  } finally { 
    if (typeof hideLoader === 'function') hideLoader(); 
  }
}
</script>
