<style>
  /* --- PRINT ENGINE: A4 PORTRAIT --- */
  @page { 
    size: A4 portrait; 
    margin: 10mm 15mm 15mm 15mm; 
  }

  @media print {
    body * { visibility: hidden !important; }
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    #palDocumentModal { 
      position: absolute !important; 
      left: 0 !important; top: 0 !important; 
      width: 100% !important; 
      background: white !important; 
    }
    .no-print { display: none !important; }
    
    /* Ensure the white paper fills the page without cut-off */
    .pal-doc { 
      box-shadow: none !important; 
      margin: 0 !important; 
      padding: 0 !important;
      width: 100% !important;
    }

    /* Standard repeating header trick */
    thead { display: table-header-group; }
    tfoot { display: table-footer-group; }
    
    tr { break-inside: avoid; } /* Don't split rows across pages */
  }

  /* --- SCREEN PREVIEW STYLES --- */
  .pal-doc { 
    background: white; 
    width: 210mm; 
    min-height: 297mm; 
    padding: 15mm; 
    margin: 30px auto; 
    color: #000; 
    font-family: "Segoe UI", Arial, sans-serif; 
    display: block;
    box-shadow: 0 0 20px rgba(0,0,0,0.5); 
    box-sizing: border-box; 
    position: relative;
  }

  /* Table structure to handle dynamic content */
  .layout-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .logo-container { text-align: center; padding-bottom: 10px; }
  .logo-img { height: 45px; width: auto; }
  
  .title-section { 
    text-align: center; 
    font-weight: 900; 
    font-size: 16px; 
    text-decoration: underline; 
    margin-bottom: 15px; 
    text-transform: uppercase; 
  }
  
  .info-table { width: 70%; border-collapse: collapse; margin-bottom: 15px; font-size: 12px; text-align: left; }
  .info-table td { padding: 3px 0; vertical-align: top; }

  /* Data Table */
  .main-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1px solid black; 
  }
  .main-table th { 
    border: 1px solid black; padding: 10px 5px; background: #f0f0f0; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
  }
  .main-table td { 
    border: 1px solid black; padding: 8px 6px; font-size: 10px; 
    vertical-align: top; word-wrap: break-word; 
  }

  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pn-item { display: flex; gap: 4px; line-height: 1.3; }

  /* --- SIGNATURE (Last Page Only) --- */
  .footer-sig-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1px solid black; 
    margin-top: 15px; 
    table-layout: fixed; 
    page-break-inside: avoid;
  }
  .footer-sig-table td { 
    border: 1px solid black; height: 100px; 
    vertical-align: top; padding: 10px; font-size: 11px; 
  }
  #col_1 { width: 35.59%; }
  #col_2 { width: 33.68%; }
  #col_3 { width: 30.73%; }

  .sig-inner-flex { display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: center; }

  /* Static footer at the bottom of every page */
  .form-no-footer {
    font-size: 10px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    width: 100%;
  }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.9); z-index: 15500; overflow-y: auto;">
  
  <!-- Control Bar -->
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #1a1a1a; padding: 15px 30px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 15px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 10px 20px; color:white; font-weight: bold; border-radius: 6px; cursor:pointer;">Print to PDF</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:rgba(255,255,255,0.1); color:white; border:1px solid #444; padding: 10px 20px; cursor:pointer; font-weight: bold; border-radius: 6px;">+ Add Item</button>
     </div>
     <div style="color: #888; font-size: 13px; font-weight: 500;">Previewing Document: A4 Portrait</div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';" style="color:white; font-size:32px; border:none; background:none; cursor:pointer;">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <table class="layout-table">
      <thead>
        <tr>
          <td>
            <!-- REPEATING HEADER CONTENT -->
            <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section">PERSONAL ABILITY LIST</div>

            <table class="info-table">
              <tr><td width="130">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
              <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
              <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
            </table>

            <table class="main-table" style="border-bottom:none;">
              <thead>
                <tr>
                  <th width="35">No.</th>
                  <th width="180">DESCRIPTION</th>
                  <th>PART NUMBER</th>
                  <th width="80">ATA</th>
                  <th width="80">AUTH</th>
                </tr>
              </thead>
            </table>
          </td>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>
            <table class="main-table">
              <tbody id="pal_items_body">
                <!-- Rows injected here -->
              </tbody>
            </table>

            <!-- SIGNATURE SECTION (Attached to the end of the body) -->
            <table class="footer-sig-table">
              <tr>
                <td id="col_1">
                  Date : <br><br>
                  <span id="pal_today_date" style="font-weight:bold; font-size: 13px;">-</span>
                </td>
                <td id="col_2"></td>
                <td id="col_3">
                  <div class="sig-inner-flex">
                    <div>Approved by<br>SM Structure Workshop</div>
                    <div>
                      ( ___________________________ )<br>
                      <span style="font-size: 10px; margin-top: 5px; display: block;">Name & Signature</span>
                    </div>
                  </div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td>
            <div class="form-no-footer">
              <span>Form No.: GMF/Q-364 R1</span>
              <span class="no-print">Page 1 of 1</span>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
/**
 * Global Variable to store current viewing EmpID for Bulk Add logic
 */
let currentPalEmpId = null;

window.openPALDocument = async function(empId, name, title) {
  currentPalEmpId = empId;
  const modal = document.getElementById('palDocumentModal');
  if (!modal) return;

  // Set Meta Info
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  if (typeof showLoader === 'function') showLoader();
  
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    // Grouping items by Description + Authority + Reference to keep the list compact
    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) {
        acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      } else {
        if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      }
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    
    Object.values(aggregated).forEach((group, idx) => {
      // Logic for split P/N display into 2 columns
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td width="35" style="text-align:center;">${idx + 1}</td>
        <td width="180" style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td width="80" style="text-align:center;"><strong>${group.ata}</strong></td>
        <td width="80" style="text-align:center; font-size: 9px; font-weight: bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });

  } catch(e) { 
    console.error("PAL Load Error:", e);
    Swal.fire("Error", "Failed to fetch authorized items", "error");
  } finally { 
    if (typeof hideLoader === 'function') hideLoader(); 
  }
}
</script>
