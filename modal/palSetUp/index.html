<style>
  @media print {
    body * { visibility: hidden; }
    #palPrintArea, #palPrintArea * { visibility: visible; }
    #palPrintArea { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 5mm; }
    .no-print { display: none !important; }
  }
  
  .pal-doc { 
    background: white; width: 210mm; min-height: 297mm; padding: 20px; 
    margin: 0 auto; color: #000; font-family: 'Arial', sans-serif; 
  }
  .pal-header-table { width: 100%; margin-bottom: 20px; border-collapse: collapse; }
  .pal-main-table { width: 100%; border-collapse: collapse; border: 1px solid #000; }
  .pal-main-table th, .pal-main-table td { border: 1px solid #000; padding: 6px; font-size: 11px; text-align: left; }
  .pal-main-table th { background: #f0f0f0; text-transform: uppercase; }
  
  .logo-section { text-align: right; margin-bottom: 10px; }
  .title-section { text-align: center; font-weight: bold; font-size: 16px; text-decoration: underline; margin-bottom: 20px; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.8);">
  <div style="max-width: 900px; width: 95%; height: 95vh; background: #eee; overflow-y: auto; border-radius: 12px; position: relative;">
    
    <!-- Controls -->
    <div class="no-print" style="position: sticky; top: 0; background: #fff; padding: 15px 25px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; z-index: 10;">
       <div style="display:flex; gap: 10px;">
         <button class="btn btn-primary" onclick="window.print()">Print A4</button>
         <button class="btn" onclick="openBulkAddModal()">+ Add New Item</button>
       </div>
       <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'">&times;</button>
    </div>

    <!-- Printable Area -->
    <div id="palPrintArea" class="pal-doc">
      <div class="logo-section">
        <img src="../assets/logo.png" style="height: 40px;">
        <div style="font-size: 10px; font-weight: bold;">GARUDA INDONESIA GROUP</div>
      </div>
      
      <div class="title-section">PERSONAL ABILITY LIST</div>

      <table class="pal-header-table">
        <tr><td width="150">Name</td><td>: <span id="pal_name"></span></td></tr>
        <tr><td>Personnel Number</td><td>: <span id="pal_id"></span></td></tr>
        <tr><td>Present Title</td><td>: <span id="pal_title"></span></td></tr>
      </table>

      <table class="pal-main-table">
        <thead>
          <tr>
            <th width="30">No.</th>
            <th>DESCRIPTION</th>
            <th>PART NUMBER</th>
            <th width="80">ATA</th>
            <th width="120">RELATED AUTH</th>
          </tr>
        </thead>
        <tbody id="pal_items_body">
          <!-- Items injected here -->
        </tbody>
      </table>
      
      <div style="margin-top: 50px; display: flex; justify-content: space-between;">
        <div style="font-size: 12px;">Date: <br><br> ${new Date().toLocaleDateString()}</div>
        <div style="text-align: center; font-size: 12px;">
          Approved by SM Structure Workshop<br><br><br><br>
          ( __________________________ )
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentPalEmpId = "";

async function openPALDocument(empId, name, title) {
  currentPalEmpId = empId;
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  document.getElementById('palDocumentModal').style.display = 'flex';
  
  const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
  const data = await res.json();
  
  const body = document.getElementById('pal_items_body');
  body.innerHTML = data.items.map((it, idx) => `
    <tr>
      <td align="center">${idx + 1}</td>
      <td>${it.desc}</td>
      <td>${it.pn}</td>
      <td align="center">${it.ata}</td>
      <td align="center">${it.auth}</td>
    </tr>
  `).join('');
}
</script>
