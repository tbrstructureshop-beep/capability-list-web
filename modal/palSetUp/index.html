<style>
    /* --- 1. PRINT ENGINE (LOCKED 5mm) --- */
    @page { size: A4 portrait; margin: 0; }

    @media print {
        html, body { height: 297mm; overflow: hidden !important; background: #fff !important; }
        body * { visibility: hidden !important; }
        #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
        #palDocumentModal { 
            position: absolute !important; left: 0 !important; top: 0 !important; 
            width: 210mm !important; height: 297mm !important;
            background: white !important; display: block !important; overflow: visible !important;
        }
        .no-print, .designer-tools { display: none !important; }
        
        .pal-page { 
            margin: 0 !important; padding: 5mm !important; 
            width: 210mm !important; height: 297mm !important;
            page-break-after: always !important; border: none !important;
            box-sizing: border-box !important; position: relative !important;
        }
        /* Lock Footer 5mm From Bottom */
        .pal-footer {
            position: absolute !important; bottom: 5mm !important; 
            left: 5mm !important; right: 5mm !important;
            border-top: 1px solid #000; padding-top: 2px;
        }
    }

    /* --- 2. DESIGNER UI (SCREEN ONLY) --- */
    #palDocumentModal { background: #525659; }
    
    .designer-tools {
        background: #f8f9fa; border-bottom: 2px solid var(--primary);
        padding: 10px 20px; display: flex; gap: 20px; align-items: center;
        position: sticky; top: 58px; z-index: 17000; flex-wrap: wrap;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .tool-group { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; }
    .tool-group input[type="range"] { width: 80px; }

    /* Editable Styling */
    [contenteditable="true"]:hover { background: #fff9c4; outline: 1px dashed #fbc02d; cursor: text; }
    [contenteditable="true"]:focus { background: #fffde7; outline: 2px solid var(--primary); }

    /* --- 3. PAGE LAYOUT --- */
    .pal-page { 
        background: white; width: 210mm; height: 297mm;
        padding: 15mm; margin: 20px auto; color: #000; 
        font-family: Arial, sans-serif; display: flex; flex-direction: column;
        box-shadow: 0 0 15px rgba(0,0,0,0.5); position: relative; box-sizing: border-box;
    }

    .logo-container { text-align: center; margin-bottom: 8px; }
    .logo-img { height: 40px; width: auto; display: block; margin: 0 auto; }
    .title-section { text-align: center; font-weight: bold; font-size: 13px; text-decoration: underline; margin-bottom: 15px; }
    
    .info-table { width: 65%; border-collapse: collapse; margin-bottom: 10px; font-size: 10px; }
    .info-table td { padding: 1px 0; text-transform: uppercase;}

    /* Table Columns (Manageable) */
    .main-table { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; }
    .main-table th { border: 1px solid black; padding: 6px 4px; background: #f2f2f2; font-size: 9px; }
    .main-table td { border: 1px solid black; padding: 4px 6px; font-size: 9px; vertical-align: top; line-height: 1.1; }

    .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    
    /* Signature (Atomic Block) */
    .footer-sig-table { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; }
    .footer-sig-table td { border: 1px solid black; height: 90px; vertical-align: top; padding: 8px; font-size: 10px; }
    
    .pal-footer { display: flex; justify-content: space-between; font-size: 9px; margin-top: auto; padding-top: 5px; }

    .dynamic-content { flex-grow: 1; overflow: hidden; }
    #pal-ghost { position: absolute; visibility: hidden; top: -10000px; width: 200mm; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; z-index: 15500; overflow-y: auto;">
    
    <!-- MAIN TOOLBAR -->
    <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 18000;">
        <div style="display:flex; gap: 12px;">
            <button class="btn btn-primary" onclick="window.print()">Print A4 (PDF)</button>
            <button class="btn" onclick="openBulkAddModal()">+ Add Items</button>
        </div>
        <div style="color:white; font-size:12px; font-weight:bold; opacity:0.7;">PAL EDITOR MODE (MS WORD STYLE)</div>
        <button class="close-x" onclick="closePALModal()" style="color:white;">&times;</button>
    </div>

    <!-- DESIGNER TOOLS (MANAGE SIZE & POSITION) -->
    <div class="designer-tools no-print">
        <div class="tool-group">
            <label>Col Widths:</label>
            <input type="range" min="30" max="150" value="100" oninput="adjustColWidth('col-desc', this.value)"> <span style="width:25px">DESC</span>
            <input type="range" min="30" max="250" value="180" oninput="adjustColWidth('col-pn', this.value)"> <span style="width:25px">P/N</span>
        </div>
        <div class="tool-group">
            <label>Signature Top:</label>
            <input type="range" min="0" max="100" value="15" oninput="adjustSigMargin(this.value)">
        </div>
        <button class="btn" style="padding:4px 8px; font-size:10px" onclick="copyCurrentConfig()">Copy CSS Config</button>
    </div>

    <div id="pal-report-wrapper"></div>
    <div id="pal-ghost"></div>
</div>

<script>
const PALEngine = {
    maxHeight: 820,
    currentEmp: null,
    // Default Style Config (Editable)
    config: { colDesc: 180, colPn: 250, sigMargin: 15 },

    async init(empId, name, title) {
        this.currentEmp = { id: empId, name: name, title: title };
        window.currentPalEmpId = empId;
        const wrapper = document.getElementById('pal-report-wrapper');
        wrapper.innerHTML = `<div class="pal-loader-overlay" style="display:flex"><div class="spinner"></div><div style="margin-top:15px; font-weight:bold; color:#3c92a6">Loading Editor...</div></div>`;
        
        try {
            const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
            const data = await res.json();
            if(!data.success) throw new Error(data.error);

            const aggregated = data.items.reduce((acc, item) => {
                const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
                if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
                else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
                return acc;
            }, {});

            this.render(Object.values(aggregated));
        } catch(e) { wrapper.innerHTML = `<div style="color:white; text-align:center; padding:50px;">Error: ${e.message}</div>`; }
    },

    render(items) {
        const wrapper = document.getElementById('pal-report-wrapper');
        wrapper.innerHTML = '';

        let currentPage = this.createNewPage();
        let contentDiv = currentPage.querySelector('.dynamic-content');
        let currentH = 0;

        let tableHtml = `<table class="main-table">
            <thead><tr>
                <th style="width:35px">No.</th>
                <th class="col-desc" style="width:${this.config.colDesc}px">DESCRIPTION</th>
                <th class="col-pn">PART NUMBER</th>
                <th style="width:80px">ATA</th>
                <th style="width:70px">AUTH</th>
            </tr></thead><tbody>`;
        
        contentDiv.insertAdjacentHTML('beforeend', tableHtml);
        let tbody = contentDiv.querySelector('tbody');
        currentH += 45;

        items.forEach((group, idx) => {
            const row = this.createRow(group, idx + 1);
            const rowH = this.measureElement(row);

            if (currentH + rowH > this.maxHeight) {
                contentDiv.insertAdjacentHTML('beforeend', `</tbody></table>`);
                currentPage = this.createNewPage();
                contentDiv = currentPage.querySelector('.dynamic-content');
                contentDiv.insertAdjacentHTML('beforeend', tableHtml.replace('DESCRIPTION', 'DESCRIPTION (CONT.)'));
                tbody = contentDiv.querySelector('tbody');
                currentH = 50;
            }
            tbody.appendChild(row);
            currentH += rowH;
        });

        contentDiv.insertAdjacentHTML('beforeend', `</tbody></table>`);
        this.addSignature(contentDiv, currentH);

        // Final Pagination Label
        const total = wrapper.querySelectorAll('.pal-page').length;
        wrapper.querySelectorAll('.page-num-label').forEach((el, i) => { el.innerText = `Page ${i + 1} of ${total}`; });
    },

    createNewPage() {
        const p = document.createElement('div');
        p.className = 'pal-page';
        p.innerHTML = `
            <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section" contenteditable="true">PERSONAL ABILITY LIST</div>
            <table class="info-table">
                <tr><td width="150">Name</td><td width="10">:</td><td contenteditable="true"><strong>${this.currentEmp.name}</strong></td></tr>
                <tr><td>Personnel Number</td><td>:</td><td contenteditable="true"><strong>${this.currentEmp.id}</strong></td></tr>
                <tr><td>Present Title</td><td>:</td><td contenteditable="true"><span>${this.currentEmp.title}</span></td></tr>
            </table>
            <div class="dynamic-content"></div>
            <div class="pal-footer">
                <div contenteditable="true">Form No.: GMF/Q-364 R1</div>
                <div class="page-num-label"></div>
            </div>`;
        document.getElementById('pal-report-wrapper').appendChild(p);
        return p;
    },

    createRow(group, no) {
        const tr = document.createElement('tr');
        const mid = Math.ceil(group.pns.length / 2);
        let pnHtml = `<div class="pn-grid"><div>` + 
            group.pns.slice(0, mid).map(p => `<div class="pn-item"><span>-</span><span contenteditable="true">${p}</span></div>`).join('') + 
            `</div><div>` + 
            group.pns.slice(mid).map(p => `<div class="pn-item"><span>-</span><span contenteditable="true">${p}</span></div>`).join('') + 
            `</div></div>`;

        tr.innerHTML = `<td align="center">${no}</td><td contenteditable="true"><b>${group.desc.toUpperCase()}</b></td><td>${pnHtml}</td><td align="center" contenteditable="true"><b>${group.ata}</b></td><td align="center" contenteditable="true">${group.auth}</td>`;
        return tr;
    },

    addSignature(container, h) {
        const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
        const sigHtml = `
            <table class="footer-sig-table" id="sig-table" style="margin-top:${this.config.sigMargin}px">
                <tr>
                    <td id="col_1">Date : <br><br><strong contenteditable="true">${today}</strong></td>
                    <td id="col_2"></td>
                    <td id="col_3">
                        <div class="sig-inner-flex">
                            <div contenteditable="true">Approved by<br>SM Structure Workshop</div>
                            <div>( ___________________________ )<br><span style="font-size:9px">Name & Signature</span></div>
                        </div>
                    </td>
                </tr>
            </table>`;
        
        if (h + this.measureHtml(sigHtml) > this.maxHeight) {
            const p = this.createNewPage();
            p.querySelector('.dynamic-content').insertAdjacentHTML('beforeend', sigHtml);
        } else { container.insertAdjacentHTML('beforeend', sigHtml); }
    },

    measureHtml(html) { const g = document.getElementById('pal-ghost'); g.innerHTML = html; return g.offsetHeight; },
    measureElement(el) { const g = document.getElementById('pal-ghost'); g.innerHTML = `<table class="main-table">${el.outerHTML}</table>`; return g.offsetHeight; }
};

// --- DESIGNER FUNCTIONS ---
window.adjustColWidth = (cls, val) => {
    document.querySelectorAll(`.${cls}`).forEach(el => el.style.width = val + 'px');
    if(cls === 'col-desc') PALEngine.config.colDesc = val;
};

window.adjustSigMargin = (val) => {
    const sig = document.getElementById('sig-table');
    if(sig) { sig.style.marginTop = val + 'px'; PALEngine.config.sigMargin = val; }
};

window.copyCurrentConfig = () => {
    const css = `.col-desc { width: ${PALEngine.config.colDesc}px; }\n.footer-sig-table { margin-top: ${PALEngine.config.sigMargin}px; }`;
    navigator.clipboard.writeText(css);
    Swal.fire({ title: 'Config Copied!', text: 'You can paste this into your CSS file.', icon: 'success', timer: 1500 });
};

window.openPALDocument = (empId, name, title) => {
    document.getElementById('palDocumentModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
    PALEngine.init(empId, name, title);
};

window.closePALModal = () => {
    document.getElementById('palDocumentModal').style.display = 'none';
    document.body.style.overflow = 'auto';
};
</script>
