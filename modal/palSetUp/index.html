<style>
  /* --- PRINT SETUP A4 PORTRAIT --- */
  @page { 
    size: A4 portrait; 
    margin: 15mm 15mm 20mm 15mm; 
  }

  @media print {
    body * { visibility: hidden !important; background: none !important; }
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    
    #palDocumentModal { 
      position: absolute !important; left: 0 !important; top: 0 !important; 
      width: 210mm !important; background: white !important; display: block !important; 
    }
    .no-print { display: none !important; }
    
    .pal-doc-container { 
      margin: 0 !important; border: none !important; box-shadow: none !important; width: 100% !important; 
    }

    /* Force Table Header and Footer repetition */
    thead { display: table-header-group; }
    tfoot { display: table-footer-group; }
    
    .page-counter:after { content: counter(page) " of " counter(pages); }
  }

  /* --- SCREEN VIEW STYLES --- */
  .pal-doc-container { 
    background: white; width: 210mm; min-height: 297mm; padding: 15mm; 
    margin: 20px auto; color: #000; font-family: Arial, sans-serif;
    box-shadow: 0 0 15px rgba(0,0,0,0.3); box-sizing: border-box;
  }

  .logo-img { height: 45px; width: auto; display: block; margin: 0 auto 10px auto; }
  .title-section { 
    text-align: center; font-weight: bold; font-size: 14px; 
    text-decoration: underline; margin-bottom: 20px; text-transform: uppercase; 
  }
  
  .info-table { width: 65%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; text-align: left; }
  .info-table td { padding: 2px 0; }

  /* Main Data Table */
  .main-print-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .main-print-table th { 
    border: 1px solid black; padding: 8px 4px; background: #f2f2f2; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
  }
  .main-print-table td { 
    border: 1px solid black; padding: 6px; font-size: 10px; 
    vertical-align: top; word-wrap: break-word; 
  }

  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pn-item { display: flex; gap: 5px; line-height: 1.2; }

  /* Signature Block */
  .sig-row-container { padding-top: 20px; page-break-inside: avoid; }
  .footer-sig-table { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; }
  .footer-sig-table td { border: 1px solid black; height: 110px; vertical-align: top; padding: 10px; font-size: 11px; }
  
  /* Your Calibrated Widths */
  .col-sig-1 { width: 35.59%; }
  .col-sig-2 { width: 33.68%; }
  .col-sig-3 { width: 30.73%; }

  .sig-inner-flex { display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: center; }

  /* Global Page Footer */
  .meta-footer-wrap { display: flex; justify-content: space-between; font-size: 10px; padding-top: 10px; width: 100%; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500; overflow-y: auto;">
  
  <!-- Modal Actions -->
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 12px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 16px; color:white; cursor:pointer; font-weight: bold; border-radius: 4px;">Print A4 (PDF)</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:#fff; color:#333; border:none; padding: 8px 16px; cursor:pointer; font-weight: bold; border-radius: 4px;">+ Add Items</button>
     </div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';" style="color:white; font-size:30px; border:none; background:none; cursor:pointer;">&times;</button>
  </div>

  <!-- Printable Content -->
  <div class="pal-doc-container" id="palPrintArea">
    <table class="main-print-table">
      <thead>
        <!-- Logo & Title Row -->
        <tr>
          <th colspan="5" style="border:none; background:none; padding:0;">
            <img src="pricing/assets/GMF_Logo.png" class="logo-img">
            <div class="title-section">PERSONAL ABILITY LIST</div>
          </th>
        </tr>
        <!-- Personnel Info Row -->
        <tr>
          <th colspan="5" style="border:none; background:none; padding:0; padding-bottom:15px;">
            <table class="info-table">
              <tr><td width="130">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
              <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
              <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
            </table>
          </th>
        </tr>
        <!-- Actual Data Column Headers -->
        <tr>
          <th width="35">No.</th>
          <th width="180">DESCRIPTION</th>
          <th>PART NUMBER</th>
          <th width="85">ATA</th>
          <th width="90">RELATED AUTH</th>
        </tr>
      </thead>

      <tbody id="pal_items_body">
        <!-- Dynamic Data Rows injected here -->
      </tbody>

      <tfoot>
        <tr>
          <td colspan="5" style="border:none; padding:0;">
            <div class="meta-footer-wrap">
              <div>Form No.: GMF/Q-364 R1</div>
              <div>Page <span class="page-counter">1 of 1</span></div>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
window.openPALDocument = async function(empId, name, title) {
  const modal = document.getElementById('palDocumentModal');
  const body = document.getElementById('pal_items_body');
  if (!modal || !body) return;

  // Set Header Info
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  if (typeof showLoader === 'function') showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    body.innerHTML = '';
    const items = Object.values(aggregated);

    items.forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;">${idx + 1}</td>
        <td style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td style="text-align:center;"><strong>${group.ata}</strong></td>
        <td style="text-align:center; font-size: 9px; font-weight: bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });

    // APPEND SIGNATURE BLOCK (Only once at the end of tbody)
    const sigTr = document.createElement('tr');
    sigTr.innerHTML = `
      <td colspan="5" style="border:none; padding:0;">
        <div class="sig-row-container">
          <table class="footer-sig-table">
            <tr>
              <td class="col-sig-1">Date : <br><br> <span style="font-weight:bold; font-size: 12px;">${today}</span></td>
              <td class="col-sig-2"></td>
              <td class="col-sig-3">
                <div class="sig-inner-flex">
                  <div>Approved by<br>SM Structure Workshop</div>
                  <div>( ___________________________ )<br><span style="font-size: 10px; margin-top: 5px; display: block;">Name & Signature</span></div>
                </div>
              </td>
            </tr>
          </table>
        </div>
      </td>
    `;
    body.appendChild(sigTr);

  } catch(e) { console.error(e); }
  finally { if (typeof hideLoader === 'function') hideLoader(); }
}
</script>
