<style>
    /* --- PRINT SETUP A4 PORTRAIT --- */
    @page { 
        size: A4 portrait; 
        margin: 0; /* Margin 0 agar kita bisa kontrol via CSS Padding */
    }

    @media print {
        /* Kill Scrollbars and Backgrounds */
        html, body { 
            overflow: hidden !important; 
            height: 100% !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            background: #fff !important;
        }
        
        /* Hide everything else */
        body * { visibility: hidden !important; }
        #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
        
        /* Modal container cleanup */
        #palDocumentModal { 
            position: absolute !important; 
            left: 0 !important; 
            top: 0 !important; 
            width: 210mm !important; 
            height: 297mm !important;
            background: white !important; 
            display: block !important;
            overflow: hidden !important;
            box-shadow: none !important;
        }
        
        .no-print { display: none !important; }
        
        .pal-page { 
            margin: 0 !important; 
            padding: 5mm !important; /* Margin 5mm all sides */
            box-shadow: none !important; 
            page-break-after: always !important;
            border: none !important;
            width: 210mm !important;
            height: 297mm !important;
            box-sizing: border-box !important;
            background: white !important;
        }
    }

    /* --- SCREEN VIEW STYLES --- */
    #palDocumentModal {
        background: #525659; 
    }

    .pal-page { 
        background: white; 
        width: 210mm; 
        height: 297mm; 
        padding: 15mm; /* Screen view matches print better with 5-15mm */
        margin: 20px auto; 
        color: #000; 
        font-family: Arial, sans-serif; 
        display: flex; 
        flex-direction: column;
        box-shadow: 0 0 15px rgba(0,0,0,0.5); 
        box-sizing: border-box; 
        position: relative;
    }

    .pal-loader-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.8); z-index: 100;
        display: none; flex-direction: column; justify-content: center; align-items: center;
    }

    .logo-container { text-align: center; margin-bottom: 10px; }
    .logo-img { height: 45px; width: auto; display: block; margin: 0 auto; }
    .title-section { text-align: center; font-weight: bold; font-size: 14px; text-decoration: underline; margin-bottom: 20px; text-transform: uppercase; }
    
    .info-table { width: 65%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; border: none !important;}
    .info-table td { padding: 2px 0; border: none !important; text-transform: uppercase;}

    .main-table { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; }
    .main-table th { border: 1px solid black; padding: 8px 4px; background: #f2f2f2; text-transform: uppercase; font-size: 10px; font-weight: bold; }
    .main-table td { border: 1px solid black; padding: 6px; font-size: 10px; vertical-align: top; word-wrap: break-word; }

    .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .pn-item { display: flex; gap: 5px; line-height: 1.2; }

    .footer-sig-table { width: 100%; border-collapse: collapse; border: 1px solid black; margin-top: 15px; table-layout: fixed; }
    .footer-sig-table td { border: 1px solid black; height: 110px; vertical-align: top; padding: 10px; font-size: 11px; }
    #col_1 { width: 35.59%; } #col_2 { width: 33.68%; } #col_3 { width: 30.73%; }
    .sig-inner-flex { display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: center; }

    /* Footer Pagination */
    .pal-footer {
        position: absolute; 
        bottom: 2.5mm; /* Jarak 2.5mm dari paper edge */
        left: 5mm; 
        right: 5mm;
        display: flex; 
        justify-content: space-between; 
        font-size: 10px;
        border-top: 1px solid #000; 
        padding-top: 3px;
    }

    .dynamic-content { flex-grow: 1; overflow: hidden; }
    #pal-ghost { position: absolute; visibility: hidden; top: -10000px; width: 180mm; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; z-index: 15500; overflow-y: auto;">
  
    <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
        <div style="display:flex; gap: 12px;">
            <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 16px; color:white; cursor:pointer; font-weight: bold; border-radius: 4px;">Print A4 (PDF)</button>
            <button class="btn" onclick="openBulkAddModal()" style="background:#fff; color:#333; border:none; padding: 8px 16px; cursor:pointer; font-weight: bold; border-radius: 4px;">+ Add Items</button>
        </div>
        <button class="close-x" onclick="closePALModal()" style="color:white; font-size:30px; border:none; background:none; cursor:pointer;">&times;</button>
    </div>

    <div id="pal-report-wrapper"></div>
    <div id="pal-ghost"></div>
</div>

<script>
const PALEngine = {
    maxHeight: 900, // Adjusted for 5mm margins
    currentEmp: null,

    async init(empId, name, title) {
        this.currentEmp = { id: empId, name: name, title: title };
        window.currentPalEmpId = empId; 
        
        const wrapper = document.getElementById('pal-report-wrapper');
        wrapper.innerHTML = `
            <div class="pal-loader-overlay" style="display:flex">
                <div class="spinner"></div>
                <div style="margin-top:15px; font-weight:bold; color:#3c92a6">Generating Document...</div>
            </div>`;
        
        try {
            const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
            const data = await res.json();
            if(!data.success) throw new Error(data.error);

            const aggregated = data.items.reduce((acc, item) => {
                const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
                if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
                else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
                return acc;
            }, {});

            this.render(Object.values(aggregated));
        } catch(e) {
            wrapper.innerHTML = `<div style="color:white; text-align:center; padding:50px;">Error: ${e.message}</div>`;
        }
    },

    render(items) {
        const wrapper = document.getElementById('pal-report-wrapper');
        wrapper.innerHTML = '';

        let currentPage = this.createNewPage();
        let contentDiv = currentPage.querySelector('.dynamic-content');
        let currentH = 0;

        let tableHtml = `<table class="main-table"><thead><tr><th width="35">No.</th><th width="180">DESCRIPTION</th><th>PART NUMBER</th><th width="80">ATA</th><th width="80">AUTH</th></tr></thead><tbody>`;
        contentDiv.insertAdjacentHTML('beforeend', tableHtml);
        let tbody = contentDiv.querySelector('tbody');
        currentH += 40; 

        items.forEach((group, idx) => {
            const row = this.createRow(group, idx + 1);
            const rowH = this.measureElement(row);

            if (currentH + rowH > this.maxHeight) {
                contentDiv.insertAdjacentHTML('beforeend', `</tbody></table>`);
                currentPage = this.createNewPage();
                contentDiv = currentPage.querySelector('.dynamic-content');
                const contHeader = `<table class="main-table"><thead><tr><th width="35">No.</th><th width="180">DESCRIPTION (CONT.)</th><th>PART NUMBER</th><th width="80">ATA</th><th width="80">AUTH</th></tr></thead><tbody>`;
                contentDiv.insertAdjacentHTML('beforeend', contHeader);
                tbody = contentDiv.querySelector('tbody');
                currentH = 45;
            }
            tbody.appendChild(row);
            currentH += rowH;
        });

        contentDiv.insertAdjacentHTML('beforeend', `</tbody></table>`);
        this.addSignature(contentDiv, currentH);

        const totalPages = wrapper.querySelectorAll('.pal-page').length;
        wrapper.querySelectorAll('.page-num-label').forEach((el, i) => {
            el.innerText = `Page ${i + 1} of ${totalPages}`;
        });
    },

    createNewPage() {
        const p = document.createElement('div');
        p.className = 'pal-page';
        p.innerHTML = `
            <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section">PERSONAL ABILITY LIST</div>
            <table class="info-table">
                <tr><td width="150">Name</td><td width="10">:</td><td><strong>${this.currentEmp.name}</strong></td></tr>
                <tr><td>Personnel Number</td><td>:</td><td><strong>${this.currentEmp.id}</strong></td></tr>
                <tr><td>Present Title</td><td>:</td><td><span>${this.currentEmp.title}</span></td></tr>
            </table>
            <div class="dynamic-content"></div>
            <div class="pal-footer">
                <div>Form No.: GMF/Q-364 R1</div>
                <div class="page-num-label">Page 1 of 1</div>
            </div>`;
        document.getElementById('pal-report-wrapper').appendChild(p);
        return p;
    },

    createRow(group, no) {
        const tr = document.createElement('tr');
        const mid = Math.ceil(group.pns.length / 2);
        let pnHtml = `<div class="pn-grid"><div>` + 
            group.pns.slice(0, mid).map(p => `<div class="pn-item"><span>-</span><span>${p}</span></div>`).join('') + 
            `</div><div>` + 
            group.pns.slice(mid).map(p => `<div class="pn-item"><span>-</span><span>${p}</span></div>`).join('') + 
            `</div></div>`;

        tr.innerHTML = `
            <td align="center">${no}</td>
            <td style="text-transform:uppercase"><b>${group.desc}</b></td>
            <td>${pnHtml}</td>
            <td align="center"><b>${group.ata}</b></td>
            <td align="center">${group.auth}</td>`;
        return tr;
    },

    addSignature(contentDiv, h) {
        const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
        const sigHtml = `
            <table class="footer-sig-table">
                <tr>
                    <td id="col_1">Date : <br><br><strong>${today}</strong></td>
                    <td id="col_2"></td>
                    <td id="col_3">
                        <div class="sig-inner-flex">
                            <div>Approved by<br>SM Structure Workshop</div>
                            <div>( ___________________________ )<br><span style="font-size:9px">Name & Signature</span></div>
                        </div>
                    </td>
                </tr>
            </table>`;
        
        const sigH = this.measureHtml(sigHtml);
        if (h + sigH > this.maxHeight) {
            const p = this.createNewPage();
            p.querySelector('.dynamic-content').insertAdjacentHTML('beforeend', sigHtml);
        } else {
            contentDiv.insertAdjacentHTML('beforeend', sigHtml);
        }
    },

    measureHtml(html) {
        const g = document.getElementById('pal-ghost');
        g.innerHTML = html;
        return g.offsetHeight;
    },

    measureElement(el) {
        const g = document.getElementById('pal-ghost');
        g.innerHTML = `<table class="main-table">${el.outerHTML}</table>`;
        return g.offsetHeight;
    }
};

window.openPALDocument = function(empId, name, title) {
    document.getElementById('palDocumentModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
    PALEngine.init(empId, name, title);
};

window.closePALModal = function() {
    document.getElementById('palDocumentModal').style.display = 'none';
    document.body.style.overflow = 'auto';
};
</script>
