<style>
  /* --- 1. PRINT ENGINE (REPAIRED) --- */
  @media print {
    /* Hide everything by default */
    body * {
      visibility: hidden;
    }

    /* Target the modal and all its children for visibility */
    #palDocumentModal, 
    #palDocumentModal * {
      visibility: visible !important;
    }

    /* Position the modal container perfectly for the PDF engine */
    #palDocumentModal {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: block !important;
      background: white !important;
    }

    /* Hide UI controls */
    .no-print {
      display: none !important;
    }

    /* A4 Configuration */
    @page {
      size: A4 portrait;
      margin: 0; 
    }

    body {
      background: transparent;
    }

    .pal-doc {
      margin: 0 !important;
      border: none !important;
      box-shadow: none !important;
      page-break-after: always;
      overflow: hidden;
      /* Use visibility visible here specifically for the paper sheets */
      visibility: visible !important; 
    }
  }

  /* --- 2. SCREEN PREVIEW (STABLE) --- */
  #palDocumentModal {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background: rgba(0,0,0,0.85); 
    z-index: 15500; 
    overflow-y: auto;
  }

  .pal-doc {
    background: white;
    width: 210mm;
    height: 297mm; /* Standard A4 Height */
    padding: 12mm 15mm;
    margin: 20px auto;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    position: relative;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    color: #000;
    font-family: Arial, sans-serif;
  }

  /* Styling for Content Elements */
  .logo-container { text-align: center; margin-bottom: 5px; }
  .logo-img { height: 40px; }
  .title-section { text-align: center; font-weight: bold; font-size: 14px; text-decoration: underline; margin-bottom: 15px; text-transform: uppercase; }
  
  .info-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 11px; }
  .info-table td { padding: 2px 0; }
  .info-table .label { width: 130px; }
  .info-table .colon { width: 15px; }

  .main-table { width: 100%; border-collapse: collapse; border: 1.5px solid black; }
  .main-table th { border: 1px solid black; padding: 8px 4px; background: #f2f2f2; text-transform: uppercase; font-size: 10px; font-weight: bold; }
  .main-table td { border: 1px solid black; padding: 6px; font-size: 10px; vertical-align: middle; word-wrap: break-word; }

  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pn-item { display: flex; gap: 4px; }

  /* Signature Block */
  .footer-sig-table { width: 100%; border-collapse: collapse; border: 1.5px solid black; margin-top: 15px; table-layout: fixed; }
  .footer-sig-table td { border: 1px solid black; height: 90px; vertical-align: top; padding: 10px; font-size: 11px; }
  
  .col-1 { width: 35.59%; }
  .col-2 { width: 33.68%; }
  .col-3 { width: 30.73%; }

  .sig-inner { display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: center; }

  .bottom-bar { 
    position: absolute; bottom: 12mm; left: 15mm; right: 15mm;
    display: flex; justify-content: space-between; font-size: 9px;
    border-top: 0.5px solid #eee; padding-top: 5px;
  }
</style>

<div id="palDocumentModal" style="display:none;">
  <!-- UI Toolbar (no-print) -->
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 12px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 16px; color:white; font-weight: bold; border-radius: 4px; cursor:pointer;">Print to PDF</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:#fff; border:1px solid #ccc; padding: 8px 16px; font-weight: bold; border-radius: 4px; cursor:pointer;">+ Add Item</button>
     </div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';" style="color:white; font-size:30px; border:none; background:none; cursor:pointer;">&times;</button>
  </div>

  <div id="palPagesContainer"></div>
</div>

<script>
window.openPALDocument = async function(empId, name, title) {
  const container = document.getElementById('palPagesContainer');
  const modal = document.getElementById('palDocumentModal');
  container.innerHTML = ''; 
  
  // INA: Apply with No Ruin - Moving modal to body level for print safety
  document.body.appendChild(modal); 

  if (typeof showLoader === 'function') showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});
    const allRows = Object.values(aggregated);

    const rowsPerPage = 11; 
    const totalPages = Math.ceil(allRows.length / rowsPerPage) || 1;
    const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});

    for (let p = 0; p < totalPages; p++) {
      const pageNum = p + 1;
      const isLastPage = (pageNum === totalPages);
      const sliceRows = allRows.slice(p * rowsPerPage, (p + 1) * rowsPerPage);
      
      const pageDiv = document.createElement('div');
      pageDiv.className = 'pal-doc';
      
      let html = `
        <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
        <div class="title-section">PERSONAL ABILITY LIST</div>

        <table class="info-table">
          <tr><td class="label">Name</td><td class="colon">:</td><td><strong style="text-transform: uppercase;">${name}</strong></td></tr>
          <tr><td class="label">Personnel Number</td><td class="colon">:</td><td><strong>${empId}</strong></td></tr>
          <tr><td class="label">Present Title</td><td class="colon">:</td><td><span>${title || "Aircraft Structure Engineer"}</span></td></tr>
        </table>

        <table class="main-table">
          <thead>
            <tr>
              <th width="35">NO.</th>
              <th width="180">DESCRIPTION</th>
              <th>PART NUMBER</th>
              <th width="80">ATA</th>
              <th width="70">AUTH</th>
            </tr>
          </thead>
          <tbody>
      `;

      sliceRows.forEach((row, idx) => {
        const rowNum = (p * rowsPerPage) + idx + 1;
        const mid = Math.ceil(row.pns.length / 2);
        const col1 = row.pns.slice(0, mid);
        const col2 = row.pns.slice(mid);

        let pnGrid = `<div class="pn-grid"><div>`;
        col1.forEach(pn => pnGrid += `<div class="pn-item"><span>-</span><span>${pn}</span></div>`);
        pnGrid += `</div><div>`;
        col2.forEach(pn => pnGrid += `<div class="pn-item"><span>-</span><span>${pn}</span></div>`);
        pnGrid += `</div></div>`;

        html += `
          <tr>
            <td style="text-align:center;">${rowNum}</td>
            <td style="text-transform:uppercase; font-weight:bold;">${row.desc}</td>
            <td>${pnGrid}</td>
            <td style="text-align:center; font-weight:bold;">${row.ata}</td>
            <td style="text-align:center; font-weight:bold; font-size:9px;">${row.auth}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;

      if (isLastPage) {
        html += `
          <table class="footer-sig-table">
            <tr>
              <td class="col-1">Date : <br><br><strong>${today}</strong></td>
              <td class="col-2"></td>
              <td class="col-3">
                <div class="sig-inner">
                  <div>Approved by<br>SM Structure Workshop</div>
                  <div>( ___________________________ )<br>Name & Signature</div>
                </div>
              </td>
            </tr>
          </table>
        `;
      }

      html += `
        <div class="bottom-bar">
          <div>Form No.: GMF/Q-364 R1</div>
          <div>Page ${pageNum} of ${totalPages}</div>
        </div>
      `;

      pageDiv.innerHTML = html;
      container.appendChild(pageDiv);
    }

    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
    
  } catch(e) {
    console.error(e);
    Swal.fire("Error", "Could not generate document", "error");
  } finally {
    hideLoader();
  }
}
</script>
