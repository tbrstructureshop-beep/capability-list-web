<script>
/**
 * Gunakan window.functionName agar bisa diakses dari file utama
 */
window.toggleAdjustmentMode = function() {
  const table = document.getElementById('adj_footer_table');
  const box = document.getElementById('css-output-box');
  const btn = document.getElementById('toggleAdjBtn');
  
  // Deteksi status berdasarkan class
  const isCurrentlyActive = table.classList.contains('adj-mode-active');
  
  if(!isCurrentlyActive) {
    table.classList.add('adj-mode-active');
    box.style.display = 'block';
    btn.style.background = '#4caf50';
    btn.innerText = 'Save / Close Adjustment';
    initResizers();
  } else {
    table.classList.remove('adj-mode-active');
    box.style.display = 'none';
    btn.style.background = '#ff9800';
    btn.innerText = 'Toggle Adjustment Mode';
  }
}

function initResizers() {
  const table = document.getElementById('adj_footer_table');
  const cols = [
    document.getElementById('col_1'),
    document.getElementById('col_2'),
    document.getElementById('col_3')
  ];

  const updateOutput = () => {
    const totalWidth = table.offsetWidth;
    const w1 = ((cols[0].offsetWidth / totalWidth) * 100).toFixed(2);
    const w2 = ((cols[1].offsetWidth / totalWidth) * 100).toFixed(2);
    const w3 = ((cols[2].offsetWidth / totalWidth) * 100).toFixed(2);
    
    document.getElementById('css-code').innerHTML = 
      `.col-1 { width: ${w1}%; }<br>` +
      `.col-2 { width: ${w2}%; }<br>` +
      `.col-3 { width: ${w3}%; }`;
  };

  const createDrag = (resizer, targetCol, nextCol) => {
    let startX, startWidth, nextWidth;
    resizer.onmousedown = (e) => {
      startX = e.pageX;
      startWidth = targetCol.offsetWidth;
      nextWidth = nextCol.offsetWidth;
      document.onmousemove = (e) => {
        const diff = e.pageX - startX;
        const totalW = table.offsetWidth;
        let newW1 = ((startWidth + diff) / totalW) * 100;
        let newW2 = ((nextWidth - diff) / totalW) * 100;
        if (newW1 > 5 && newW2 > 5) {
          targetCol.style.width = newW1 + '%';
          nextCol.style.width = newW2 + '%';
          updateOutput();
        }
      };
      document.onmouseup = () => { document.onmousemove = null; };
    };
  };

  createDrag(document.getElementById('resizer_1'), cols[0], cols[1]);
  createDrag(document.getElementById('resizer_2'), cols[1], cols[2]);
  updateOutput();
}

window.openPALDocument = async function(empId, name, title) {
  const modal = document.getElementById('palDocumentModal');
  if (!modal) {
    console.error("Modal PAL belum ter-injeksi!");
    return;
  }
  
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  if (typeof showLoader === 'function') showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    Object.values(aggregated).forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;">${idx + 1}</td>
        <td style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td style="text-align:center;"><strong>${group.ata}</strong></td>
        <td style="text-align:center; font-size: 9px; font-weight: bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });
  } catch(e) { console.error(e); }
  finally { if (typeof hideLoader === 'function') hideLoader(); }
}
</script>
