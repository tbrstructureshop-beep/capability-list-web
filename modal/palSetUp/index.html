<style>
  /* --- PRINT SETUP --- */
  @page { size: A4 portrait; margin: 15mm; }

  @media print {
    /* Hide background and other UI */
    body, html, header, .container, .no-print, .sidebar, .modal-overlay:not(#palDocumentModal) { 
      visibility: hidden !important; 
    }
    
    #palDocumentModal { 
      visibility: visible !important; 
      position: absolute !important; 
      left: 0; top: 0; width: 100%; 
      background: white !important; 
    }

    .pal-doc { 
      box-shadow: none !important; 
      margin: 0 !important; 
      padding: 0 !important;
    }

    /* Fixed Footer for Print - repeats on every page */
    .pal-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex !important;
      justify-content: space-between;
      font-size: 10px;
      background: white;
      padding-top: 5px;
    }
    
    /* Auto-generate Page Number on Print */
    .page-number::after {
      content: "Page " counter(page);
    }
  }

  /* --- SCREEN VIEW --- */
  .pal-doc { 
    background: white; width: 210mm; min-height: 297mm; 
    padding: 15mm; margin: 20px auto; color: #000; 
    font-family: Arial, sans-serif; display: flex; flex-direction: column;
    box-shadow: 0 0 15px rgba(0,0,0,0.3); position: relative;
    box-sizing: border-box;
  }

  /* Local Loader */
  .pal-loading-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9); display: none;
    flex-direction: column; justify-content: center; align-items: center; z-index: 100;
  }

  /* Footer styling for Screen */
  .pal-footer {
    margin-top: auto; /* Pushes footer to bottom of content */
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    padding-top: 15px;
    color: #666;
  }

  /* ... (Existing Logo, Info Table, Main Table, PN Grid, Sig Table CSS remains the same) ... */
  .logo-container { text-align: center; margin-bottom: 10px; }
  .logo-img { height: 45px; }
  .title-section { text-align: center; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin-bottom: 20px; }
  .info-table { width: 65%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; }
  .main-table { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; }
  .main-table th, .main-table td { border: 1px solid black; padding: 6px; font-size: 10px; }
  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pn-item { display: flex; gap: 5px; }
  .footer-sig-table { width: 100%; border-collapse: collapse; border: 1px solid black; margin-top: 20px; }
  .footer-sig-table td { border: 1px solid black; height: 110px; vertical-align: top; padding: 10px; font-size: 11px; }
  #col_1 { width: 35.59%; } #col_2 { width: 33.68%; } #col_3 { width: 30.73%; }
  .sig-inner-flex { display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: center; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500; overflow-y: auto;">
  
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 12px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 16px; color:white; cursor:pointer; font-weight: bold; border-radius: 4px;">Print A4 (PDF)</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:#fff; color:#333; border:none; padding: 8px 16px; cursor:pointer; font-weight: bold; border-radius: 4px;">+ Add Items</button>
     </div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <div id="palLocalLoader" class="pal-loading-overlay">
      <div class="spinner"></div>
      <p style="font-weight:700; margin-top:10px;">Fetching Authorized Items...</p>
    </div>

    <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
    <div class="title-section">PERSONAL ABILITY LIST</div>

    <table class="info-table">
      <tr><td width="150">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
      <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
      <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
    </table>

    <table class="main-table">
      <thead>
        <tr>
          <th width="35">No.</th>
          <th width="180">DESCRIPTION</th>
          <th>PART NUMBER</th>
          <th width="90">ATA</th>
          <th width="90">RELATED AUTH</th>
        </tr>
      </thead>
      <tbody id="pal_items_body"></tbody>
    </table>
    
    <table class="footer-sig-table">
      <tr>
        <td id="col_1">
          Date : <br><br>
          <span id="pal_today_date" style="font-weight:bold; font-size: 12px;">-</span>
        </td>
        <td id="col_2"></td>
        <td id="col_3">
          <div class="sig-inner-flex">
            <div>Approved by<br>SM Structure Workshop</div>
            <div>
              ( ___________________________ )<br>
              <span style="font-size: 10px; margin-top: 5px; display: block;">Name & Signature</span>
            </div>
          </div>
        </td>
      </tr>
    </table>

    <!-- ONE CONSOLIDATED FOOTER -->
    <div class="pal-footer">
      <div>Form No.: GMF/Q-364 R1</div>
      <div class="page-number"></div>
    </div>
  </div>
</div>

<script>
/**
 * REPAIRED: openPALDocument with No Ruin and Loader Logic
 */
window.openPALDocument = async function(empId, name, title) {
  const modal = document.getElementById('palDocumentModal');
  const localLoader = document.getElementById('palLocalLoader');
  if (!modal) return;

  // Set Global for Add Item module
  window.currentPalEmpId = empId; 

  // Reset UI and Fill Basic Info
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  document.getElementById('pal_items_body').innerHTML = ''; 
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  modal.style.display = 'block';
  if(localLoader) localLoader.style.display = 'flex';
  document.body.style.overflow = 'hidden'; 

  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    Object.values(aggregated).forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;">${idx + 1}</td>
        <td style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td style="text-align:center;"><strong>${group.ata}</strong></td>
        <td style="text-align:center; font-size: 9px; font-weight: bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });
  } catch(e) { 
    console.error(e); 
    Swal.fire("Error", "Could not load ability items.", "error");
  } finally { 
    if(localLoader) localLoader.style.display = 'none'; 
  }
}
</script>
