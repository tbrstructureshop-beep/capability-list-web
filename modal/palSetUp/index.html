<style>
  /* --- PRINT CORE: A4 PORTRAIT --- */
  @page { 
    size: A4 portrait; 
    margin: 10mm 15mm 15mm 15mm; 
  }

  @media print {
    /* Hide everything on the website except the PAL Document */
    body * { visibility: hidden !important; background: none !important; }
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    
    #palDocumentModal { 
      position: absolute !important; 
      left: 0 !important; top: 0 !important; 
      width: 100% !important; 
      background: white !important;
      display: block !important;
    }

    .no-print { display: none !important; }

    .pal-doc { 
      box-shadow: none !important; 
      margin: 0 !important; 
      padding: 0 !important;
      width: 100% !important;
    }

    /* THE TRICK: Repeat headers and footers on every page */
    .master-layout thead { display: table-header-group; }
    .master-layout tfoot { display: table-footer-group; }
    
    /* Avoid cutting rows or signature blocks across pages */
    tr { page-break-inside: avoid; break-inside: avoid; }
    .footer-sig-table { page-break-inside: avoid; break-inside: avoid; }
  }

  /* --- SCREEN UI --- */
  .pal-doc { 
    background: white; 
    width: 210mm; 
    min-height: 297mm; 
    padding: 15mm; 
    margin: 30px auto; 
    color: #000; 
    font-family: Arial, sans-serif; 
    display: block;
    box-shadow: 0 0 30px rgba(0,0,0,0.5); 
    box-sizing: border-box; 
    position: relative;
  }

  .master-layout {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .logo-container { text-align: center; padding-bottom: 5px; }
  .logo-img { height: 48px; width: auto; }
  
  .title-section { 
    text-align: center; 
    font-weight: bold; 
    font-size: 16px; 
    text-decoration: underline; 
    margin-bottom: 20px; 
    text-transform: uppercase; 
  }
  
  .info-table { width: 75%; border-collapse: collapse; margin-bottom: 15px; font-size: 12px; }
  .info-table td { padding: 4px 0; vertical-align: top; }

  /* Data Table Styling */
  .data-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1.5px solid black; 
  }
  .data-table th { 
    border: 1px solid black; padding: 10px 5px; background: #f2f2f2; 
    text-transform: uppercase; font-size: 11px; font-weight: bold; 
    -webkit-print-color-adjust: exact;
  }
  .data-table td { 
    border: 1px solid black; padding: 6px; font-size: 11px; 
    vertical-align: top; word-wrap: break-word; 
  }

  /* P/N Grid Display (2-Column as per Image) */
  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .pn-item { display: flex; gap: 5px; line-height: 1.2; font-family: monospace; font-size: 10px; }

  /* Signature Block */
  .footer-sig-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1.5px solid black; 
    margin-top: 15px; 
    table-layout: fixed; 
  }
  .footer-sig-table td { 
    border: 1.5px solid black; height: 110px; 
    vertical-align: top; padding: 12px; font-size: 12px; 
  }
  #col_1 { width: 35.59%; }
  #col_2 { width: 33.68%; }
  #col_3 { width: 30.73%; }

  .sig-inner { display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: center; }

  .form-footer-text {
    font-size: 10px;
    padding-top: 10px;
    display: flex;
    justify-content: space-between;
  }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500; overflow-y: auto;">
  
  <!-- Toolbar -->
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #2c3e50; padding: 15px 30px; border-bottom: 2px solid #34495e; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 15px;">
       <button class="btn btn-primary" onclick="triggerSmartPrint()" style="background:#27ae60; border:none; padding: 10px 25px; color:white; font-weight: 800; border-radius: 6px; cursor:pointer; box-shadow: 0 4px 0 #1e8449;">PRINT DOCUMENT</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:white; color:#2c3e50; border:none; padding: 10px 20px; cursor:pointer; font-weight: 700; border-radius: 6px;">+ ADD ITEMS</button>
     </div>
     <span style="color:white; font-weight: 600;">PREVIEW MODE (A4 PORTRAIT)</span>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'; document.body.style.overflow='auto';" style="color:white; font-size:35px; border:none; background:none; cursor:pointer;">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <table class="master-layout">
      <!-- THIS REPEATS ON EVERY PAGE -->
      <thead>
        <tr>
          <td>
            <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section">PERSONAL ABILITY LIST</div>

            <table class="info-table">
              <tr><td width="140">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
              <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
              <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
            </table>

            <table class="data-table" style="border-bottom:none;">
              <thead>
                <tr>
                  <th width="40">NO.</th>
                  <th width="200">DESCRIPTION</th>
                  <th>PART NUMBER</th>
                  <th width="85">ATA</th>
                  <th width="85">AUTH</th>
                </tr>
              </thead>
            </table>
          </td>
        </tr>
      </thead>

      <!-- DYNAMIC CONTENT -->
      <tbody>
        <tr>
          <td>
            <table class="data-table">
              <tbody id="pal_items_body"></tbody>
            </table>

            <!-- SIGNATURE (Only at the very end) -->
            <table class="footer-sig-table">
              <tr>
                <td id="col_1">
                  Date : <br><br>
                  <span id="pal_today_date" style="font-weight:bold; font-size: 14px;">-</span>
                </td>
                <td id="col_2"></td>
                <td id="col_3">
                  <div class="sig-inner">
                    <div>Approved by<br>SM Structure Workshop</div>
                    <div>
                      ( ___________________________ )<br>
                      <span style="font-size: 10px; margin-top: 5px; display: block;">Name & Signature</span>
                    </div>
                  </div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </tbody>

      <!-- FORM NO (Bottom of Every Page) -->
      <tfoot>
        <tr>
          <td>
            <div class="form-footer-text">
              <span>Form No.: GMF/Q-364 R1</span>
              <span class="no-print">Page Page X of Y</span>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
/**
 * REPAIRED: triggerSmartPrint
 * Ensures the document is prepared for high-quality printing
 */
function triggerSmartPrint() {
  // Briefly add a print-active class if needed for transitions
  window.print();
}

/**
 * REPAIRED: openPALDocument
 * Standardizes grouping and injected content
 */
window.openPALDocument = async function(empId, name, title) {
  const modal = document.getElementById('palDocumentModal');
  if (!modal) return;

  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  if (typeof showLoader === 'function') showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    // Grouping by Description + Auth + ATA Reference
    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    
    Object.values(aggregated).forEach((group, idx) => {
      // 2-Column Logic for P/N
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td width="40" style="text-align:center; font-weight:bold;">${idx + 1}</td>
        <td width="200" style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td width="85" style="text-align:center;"><strong>${group.ata}</strong></td>
        <td width="85" style="text-align:center; font-weight: bold; color: #333;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });
  } catch(e) { 
    console.error(e); 
    Swal.fire("Data Error", "Unable to load authorized items list.", "error");
  } finally { 
    if (typeof hideLoader === 'function') hideLoader(); 
  }
}
</script>
