<style>
    /* --- 1. PRINT PRECISION (TETAP SAMA) --- */
    @page { size: A4 portrait; margin: 0; }
    @media print {
        html, body { height: 297mm; overflow: hidden !important; background: #fff !important; }
        body * { visibility: hidden !important; }
        #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
        #palDocumentModal { position: absolute !important; left: 0 !important; top: 0 !important; width: 210mm !important; background: white !important; display: block !important; }
        .no-print, .resizer { display: none !important; }
        .pal-page { margin: 0 !important; padding: 5mm !important; width: 210mm !important; height: 297mm !important; box-shadow: none !important; page-break-after: always !important; border: none !important; box-sizing: border-box !important; position: relative !important; }
        .pal-footer { position: absolute !important; bottom: 5mm !important; left: 5mm !important; right: 5mm !important; border-top: 1px solid #000; padding-top: 2px; }
        [contenteditable]:focus { outline: none; }
    }

    /* --- 2. SCREEN VIEW & EDITOR STYLES --- */
    #palDocumentModal { background: #525659; }
    .pal-page { 
        background: white; width: 210mm; height: 297mm; padding: 15mm; margin: 20px auto; 
        color: #000; font-family: Arial, sans-serif; display: flex; flex-direction: column;
        box-shadow: 0 0 15px rgba(0,0,0,0.5); box-sizing: border-box; position: relative;
    }

    /* Indikator Area Bisa Diedit */
    [contenteditable="true"]:hover { background: rgba(60, 146, 166, 0.05); outline: 1px dashed #3c92a6; }
    [contenteditable="true"]:focus { outline: 2px solid #3c92a6; background: #fff; }

    /* Table Styles */
    .main-table { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; position: relative; }
    .main-table th, .main-table td { border: 1px solid black; position: relative; }
    .main-table th { padding: 8px 4px; background: #f2f2f2; font-size: 10px; font-weight: bold; }
    .main-table td { padding: 4px 6px; font-size: 10px; vertical-align: top; word-wrap: break-word; line-height: 1.1; }

    /* Column Resizer Handle */
    .resizer {
        position: absolute; top: 0; right: 0; width: 5px; cursor: col-resize;
        user-select: none; height: 100%; z-index: 10;
    }
    .resizer:hover, .resizing { border-right: 3px solid #3c92a6; }

    .logo-container { text-align: center; margin-bottom: 10px; }
    .logo-img { height: 45px; width: auto; display: block; margin: 0 auto; }
    .title-section { text-align: center; font-weight: bold; font-size: 14px; text-decoration: underline; margin-bottom: 20px; text-transform: uppercase; }
    
    .info-table { width: 65%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; }
    .footer-sig-table { width: 100%; border-collapse: collapse; border: 1px solid black; margin-top: 15px; }
    .footer-sig-table td { border: 1px solid black; height: 100px; vertical-align: top; padding: 10px; font-size: 11px; }

    .pal-footer { display: flex; justify-content: space-between; font-size: 9px; margin-top: auto; padding-top: 5px; }
    .dynamic-content { flex-grow: 1; }
    #pal-ghost { position: absolute; visibility: hidden; top: -10000px; width: 200mm; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; z-index: 15500; overflow-y: auto;">
    <!-- TOOLBAR EDITOR -->
    <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
        <div style="display:flex; gap: 12px; align-items: center;">
            <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 16px; color:white; font-weight: bold; border-radius: 4px;">Print A4 (Focus Area)</button>
            <button class="btn" onclick="toggleEditGuidelines()" style="background:#555; color:white; border:none; padding: 8px 16px; border-radius: 4px;">Toggle Resize Lines</button>
            <span style="color: #ccc; font-size: 11px;">*Drag table headers to resize. Click text to edit.</span>
        </div>
        <button class="close-x" onclick="closePALModal()" style="color:white; font-size:30px; border:none; background:none; cursor:pointer;">&times;</button>
    </div>

    <div id="pal-report-wrapper"></div>
    <div id="pal-ghost"></div>
</div>

<script>
const PALEngine = {
    maxHeight: 830,
    currentEmp: null,

    async init(empId, name, title) {
        this.currentEmp = { id: empId, name: name, title: title };
        const wrapper = document.getElementById('pal-report-wrapper');
        wrapper.innerHTML = `<div style="color:white; text-align:center; padding:50px;">Generating Editable Layout...</div>`;
        
        try {
            const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
            const data = await res.json();
            
            const aggregated = data.items.reduce((acc, item) => {
                const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
                if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
                else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
                return acc;
            }, {});

            this.render(Object.values(aggregated));
            this.makeResizable(); // Aktifkan fitur geser kolom
        } catch(e) { console.error(e); }
    },

    render(items) {
        const wrapper = document.getElementById('pal-report-wrapper');
        wrapper.innerHTML = '';
        let currentPage = this.createNewPage();
        let contentDiv = currentPage.querySelector('.dynamic-content');
        let currentH = 0;

        // Header Tabel dengan Resizer Handle
        let tableHtml = `
            <table class="main-table">
                <thead>
                    <tr>
                        <th style="width: 35px;">No.<div class="resizer"></div></th>
                        <th style="width: 180px;">DESCRIPTION<div class="resizer"></div></th>
                        <th>PART NUMBER<div class="resizer"></div></th>
                        <th style="width: 80px;">ATA<div class="resizer"></div></th>
                        <th style="width: 70px;">AUTH<div class="resizer"></div></th>
                    </tr>
                </thead>
                <tbody contenteditable="true">`;
        
        contentDiv.insertAdjacentHTML('beforeend', tableHtml);
        let tbody = contentDiv.querySelector('tbody');
        currentH += 50;

        items.forEach((group, idx) => {
            const row = this.createRow(group, idx + 1);
            const rowH = this.measureElement(row);

            if (currentH + rowH > this.maxHeight) {
                contentDiv.insertAdjacentHTML('beforeend', `</tbody></table>`);
                currentPage = this.createNewPage();
                contentDiv = currentPage.querySelector('.dynamic-content');
                contentDiv.insertAdjacentHTML('beforeend', tableHtml.replace('DESCRIPTION', 'DESCRIPTION (CONT.)'));
                tbody = contentDiv.querySelector('tbody');
                currentH = 50;
            }
            tbody.appendChild(row);
            currentH += rowH;
        });

        contentDiv.insertAdjacentHTML('beforeend', `</tbody></table>`);
        this.addSignature(contentDiv, currentH);
    },

    createNewPage() {
        const p = document.createElement('div');
        p.className = 'pal-page';
        p.innerHTML = `
            <div class="logo-container"><img src="pricing/assets/GMF_Logo.png" class="logo-img"></div>
            <div class="title-section" contenteditable="true">PERSONAL ABILITY LIST</div>
            <table class="info-table">
                <tr><td width="150">Name</td><td width="10">:</td><td><strong contenteditable="true">${this.currentEmp.name}</strong></td></tr>
                <tr><td>Personnel Number</td><td>:</td><td><strong contenteditable="true">${this.currentEmp.id}</strong></td></tr>
                <tr><td>Present Title</td><td>:</td><td><span contenteditable="true">${this.currentEmp.title}</span></td></tr>
            </table>
            <div class="dynamic-content"></div>
            <div class="pal-footer">
                <div contenteditable="true">Form No.: GMF/Q-364 R1</div>
                <div class="page-num-label">Page 1 of 1</div>
            </div>`;
        document.getElementById('pal-report-wrapper').appendChild(p);
        return p;
    },

    createRow(group, no) {
        const tr = document.createElement('tr');
        const mid = Math.ceil(group.pns.length / 2);
        let pnHtml = `<div class="pn-grid"><div>` + 
            group.pns.slice(0, mid).map(p => `<div class="pn-item"><span>-</span><span>${p}</span></div>`).join('') + 
            `</div><div>` + 
            group.pns.slice(mid).map(p => `<div class="pn-item"><span>-</span><span>${p}</span></div>`).join('') + 
            `</div></div>`;

        tr.innerHTML = `<td align="center">${no}</td><td><b>${group.desc.toUpperCase()}</b></td><td>${pnHtml}</td><td align="center"><b>${group.ata}</b></td><td align="center">${group.auth}</td>`;
        return tr;
    },

    addSignature(container, h) {
        const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
        const sigHtml = `
            <table class="footer-sig-table" contenteditable="true">
                <tr>
                    <td style="width:35%">Date : <br><br><strong>${today}</strong></td>
                    <td style="width:35%"></td>
                    <td style="width:30%">
                        <div class="sig-inner-flex">
                            <div>Approved by<br>SM Structure Workshop</div>
                            <div>( ___________________________ )<br><span style="font-size:9px">Name & Signature</span></div>
                        </div>
                    </td>
                </tr>
            </table>`;
        container.insertAdjacentHTML('beforeend', sigHtml);
    },

    // LOGIC GESER KOLOM (Resizer)
    makeResizable() {
        const resizers = document.querySelectorAll('.resizer');
        resizers.forEach(resizer => {
            let x = 0; let w = 0;
            const mouseDownHandler = (e) => {
                x = e.clientX;
                const col = resizer.parentElement;
                w = parseInt(window.getComputedStyle(col).width, 10);
                resizer.classList.add('resizing');
                document.addEventListener('mousemove', mouseMoveHandler);
                document.addEventListener('mouseup', mouseUpHandler);
            };
            const mouseMoveHandler = (e) => {
                const dx = e.clientX - x;
                resizer.parentElement.style.width = `${w + dx}px`;
            };
            const mouseUpHandler = () => {
                resizer.classList.remove('resizing');
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
            };
            resizer.addEventListener('mousedown', mouseDownHandler);
        });
    },

    measureElement(el) {
        const g = document.getElementById('pal-ghost');
        g.innerHTML = `<table class="main-table">${el.outerHTML}</table>`;
        return g.offsetHeight;
    }
};

function toggleEditGuidelines() {
    const resizers = document.querySelectorAll('.resizer');
    resizers.forEach(r => {
        r.style.display = (r.style.display === 'none') ? 'block' : 'none';
    });
}

window.openPALDocument = function(empId, name, title) {
    document.getElementById('palDocumentModal').style.display = 'block';
    PALEngine.init(empId, name, title);
};

window.closePALModal = function() {
    document.getElementById('palDocumentModal').style.display = 'none';
};
</script>
