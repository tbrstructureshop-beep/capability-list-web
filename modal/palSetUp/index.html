<style>
  /* --- PRINT SETUP A4 PORTRAIT --- */
  @page {
    size: A4 portrait;
    margin: 15mm; 
  }

  @media print {
    body * { visibility: hidden !important; background: none !important; }
    #palDocumentModal, #palDocumentModal * { visibility: visible !important; }
    
    #palDocumentModal { 
      position: absolute !important; 
      left: 0 !important; 
      top: 0 !important; 
      width: 210mm !important; 
      background: white !important;
      display: block !important;
    }
    
    .no-print { display: none !important; }
    
    .pal-doc { 
      margin: 0 !important; 
      box-shadow: none !important; 
      width: 100% !important;
      min-height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
    }

    .meta-footer-fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      padding-top: 5px;
      visibility: visible !important;
    }
    .page-counter:after { content: "Page " counter(page) " of " counter(pages); }
  }

  /* --- SCREEN VIEW STYLES --- */
  .pal-doc { 
    background: white; 
    width: 210mm; 
    min-height: 297mm; 
    padding: 15mm; 
    margin: 20px auto; 
    color: #000; 
    font-family: Arial, sans-serif; 
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    box-sizing: border-box;
  }

  .logo-container { text-align: center; margin-bottom: 10px; }
  .logo-img { height: 45px; width: auto; display: block; margin: 0 auto; }
  
  .title-section { 
    text-align: center; 
    font-weight: bold; 
    font-size: 14px; 
    text-decoration: underline; 
    margin-bottom: 20px; 
    text-transform: uppercase;
  }

  .info-table { width: 65%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; }
  .info-table td { padding: 2px 0; }

  .main-table { width: 100%; border-collapse: collapse; border: 1px solid black; flex-grow: 1; table-layout: fixed; }
  .main-table th { 
    border: 1px solid black; padding: 8px 4px; background: #f2f2f2; 
    text-transform: uppercase; font-size: 10px; font-weight: bold; 
  }
  .main-table td { 
    border: 1px solid black; padding: 6px; font-size: 10px; 
    vertical-align: top; word-wrap: break-word; 
  }

  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pn-item { display: flex; gap: 5px; line-height: 1.2; }

  /* --- FIXED SIGNATURE TABLE --- */
  .footer-sig-table { 
    width: 100%; 
    border-collapse: collapse; 
    border: 1px solid black; 
    margin-top: 20px; 
    table-layout: fixed;
    break-inside: avoid;
  }
  .footer-sig-table td { 
    border: 1px solid black; 
    height: 110px; /* Fixed height for consistent look */
    vertical-align: top; 
    padding: 10px; 
    font-size: 11px; 
  }
  
  .col-25 { width: 25%; }
  .col-50 { width: 50%; }

  /* Vertical Alignment Container */
  .sig-inner-flex {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    text-align: center;
  }

  .meta-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 10px;
  }

  .meta-footer-fixed { display: none; }
</style>

<div id="palDocumentModal" class="modal-overlay" style="display:none; background: rgba(0,0,0,0.85); z-index: 15500; overflow-y: auto;">
  
  <div class="no-print" style="position: sticky; top: 0; width: 100%; background: #323639; padding: 12px 25px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 16000;">
     <div style="display:flex; gap: 12px;">
       <button class="btn btn-primary" onclick="window.print()" style="background:#3c92a6; border:none; padding: 8px 16px;">Print A4 (PDF)</button>
       <button class="btn" onclick="openBulkAddModal()" style="background:#fff; color:#333; border:none; padding: 8px 16px;">+ Add Items</button>
     </div>
     <button class="close-x" onclick="document.getElementById('palDocumentModal').style.display='none'" style="color:white; font-size:30px; border:none; background:none; cursor:pointer;">&times;</button>
  </div>

  <div id="palPrintArea" class="pal-doc">
    <div class="logo-container">
       <img src="pricing/assets/GMF_Logo.png" class="logo-img">
    </div>
    
    <div class="title-section">PERSONAL ABILITY LIST</div>

    <table class="info-table">
      <tr><td width="150">Name</td><td width="10">:</td><td><strong id="pal_name" style="text-transform: uppercase;">-</strong></td></tr>
      <tr><td>Personnel Number</td><td>:</td><td><strong id="pal_id">-</strong></td></tr>
      <tr><td>Present Title</td><td>:</td><td><span id="pal_title">-</span></td></tr>
    </table>

    <table class="main-table">
      <thead>
        <tr>
          <th width="35">No.</th>
          <th width="180">DESCRIPTION</th>
          <th>PART NUMBER</th>
          <th width="90">ATA</th>
          <th width="90">RELATED AUTH</th>
        </tr>
      </thead>
      <tbody id="pal_items_body"></tbody>
    </table>
    
    <!-- Signature Table (Ratios 25:50:25) -->
    <table class="footer-sig-table">
      <tr>
        <td class="col-25">
          Date : <br><br>
          <span id="pal_today_date" style="font-weight:bold; font-size: 12px;">-</span>
        </td>
        <td class="col-50"></td>
        <td class="col-25">
          <div class="sig-inner-flex">
            <div>Approved by<br>SM Structure Workshop</div>
            <div>
              ( ___________________________ )<br>
              <span style="font-size: 10px; margin-top: 5px; display: block;">Name & Signature</span>
            </div>
          </div>
        </td>
      </tr>
    </table>

    <!-- Screen Preview Footer -->
    <div class="meta-footer no-print">
      <div>Form No.: GMF/Q-364 R1</div>
      <div id="web_page_counter">Page 1 of 1</div>
    </div>

    <!-- Print Footer -->
    <div class="meta-footer-fixed">
      <div>Form No.: GMF/Q-364 R1</div>
      <div class="page-counter"></div>
    </div>
  </div>
</div>

<script>
/**
 * REBUILT: openPALDocument
 */
async function openPALDocument(empId, name, title) {
  currentPalEmpId = empId;
  document.getElementById('pal_name').textContent = name;
  document.getElementById('pal_id').textContent = empId;
  document.getElementById('pal_title').textContent = title || "Aircraft Structure Engineer";
  
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('pal_today_date').textContent = today;

  document.getElementById('palDocumentModal').style.display = 'block';
  document.body.style.overflow = 'hidden'; 

  showLoader();
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStaffAuthorizedItems&empId=${empId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    const aggregated = data.items.reduce((acc, item) => {
      const key = `${item.desc.trim()}|${item.auth.trim()}|${item.ref.trim()}`;
      if (!acc[key]) acc[key] = { desc: item.desc, auth: item.auth, ata: item.ref, pns: [item.pn] };
      else if (!acc[key].pns.includes(item.pn)) acc[key].pns.push(item.pn);
      return acc;
    }, {});

    const body = document.getElementById('pal_items_body');
    body.innerHTML = '';
    const itemsList = Object.values(aggregated);

    itemsList.forEach((group, idx) => {
      const mid = Math.ceil(group.pns.length / 2);
      const col1 = group.pns.slice(0, mid);
      const col2 = group.pns.slice(mid);

      let pnHtml = `<div class="pn-grid"><div>`;
      col1.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div><div>`;
      col2.forEach(p => pnHtml += `<div class="pn-item"><span>-</span><span>${p}</span></div>`);
      pnHtml += `</div></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;">${idx + 1}</td>
        <td style="text-transform: uppercase; font-weight:bold;">${group.desc}</td>
        <td>${pnHtml}</td>
        <td style="text-align:center;"><strong>${group.ata}</strong></td>
        <td style="text-align:center; font-size: 9px; font-weight: bold;">${group.auth}</td>
      `;
      body.appendChild(tr);
    });
    
    document.getElementById('web_page_counter').textContent = `Page 1 of 1`;

  } catch(e) { console.error(e); }
  finally { hideLoader(); }
}

document.querySelector('#palDocumentModal .close-x').addEventListener('click', () => {
  document.body.style.overflow = 'auto';
});
</script>
