<style>
  .edit-acc-card { background: #fff; width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .edit-acc-header { padding: 24px; border-bottom: 1px solid var(--border); text-align: center; }
  .edit-acc-body { padding: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
  .form-group input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; }
  .form-group input:focus { border-color: var(--primary); }
</style>

<div class="edit-acc-card">
  <div class="edit-acc-header">
    <h3 style="margin:0">Edit Profile</h3>
    <p style="font-size:12px; color:var(--text-muted); margin-top:4px;">Complete your professional details</p>
  </div>
  <div class="edit-acc-body">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="edit_name" readonly style="background:#f9fafb; color:#999;">
    </div>
    <div class="form-group">
      <label>Job Title</label>
      <input type="text" id="edit_job" placeholder="e.g. Avionics Engineer">
    </div>
    <div class="form-group">
      <label>Stamp No.</label>
      <input type="text" id="edit_stamp" placeholder="e.g. 1234/T">
    </div>
    <div class="form-group">
      <label>New Password (Leave blank to keep current)</label>
      <input type="password" id="edit_pass">
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content:center; padding:14px;" onclick="saveProfile()">Update Profile</button>
    <button class="btn" style="width:100%; justify-content:center; margin-top:8px; border:none;" onclick="closeEditAccModal()">Cancel</button>
  </div>
</div>

<script>
  function initEditAccount() {
    if(!currentUser) return;
    document.getElementById('edit_name').value = currentUser.name;
    document.getElementById('edit_job').value = currentUser.jobTitle || "";
    document.getElementById('edit_stamp').value = currentUser.stampNo || "";
  }

  async function saveProfile() {
    const payload = {
      action: "updateUserProfile",
      empId: currentUser.empId,
      jobTitle: document.getElementById('edit_job').value,
      stampNo: document.getElementById('edit_stamp').value,
      password: document.getElementById('edit_pass').value
    };

    Swal.fire({ title: 'Saving...', didOpen: () => Swal.showLoading() });
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
      const result = await res.json();
      if(result.success) {
        // Update local session
        currentUser.jobTitle = payload.jobTitle;
        currentUser.stampNo = payload.stampNo;
        saveSession(currentUser);
        Swal.fire("Success", "Profile updated", "success");
        closeEditAccModal();
      }
    } catch (e) { Swal.fire("Error", "Failed to update", "error"); }
  }
</script>
