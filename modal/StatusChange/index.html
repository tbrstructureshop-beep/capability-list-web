<div id="historyModal" class="modal-overlay" style="display:flex">
  <div class="modal-card" style="max-width: 550px; border-radius: 20px;">
    <div class="modal-header" style="background: var(--primary-light); padding: 18px 24px;">
      <div style="display:flex; flex-direction:column;">
        <h3 style="margin:0; font-size:16px; color:var(--primary-dark);">Status Change Logs</h3>
        <span id="historyPnSub" style="font-size:12px; color:var(--text-muted); font-weight:600;"></span>
      </div>
      <button class="close-x" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    
    <div class="modal-body" style="padding: 30px 24px; min-height: 250px; position: relative;">
      <!-- Internal Spinner -->
      <div id="historySpinner" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0;">
        <div class="spinner" style="width:30px; height:30px; border-width:3px;"></div>
        <p id="spinnerText" style="font-size:12px; color:var(--text-muted); margin-top:10px;">Searching logs...</p>
      </div>

      <!-- Timeline Container -->
      <div id="historyList" class="timeline-container" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
/**
 * Premium Date Formatter: DD MMM YYYY HH:mm:ss
 */
function formatPremiumDate(timestamp) {
  if (!timestamp) return "—";
  const d = new Date(timestamp);
  const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
  return `${String(d.getDate()).padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
}

async function loadHistory(auth, pn) {
  const listEl = document.getElementById('historyList');
  const spinnerEl = document.getElementById('historySpinner');
  const spinnerText = document.getElementById('spinnerText');
  const subTitleEl = document.getElementById('historyPnSub');
  
  if (subTitleEl) subTitleEl.textContent = `${auth} | PN: ${pn}`;

  // Log untuk debugging (Cek di F12 Console)
  console.log("Fetching History for:", { auth, pn });

  try {
    const url = `${GAS_API_URL}?action=getStatusHistory&auth=${encodeURIComponent(auth)}&pn=${encodeURIComponent(pn)}`;
    
    const response = await fetch(url);
    if (!response.ok) throw new Error("Network response was not ok");
    
    const logs = await response.json();
    console.log("History Data Received:", logs);

    // Pastikan spinner hilang
    spinnerEl.style.display = "none";
    listEl.style.display = "block";

    if (!logs || logs.length === 0) {
      listEl.innerHTML = `
        <div style="text-align:center; padding:20px; color:var(--text-light);">
          <p style="font-size:13px;">No history records found for this part number.</p>
          <small>Checking for: ${auth} / ${pn}</small>
        </div>`;
      return;
    }

    listEl.innerHTML = logs.map(log => {
      const statusMap = { 'ACTIVE': '#10b981', 'INACTIVE': '#f59e0b', 'DELETED': '#ef4444', 'REVISED': '#3b82f6', 'ARCHIVED': '#94a3b8' };
      const dotColor = statusMap[log.status] || '#10b981';
      
      return `
        <div class="timeline-item">
          <span style="position:absolute; left:-37px; top:4px; width:12px; height:12px; border-radius:50%; background:#fff; border:3px solid ${dotColor}; z-index:3;"></span>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="timeline-status" style="color:${dotColor}">${log.status}</span>
            <span class="timeline-date">${formatPremiumDate(log.time)}</span>
          </div>
          <div class="timeline-activity">${log.activity}</div>
          <div class="timeline-note">"${log.note}"</div>
          <span class="timeline-user">Updated by: ${log.user}</span>
        </div>
      `;
    }).join('');

  } catch (err) {
    console.error("Fetch History Error:", err);
    spinnerEl.innerHTML = `<p style="color:red; font-size:12px; padding:20px;">Connection Error or API Timeout.<br>Please try again.</p>`;
  }
}
</script>
