<div id="historyModal" class="modal-overlay" style="display:flex">
  <div class="modal-card" style="max-width: 550px; border-radius: 20px;">
    <div class="modal-header" style="background: var(--primary-light); padding: 18px 24px;">
      <div style="display:flex; flex-direction:column;">
        <h3 style="margin:0; font-size:16px; color:var(--primary-dark);">Capability Status History</h3>
        <span id="historyPnSub" style="font-size:12px; color:var(--text-muted); font-weight:600;"></span>
      </div>
      <button class="close-x" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <div class="modal-body" style="padding: 30px 24px; min-height: 200px; position: relative;">
      <!-- Timeline List -->
      <div id="historyList" class="timeline-container"></div>
      
      <!-- Internal Loading Spinner -->
      <div id="historyLoader" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 10;">
        <div class="spinner" style="width:30px; height:30px;"></div>
      </div>
    </div>
  </div>
</div>

<style>
.timeline-container { position: relative; padding-left: 30px; border-left: 2px solid var(--border); margin-left: 10px; }
.timeline-item { position: relative; margin-bottom: 25px; animation: slideIn 0.3s ease forwards; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.timeline-item::before { 
    content: ""; position: absolute; left: -37px; top: 4px; 
    width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); 
    z-index: 2;
}

.timeline-status { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
.timeline-date { font-size: 11px; color: var(--text-light); font-weight: 600; letter-spacing: 0.02em; }
.timeline-activity { font-size: 14px; font-weight: 700; color: var(--text-main); margin: 4px 0; }
.timeline-note { font-size: 13px; color: var(--text-muted); line-height: 1.5; background: #f9fafb; padding: 12px; border-radius: 8px; border: 1px solid #f1f5f9; font-style: italic; }
.timeline-user { font-size: 11px; font-weight: 700; color: var(--primary); margin-top: 8px; display: block; text-transform: uppercase; }
</style>

<script>
/**
 * FORMAT TANGGAL: DD MMM YYYY HH:mm:ss
 */
function formatPremiumDate(dateString) {
  if (!dateString) return "—";
  const date = new Date(dateString);
  const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  
  const day = String(date.getDate()).padStart(2, '0');
  const month = months[date.getMonth()];
  const year = date.getFullYear();
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  const seconds = String(date.getSeconds()).padStart(2, '0');

  return `${day} ${month} ${year} ${hours}:${minutes}:${seconds}`;
}

async function loadHistory(auth, pn) {
  document.getElementById('historyPnSub').textContent = `${auth} | PN: ${pn}`;
  const container = document.getElementById('historyList');
  const loader = document.getElementById('historyLoader');
  
  try {
    const res = await fetch(`${GAS_API_URL}?action=getStatusHistory&auth=${auth}&pn=${pn}`);
    const logs = await res.json();
    
    loader.style.display = "none"; // Sembunyikan spinner

    if(logs.length === 0) {
      container.innerHTML = `
        <div style="text-align:center; padding:40px 0; color:var(--text-light);">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5; margin-bottom:10px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <p style="font-size:13px; margin:0;">No history recorded for this item.</p>
        </div>`;
      return;
    }

    // Urutan dari GAS sudah direverse (Terbaru di atas)
    container.innerHTML = logs.map(log => {
      const statusMap = { 
        'ACTIVE': '#10b981', 
        'INACTIVE': '#f59e0b', 
        'DELETED': '#ef4444', 
        'REVISED': '#3b82f6', 
        'ARCHIVED': '#94a3b8' 
      };
      const dotColor = statusMap[log.status] || '#10b981';
      
      return `
        <div class="timeline-item">
          <span style="position:absolute; left:-37px; top:4px; width:12px; height:12px; border-radius:50%; background:#fff; border:3px solid ${dotColor}; z-index:3;"></span>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="timeline-status" style="color:${dotColor}">${log.status}</span>
            <span class="timeline-date">${formatPremiumDate(log.time)}</span>
          </div>
          <div class="timeline-activity">${log.activity}</div>
          <div class="timeline-note">"${log.note}"</div>
          <span class="timeline-user">BY: ${log.user}</span>
        </div>
      `;
    }).join('');

  } catch (err) {
    console.error("History Error:", err);
    loader.innerHTML = `<p style="color:red; font-size:12px;">Failed to load data</p>`;
  }
}
</script>
