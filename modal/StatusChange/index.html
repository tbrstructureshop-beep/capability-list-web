<div id="historyModal" class="modal-overlay" style="display:flex">
  <div class="modal-card" style="max-width: 550px; border-radius: 20px;">
    <div class="modal-header" style="background: var(--primary-light); padding: 18px 24px;">
      <div style="display:flex; flex-direction:column;">
        <h3 style="margin:0; font-size:16px; color:var(--primary-dark);">Status Change Logs</h3>
        <span id="historyPnSub" style="font-size:12px; color:var(--text-muted); font-weight:600;"></span>
      </div>
      <button class="close-x" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    
    <div class="modal-body" style="padding: 30px 24px; min-height: 250px; position: relative;">
      <!-- Internal Spinner -->
      <div id="historySpinner" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0;">
        <div class="spinner" style="width:30px; height:30px; border-width:3px;"></div>
        <p style="font-size:12px; color:var(--text-muted); margin-top:10px;">Searching logs...</p>
      </div>

      <!-- Timeline Container -->
      <div id="historyList" class="timeline-container" style="display:none;">
        <!-- Data loaded here -->
      </div>
    </div>
  </div>
</div>

<style>
/* PRESERVED CSS - REPAIRED FOR ALIGNMENT */
.timeline-container { 
    position: relative; 
    padding-left: 30px; 
    border-left: 2px solid var(--border); 
    margin-left: 15px; /* Sedikit digeser agar garis pas di tengah lingkaran */
}

.timeline-item { 
    position: relative; 
    margin-bottom: 30px; 
    animation: slideUp 0.3s ease-out forwards; 
}

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* REPAIR: Container Lingkaran Luar (Flexbox Centering) */
.timeline-indicator {
    position: absolute;
    left: -41px; /* Posisi presisi di atas garis border-left */
    top: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #e5e7eb; /* Default border */
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
}

/* REPAIR: Titik Lingkaran Dalam */
.dot-inner {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: block;
}

.timeline-status { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
.timeline-date { font-size: 10px; color: var(--text-light); font-weight: 700; letter-spacing: 0.05em; }
.timeline-activity { font-size: 14px; font-weight: 700; color: var(--text-main); margin: 4px 0; }
.timeline-note { font-size: 13px; color: var(--text-muted); line-height: 1.5; background: #f9fafb; padding: 12px; border-radius: 10px; border: 1px solid #f1f5f9; font-style: italic; }
.timeline-user { font-size: 10px; font-weight: 800; color: var(--primary); margin-top: 10px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
</style>

<script>
function formatPremiumDate(timestamp) {
  if (!timestamp) return "—";
  const d = new Date(timestamp);
  if (isNaN(d.getTime())) return "Invalid Date";
  const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
  return `${String(d.getDate()).padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
}

async function loadHistory(auth, pn) {
  const listEl = document.getElementById('historyList');
  const spinnerEl = document.getElementById('historySpinner');
  const subTitleEl = document.getElementById('historyPnSub');
  
  if (subTitleEl) subTitleEl.textContent = `${auth} | PN: ${pn}`;

  try {
    const url = `${GAS_API_URL}?action=getStatusHistory&auth=${encodeURIComponent(auth)}&pn=${encodeURIComponent(pn)}&_=${Date.now()}`;
    const response = await fetch(url);
    const logs = await response.json();

    spinnerEl.style.display = "none";
    listEl.style.display = "block";

    if (!logs || logs.length === 0) {
      listEl.innerHTML = `<p style="text-align:center; padding:30px; color:var(--text-light); font-size:13px;">No history records found.</p>`;
      return;
    }

    listEl.innerHTML = logs.map(log => {
      const statusMap = { 
        'ACTIVE': '#10b981', 'INACTIVE': '#f59e0b', 
        'DELETED': '#ef4444', 'REVISED': '#3b82f6', 'ARCHIVED': '#94a3b8' 
      };
      const dotColor = statusMap[log.status] || '#10b981';
      
      return `
        <div class="timeline-item">
          <!-- REPAIRED INDICATOR -->
          <div class="timeline-indicator" style="border-color: ${dotColor}">
             <span class="dot-inner" style="background-color: ${dotColor}"></span>
          </div>
          
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="timeline-status" style="color:${dotColor}">${log.status}</span>
            <span class="timeline-date">${formatPremiumDate(log.time)}</span>
          </div>
          <div class="timeline-activity">${log.activity}</div>
          <div class="timeline-note">"${log.note}"</div>
          <span class="timeline-user">UPDATED BY: ${log.user}</span>
        </div>
      `;
    }).join('');

  } catch (err) {
    spinnerEl.innerHTML = `<p style="color:red; font-size:12px; padding:20px;">Connection Error.</p>`;
  }
}
</script>
