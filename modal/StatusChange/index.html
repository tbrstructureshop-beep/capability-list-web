<div id="historyModal" class="modal-overlay" style="display:flex">
  <div class="modal-card" style="max-width: 550px; border-radius: 20px;">
    <div class="modal-header" style="background: var(--primary-light); padding: 18px 24px;">
      <div style="display:flex; flex-direction:column;">
        <h3 style="margin:0; font-size:16px; color:var(--primary-dark);">Capability Status History</h3>
        <span id="historyPnSub" style="font-size:12px; color:var(--text-muted); font-weight:600;"></span>
      </div>
      <button class="close-x" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <div class="modal-body" style="padding: 30px 24px;">
      <div id="historyList" class="timeline-container">
        <!-- Timeline Items -->
      </div>
    </div>
  </div>
</div>

<style>
.timeline-container { position: relative; padding-left: 30px; border-left: 2px solid var(--border); margin-left: 10px; }
.timeline-item { position: relative; margin-bottom: 25px; }
.timeline-item::before { 
    content: ""; position: absolute; left: -37px; top: 4px; 
    width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); 
}
.timeline-status { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
.timeline-date { font-size: 11px; color: var(--text-light); font-weight: 500; }
.timeline-activity { font-size: 14px; font-weight: 700; color: var(--text-main); margin: 4px 0; }
.timeline-note { font-size: 13px; color: var(--text-muted); line-height: 1.5; background: #f9fafb; padding: 10px; border-radius: 8px; border: 1px solid #f1f5f9; }
.timeline-user { font-size: 11px; font-weight: 700; color: var(--primary); margin-top: 8px; display: block; }
</style>

<script>
async function loadHistory(auth, pn) {
  document.getElementById('historyPnSub').textContent = `${auth} | PN: ${pn}`;
  const container = document.getElementById('historyList');
  container.innerHTML = '<div class="spinner" style="width:20px; height:20px; border-width:2px; margin:20px auto;"></div>';
  
  const res = await fetch(`${GAS_API_URL}?action=getStatusHistory&auth=${auth}&pn=${pn}`);
  const logs = await res.json();
  
  if(logs.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-light); font-size:13px;">No history recorded for this item.</p>';
    return;
  }

  container.innerHTML = logs.map(log => {
    const statusMap = { 'ACTIVE': '#10b981', 'INACTIVE': '#f59e0b', 'DELETED': '#ef4444', 'REVISED': '#3b82f6', 'ARCHIVED': '#94a3b8' };
    const dotColor = statusMap[log.status] || '#10b981';
    
    return `
      <div class="timeline-item">
        <span style="position:absolute; left:-37px; top:4px; width:12px; height:12px; border-radius:50%; background:#fff; border:3px solid ${dotColor};"></span>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="timeline-status" style="color:${dotColor}">${log.status}</span>
          <span class="timeline-date">${new Date(log.time).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
        </div>
        <div class="timeline-activity">${log.activity}</div>
        <div class="timeline-note">${log.note}</div>
        <span class="timeline-user">Updated by: ${log.user}</span>
      </div>
    `;
  }).join('');
}
</script>
