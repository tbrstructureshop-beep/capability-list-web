<div class="modal-card" style="max-width: 400px;">
  <div class="modal-header">
    <h3 id="authTitle">Sign In System</h3>
    <button class="close-x" onclick="closeAuthModal()">&times;</button>
  </div>
  <div class="modal-body">
    <div id="loginForm">
      <div class="form-group" style="margin-bottom:15px;">
        <label>Employee ID</label>
        <input type="text" id="loginId" placeholder="Input ID...">
      </div>
      <div class="form-group" style="margin-bottom:15px;">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="******">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="processLogin()">Login</button>
      <p style="text-align:center; font-size:12px; margin-top:15px;">
        Belum punya akun? <a href="#" onclick="toggleAuthMode('reg')">Daftar di sini</a>
      </p>
    </div>

    <div id="registerForm" style="display:none;">
      <div class="form-group"><label>Employee ID</label><input type="text" id="regId"></div>
      <div class="form-group"><label>Full Name</label><input type="text" id="regName"></div>
      <div class="form-group"><label>Unit</label><input type="text" id="regUnit"></div>
      <div class="form-group">
        <label>Role</label>
        <select id="regRole"><option value="user">Applicant (User)</option><option value="Admin">Admin (QA/Technical)</option></select>
      </div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass"></div>
      <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="processRegister()">Register</button>
      <a href="#" onclick="toggleAuthMode('login')" style="display:block; text-align:center; font-size:12px; margin-top:10px;">Kembali ke Login</a>
    </div>
  </div>
</div>

<script>
let currentUser = null;

function toggleAuthMode(mode) {
  document.getElementById('loginForm').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = mode === 'reg' ? 'block' : 'none';
  document.getElementById('authTitle').textContent = mode === 'login' ? 'Sign In' : 'New Registration';
}

async function processLogin() {
  const payload = { action: "userAuth", empId: document.getElementById('loginId').value, password: document.getElementById('loginPass').value };
  const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
  const data = await res.json();
  if (data.success) {
    currentUser = data.user;
    Swal.fire("Success", `Welcome ${currentUser.name}`, "success");
    closeAuthModal();
    // Jika login berhasil, langsung buka form pengajuan jika tadi ingin mengajukan
    if(window.pendingAction === 'openForm') openSubmissionForm();
  } else {
    Swal.fire("Error", data.error, "error");
  }
}

async function processRegister() {
  const payload = {
    action: "userRegister",
    empId: document.getElementById('regId').value,
    name: document.getElementById('regName').value,
    unit: document.getElementById('regUnit').value,
    role: document.getElementById('regRole').value,
    password: document.getElementById('regPass').value
  };
  const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
  const data = await res.json();
  if (data.success) {
    Swal.fire("Registered", "Silakan login sekarang", "success");
    toggleAuthMode('login');
  }
}

function closeAuthModal() {
  document.getElementById("authModalOverlay").style.display = "none";
}
</script>
