<style>
  .auth-person-card {
    background: #fff;
    width: 100%;
    max-width: 850px; /* Wider for table */
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-md);
    animation: authPersonSlideUp 0.3s ease-out;
  }

  .ap-header {
    padding: 20px 24px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ap-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* Search & Add Section */
  .ap-admin-controls {
    background: var(--primary-light);
    padding: 16px;
    border-radius: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .ap-input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .ap-input-group label { font-size: 11px; font-weight: 700; color: var(--primary-dark); }
  .ap-input-group select, .ap-input-group input { 
    padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #fff;
  }

  /* Table Styling */
  .ap-table-wrapper { 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    overflow: hidden; 
    max-height: 400px; 
    overflow-y: auto; 
  }
  
  .ap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ap-table th { background: #f9fafb; padding: 12px; text-align: left; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  .ap-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-main); }
  
  .btn-remove { 
    color: #ef4444; background: #fef2f2; border: 1px solid #fee2e2; 
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700;
  }
  .btn-remove:hover { background: #fee2e2; }

  .empty-state { padding: 40px; text-align: center; color: var(--text-light); }
</style>

<div class="auth-person-card">
  <div class="ap-header">
    <div>
      <h3 style="margin:0; font-size: 18px; color: var(--text-main);">Authorized Personnel Set</h3>
      <div id="ap_subtitle" style="font-size: 12px; color: var(--text-muted);">PN: - | Authority: -</div>
    </div>
    <button class="close-x" onclick="closeAuthPersonModal()">&times;</button>
  </div>

  <div class="ap-body">
    <!-- Admin Only: Add Personnel -->
    <div id="apAdminPanel" class="ap-admin-controls" style="display:none;">
      <div class="ap-input-group">
        <label>Search & Select Staff</label>
        <select id="userSelector">
          <option value="">-- Select Personnel --</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="handleAddStaff()" style="height: 40px;">Add to Set</button>
    </div>

    <!-- Table -->
    <div class="ap-table-wrapper">
      <table class="ap-table">
        <thead>
          <tr>
            <th>No.</th>
            <th>Emp ID</th>
            <th>Name</th>
            <th>Unit</th>
            <th>Job Title</th>
            <th>Stamp No.</th>
            <th id="thActions" style="display:none;">Action</th>
          </tr>
        </thead>
        <tbody id="apTableBody">
          <!-- Rows injected here -->
        </tbody>
      </table>
      <div id="apEmpty" class="empty-state" style="display:none;">No personnel authorized for this component yet.</div>
    </div>
  </div>
</div>

<script>
  let currentApContext = { auth: '', pn: '' };
  let allStaffCache = [];

  async function initAuthPerson(auth, pn) {
    currentApContext = { auth, pn };
    document.getElementById('ap_subtitle').textContent = `Part Number: ${pn} | Authority: ${auth}`;
    
    // Check if current user is Admin to show controls
    const isAdmin = currentUser && currentUser.role === 'Admin';
    if(isAdmin) {
      document.getElementById('apAdminPanel').style.display = 'flex';
      document.getElementById('thActions').style.display = 'table-cell';
    }

    loadAuthorizedList();
  }

  async function loadAuthorizedList() {
    const tableBody = document.getElementById('apTableBody');
    tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Loading...</td></tr>';

    try {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({ 
          action: 'getAuthorizedPersonnel', 
          authority: currentApContext.auth, 
          pn: currentApContext.pn 
        })
      });
      const data = await res.json();

      if (data.success) {
        // Update Selector for Admin
        if(currentUser && currentUser.role === 'Admin') {
          allStaffCache = data.allUsers;
          const selector = document.getElementById('userSelector');
          selector.innerHTML = '<option value="">-- Select Personnel --</option>';
          data.allUsers.forEach(u => {
            selector.innerHTML += `<option value="${u.empId}">${u.empId} - ${u.name} (${u.unit})</option>`;
          });
        }

        renderApTable(data.authorizedList);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function renderApTable(list) {
    const tableBody = document.getElementById('apTableBody');
    const emptyState = document.getElementById('apEmpty');
    const isAdmin = currentUser && currentUser.role === 'Admin';
    
    tableBody.innerHTML = '';
    
    if (!list || list.length === 0) {
      emptyState.style.display = 'block';
      return;
    }
    
    emptyState.style.display = 'none';
    list.forEach((user, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td>${user.empId}</td>
        <td style="font-weight:600;">${user.name}</td>
        <td>${user.unit}</td>
        <td>${user.jobTitle}</td>
        <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${user.stampNo}</code></td>
        ${isAdmin ? `<td><button class="btn-remove" onclick="handleRemoveStaff('${user.empId}')">Remove</button></td>` : ''}
      `;
      tableBody.appendChild(tr);
    });
  }

  async function handleAddStaff() {
    const empId = document.getElementById('userSelector').value;
    if(!empId) return;

    Swal.fire({ title: 'Adding...', didOpen: () => Swal.showLoading() });

    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ 
        action: 'addAuthorizedPerson', 
        empId, 
        authority: currentApContext.auth, 
        pn: currentApContext.pn 
      })
    });
    const result = await res.json();
    if(result.success) {
      Swal.fire({ icon:'success', title:'Added', timer:1000, showConfirmButton:false });
      loadAuthorizedList();
    } else {
      Swal.fire('Error', result.error, 'error');
    }
  }

  async function handleRemoveStaff(empId) {
    const confirm = await Swal.fire({
      title: 'Remove Authorization?',
      text: "This person will no longer be authorized to sign for this component.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Yes, Remove'
    });

    if(confirm.isConfirmed) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({ 
          action: 'removeAuthorizedPerson', 
          empId, 
          authority: currentApContext.auth, 
          pn: currentApContext.pn 
        })
      });
      const result = await res.json();
      if(result.success) {
        loadAuthorizedList();
      }
    }
  }
</script>
