<style>
  .auth-person-card {
    background: #fff; width: 100%; max-width: 900px; border-radius: 20px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    animation: authPersonSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes authPersonSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  .auth-person-header {
    padding: 20px 24px; background: #fff; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  
  .target-strip {
    background: var(--primary-light); padding: 12px 24px;
    display: flex; gap: 40px; border-bottom: 1px solid var(--border);
  }
  .strip-item label { font-size: 10px; font-weight: 800; color: var(--primary); display: block; text-transform: uppercase; }
  .strip-item strong { font-size: 14px; color: var(--text-main); }

  .auth-table-container { padding: 0; max-height: 450px; overflow-y: auto; min-height: 200px; }
  .auth-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
  .auth-table th { position: sticky; top: 0; background: #f9fafb; padding: 12px 16px; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); z-index: 5; }
  .auth-table td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; color: var(--text-main); }
  .auth-table tr:hover { background: #fcfcfc; }

  .action-btns { display: flex; gap: 8px; }
  .btn-icon { border: none; background: none; cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.2s; }
  .btn-icon.del { color: #ef4444; }
  .btn-icon.del:hover { background: #fef2f2; }
  
  .admin-only { display: none; } /* Hidden by default */
</style>

<div class="auth-person-card">
  <div class="auth-person-header">
    <h3 style="margin:0; display:flex; align-items:center; gap:10px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
      Authorized Personnel Set
    </h3>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="btn btn-primary admin-only" id="btnAddPersonTrigger" onclick="openFindPersonModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Add Personnel
      </button>
      <button class="close-x" onclick="closeAuthPersonModal()">&times;</button>
    </div>
  </div>

  <div class="target-strip">
    <div class="strip-item"><label>Authority</label><strong id="view_auth">-</strong></div>
    <div class="strip-item"><label>Part Number</label><strong id="view_pn">-</strong></div>
  </div>

  <div class="auth-table-container">
    <table class="auth-table">
      <thead>
        <tr>
          <th>No.</th>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Unit</th>
          <th>Job Title</th>
          <th>Stamp No.</th>
          <th class="admin-only">Actions</th>
        </tr>
      </thead>
      <tbody id="authPersonTableBody"></tbody>
    </table>
  </div>
</div>

<script>
  let currentAuth = "";
  let currentPn = "";
  let allUsersList = []; // Kept for the find modal
  let existingAuthIds = new Set();

  async function initAuthPerson(auth, pn) {
    currentAuth = auth;
    currentPn = pn;
    document.getElementById('view_auth').textContent = auth;
    document.getElementById('view_pn').textContent = pn;
    
    // Admin Role Check (Normalize Case)
    const isAdmin = currentUser && currentUser.role && currentUser.role.toUpperCase() === 'ADMIN';
    if(isAdmin) {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
    }

    loadAuthData();
  }

  async function loadAuthData() {
    const tableBody = document.getElementById('authPersonTableBody');
    tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px;">Loading Personnel...</td></tr>';
    
    try {
      const res = await fetch(GAS_API_URL, { 
        method: "POST", 
        body: JSON.stringify({ action: "getAuthorizedPersonnel", authority: currentAuth, pn: currentPn }) 
      });
      const data = await res.json();
      
      if(data.success) {
        allUsersList = data.allUsers; // Cache for Search
        existingAuthIds = new Set(data.authorizedList.map(u => String(u.empId)));
        renderStaffTable(data.authorizedList);
      }
    } catch (e) { console.error(e); }
  }

  function renderStaffTable(list) {
    const body = document.getElementById('authPersonTableBody');
    const isAdmin = currentUser && currentUser.role && currentUser.role.toUpperCase() === 'ADMIN';
    
    if(list.length === 0) {
      body.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:#9ca3af;">No personnel authorized for this item yet.</td></tr>`;
      return;
    }

    body.innerHTML = list.map((user, i) => `
      <tr>
        <td>${i+1}</td>
        <td><strong>${user.empId}</strong></td>
        <td>${user.name}</td>
        <td>${user.unit}</td>
        <td>${user.jobTitle || '-'}</td>
        <td><code style="background:#eee; padding:2px 6px; border-radius:4px;">${user.stampNo || '-'}</code></td>
        <td class="admin-only" style="display: ${isAdmin ? 'table-cell' : 'none'}">
          <div class="action-btns">
            <button class="btn-icon del" onclick="removePerson('${user.empId}')" title="Remove Authorization">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function removePerson(empId) {
    const confirm = await Swal.fire({
      title: 'Remove Person?',
      text: "This person will no longer be authorized for this set.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ef4444'
    });

    if(confirm.isConfirmed) {
      Swal.fire({ title: 'Removing...', didOpen: () => Swal.showLoading() });
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "removeAuthorizedPerson", empId, authority: currentAuth, pn: currentPn })
      });
      loadAuthData();
      Swal.close();
    }
  }

  // --- Search Modal Integration ---
  async function openFindPersonModal() {
    const targetPath = "modal/findAuthorized/index.html";
    try {
      const response = await fetch(targetPath);
      const html = await response.text();
      
      let overlay = document.getElementById("findPersonOverlay");
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "findPersonOverlay";
        overlay.className = "modal-overlay";
        overlay.style.zIndex = "12000"; // Above authPersonModal
        document.body.appendChild(overlay);
      }
      
      overlay.innerHTML = html;
      overlay.style.display = "flex";

      const scripts = overlay.querySelectorAll("script");
      scripts.forEach(s => {
        const newS = document.createElement("script");
        newS.text = s.innerHTML;
        document.body.appendChild(newS);
      });

      if (typeof initFindPerson === "function") {
        // Filter users who are NOT already authorized
        const available = allUsersList.filter(u => !existingAuthIds.has(String(u.empId)));
        initFindPerson(available);
      }
    } catch (e) { console.error(e); }
  }

  function closeFindPersonModal() {
    const el = document.getElementById("findPersonOverlay");
    if(el) el.style.display = 'none';
  }

  // Global callback for find modal
  window.onPersonSelected = async function(user) {
    closeFindPersonModal();
    Swal.fire({ title: 'Adding Personnel...', didOpen: () => Swal.showLoading() });
    
    const res = await fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({ 
        action: "addAuthorizedPerson", 
        empId: user.empId, 
        authority: currentAuth, 
        pn: currentPn 
      })
    });
    const result = await res.json();
    if(result.success) {
      loadAuthData();
      Swal.fire({ icon: 'success', title: 'User Added', timer: 1000, showConfirmButton: false });
    } else {
      Swal.fire("Error", result.error, "error");
    }
  }
</script>
