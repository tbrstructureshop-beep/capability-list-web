<style>
  .auth-person-card {
    background: #fff; width: 100%; max-width: 950px; border-radius: 20px;
    overflow: hidden; display: flex; flex-direction: column; position: relative;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    animation: authPersonSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes authPersonSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  .auth-person-header {
    padding: 20px 24px; background: #fff; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  
  .target-strip {
    background: var(--primary-light); padding: 12px 24px;
    display: flex; gap: 40px; border-bottom: 1px solid var(--border);
  }
  .strip-item label { font-size: 10px; font-weight: 800; color: var(--primary); display: block; text-transform: uppercase; }
  .strip-item strong { font-size: 14px; color: var(--text-main); }

  .auth-table-container { padding: 0; max-height: 450px; overflow-y: auto; }
  .auth-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
  .auth-table th { position: sticky; top: 0; background: #f9fafb; padding: 14px 16px; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); z-index: 10; }
  .auth-table td { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; color: var(--text-main); }
  .auth-table tr:hover { background: #fcfcfc; }

  /* SUB-MODAL / PICKER STYLES */
  .picker-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(4px);
    z-index: 100; display: none; flex-direction: column; align-items: center; padding-top: 60px;
  }
  .picker-content { width: 100%; max-width: 500px; padding: 20px; }
  .search-advice-box {
    width: 100%; padding: 16px 20px; border-radius: 14px;
    border: 2px solid var(--primary); font-size: 16px; outline: none;
    box-shadow: 0 10px 15px -3px rgba(60, 146, 166, 0.2);
  }
  .advice-list {
    margin-top: 10px; background: white; border-radius: 14px;
    border: 1px solid var(--border); max-height: 300px; overflow-y: auto;
    box-shadow: var(--shadow-md);
  }
  .advice-item {
    padding: 12px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 2px;
    border-bottom: 1px solid #f3f4f6; transition: 0.2s;
  }
  .advice-item:hover { background: var(--primary-light); }
  .advice-item .emp-name { font-weight: 700; color: var(--text-main); }
  .advice-item .emp-meta { font-size: 11px; color: var(--text-muted); }

  .admin-only-section { 
    padding: 16px 24px; background: #f9fafb; border-top: 1px solid var(--border); 
    display: flex; justify-content: flex-end; 
  }
</style>

<div class="auth-person-card">
  <!-- Sub-Modal for User Selection -->
  <div id="userPickerOverlay" class="picker-overlay">
    <div class="picker-content">
      <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
        <h4 style="margin:0">Add Authorized Personnel</h4>
        <button class="btn" onclick="closePicker()" style="border:none; font-weight:800;">Cancel</button>
      </div>
      <input type="text" id="userPickerSearch" class="search-advice-box" placeholder="Search ID, Name, or Unit..." oninput="handleSearchAdvice(this.value)">
      <div id="adviceList" class="advice-list">
        <!-- Search Results -->
      </div>
    </div>
  </div>

  <div class="auth-person-header">
    <h3 style="margin:0; display:flex; align-items:center; gap:12px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
      Authorized Person Set
    </h3>
    <button class="close-x" onclick="closeAuthPersonModal()">&times;</button>
  </div>

  <div class="target-strip">
    <div class="strip-item"><label>Authority</label><strong id="view_auth">-</strong></div>
    <div class="strip-item"><label>Part Number</label><strong id="view_pn">-</strong></div>
  </div>

  <div class="auth-table-container">
    <table class="auth-table">
      <thead>
        <tr>
          <th>No.</th>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Unit</th>
          <th>Job Title</th>
          <th>Stamp No.</th>
          <th id="thActions">Actions</th>
        </tr>
      </thead>
      <tbody id="authPersonTableBody">
        <!-- Table rows -->
      </tbody>
    </table>
  </div>

  <div class="admin-only-section" id="adminControlPanel" style="display: none;">
    <button class="btn btn-primary" onclick="openPicker()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Manage Personnel Set
    </button>
  </div>
</div>

<script>
  /**
   * REPAIRED: Logic with Admin Authorization & Advisory Search
   */
  let currentAuth = "";
  let currentPn = "";
  let allStaff = [];
  let authorizedIds = new Set();
  
  // Normalized Role Check
  const isAdmin = (currentUser && currentUser.role && currentUser.role.toLowerCase() === 'admin');

  async function initAuthPerson(auth, pn) {
    currentAuth = auth;
    currentPn = pn;
    document.getElementById('view_auth').textContent = auth;
    document.getElementById('view_pn').textContent = pn;
    
    // UI Permission Guard
    document.getElementById('adminControlPanel').style.display = isAdmin ? 'flex' : 'none';
    document.getElementById('thActions').style.display = isAdmin ? 'table-cell' : 'none';
    
    loadAuthData();
  }

  async function loadAuthData() {
    const tableBody = document.getElementById('authPersonTableBody');
    tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px;">Checking Authorization...</td></tr>';
    
    try {
      const res = await fetch(GAS_API_URL, { 
        method: "POST", 
        body: JSON.stringify({ action: "getAuthorizedPersonnel", authority: currentAuth, pn: currentPn }) 
      });
      const data = await res.json();
      
      if(data.success) {
        allStaff = data.allUsers;
        authorizedIds = new Set(data.authorizedList.map(u => String(u.empId)));
        renderStaffTable(data.authorizedList);
      }
    } catch (e) { console.error(e); }
  }

  function renderStaffTable(list) {
    const body = document.getElementById('authPersonTableBody');
    if(list.length === 0) {
      body.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:60px; color:var(--text-light);">No authorized personnel found for this component.</td></tr>`;
      return;
    }
    
    body.innerHTML = list.map((user, i) => `
      <tr>
        <td>${i+1}</td>
        <td><strong>${user.empId}</strong></td>
        <td>${user.name}</td>
        <td>${user.unit}</td>
        <td>${user.jobTitle || '<em style="color:#ccc">Incomplete</em>'}</td>
        <td><code style="background:#f3f4f6; padding:3px 8px; border-radius:6px; font-size:11px;">${user.stampNo || 'N/A'}</code></td>
        <td style="display: ${isAdmin ? 'table-cell' : 'none'}">
          <button class="btn-icon del" onclick="removePerson('${user.empId}')" title="Revoke Authorization">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  // --- PICKER LOGIC (GOOGLE ADVICE STYLE) ---
  
  function openPicker() {
    document.getElementById('userPickerOverlay').style.display = 'flex';
    document.getElementById('userPickerSearch').value = '';
    document.getElementById('userPickerSearch').focus();
    handleSearchAdvice(''); // Show all initial suggestions
  }

  function closePicker() {
    document.getElementById('userPickerOverlay').style.display = 'none';
  }

  function handleSearchAdvice(query) {
    const listEl = document.getElementById('adviceList');
    const q = query.toLowerCase().trim();
    
    // Filter staff: not already authorized AND matches query
    const filtered = allStaff.filter(user => {
      const isAlreadyAuth = authorizedIds.has(String(user.empId));
      if (isAlreadyAuth) return false;
      
      return String(user.empId).includes(q) || 
             user.name.toLowerCase().includes(q) || 
             user.unit.toLowerCase().includes(q);
    }).slice(0, 10); // Performance: Only show top 10 matches

    if(filtered.length === 0) {
      listEl.innerHTML = `<div style="padding:20px; text-align:center; font-size:13px; color:var(--text-light);">No matching personnel available</div>`;
      return;
    }

    listEl.innerHTML = filtered.map(user => `
      <div class="advice-item" onclick="confirmAddPerson('${user.empId}', '${user.name.replace(/'/g, "\\'")}')">
        <span class="emp-name">${user.name}</span>
        <span class="emp-meta">ID: ${user.empId} • Unit: ${user.unit} • ${user.jobTitle || 'No Title'}</span>
      </div>
    `).join('');
  }

  async function confirmAddPerson(empId, name) {
    const confirm = await Swal.fire({
      title: 'Authorize Personnel',
      html: `Do you want to authorize <strong>${name}</strong> for this component?`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Yes, Authorize'
    });

    if(confirm.isConfirmed) {
      closePicker();
      Swal.fire({ title: 'Processing...', didOpen: () => Swal.showLoading() });
      
      try {
        const res = await fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "addAuthorizedPerson", empId, authority: currentAuth, pn: currentPn })
        });
        const result = await res.json();
        if(result.success) {
          Swal.fire({ icon: 'success', title: 'User Authorized', timer: 1500, showConfirmButton: false });
          loadAuthData();
        } else {
          Swal.fire("Error", result.error, "error");
        }
      } catch (e) { Swal.fire("Error", "Server Error", "error"); }
    }
  }

  async function removePerson(empId) {
    if(!isAdmin) return;
    
    const confirm = await Swal.fire({
      title: 'Revoke Authorization?',
      text: "This user will no longer be listed as an authorized person for this component.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ef4444',
      confirmButtonText: 'Yes, Revoke'
    });

    if(confirm.isConfirmed) {
      Swal.fire({ title: 'Removing...', didOpen: () => Swal.showLoading() });
      try {
        const res = await fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "removeAuthorizedPerson", empId, authority: currentAuth, pn: currentPn })
        });
        const result = await res.json();
        if(result.success) {
          loadAuthData();
          Swal.fire({ icon: 'success', title: 'Removed', timer: 1000, showConfirmButton: false });
        }
      } catch (e) { Swal.fire("Error", "Failed to revoke", "error"); }
    }
  }
</script>
